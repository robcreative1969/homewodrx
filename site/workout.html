<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout - HomeWODrx</title>
  <meta name="description" content="View detailed workout information and log your results.">
  <meta property="og:title" content="Workout - HomeWODrx">
  <meta property="og:description" content="View this CrossFit workout, see movements and scaling, and log your result on HomeWODrx.">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://homewodrx.com/workouts/" id="og-url">
  <link rel="canonical" href="https://homewodrx.com/workouts/" id="canonical-url">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/benchmarks.js"></script>
  <script src="/js/nav.js"></script>
  <style>
    .movement-link {
      color: var(--orange, #f97316);
      text-decoration: none;
      font-weight: 600;
    }
    .movement-link:hover {
      text-decoration: underline;
    }
    .equipment-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--dark-surface, #1e1e1e);
      border: 1px solid var(--dark-border, #444);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--text, #e5e5e5);
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      cursor: pointer;
    }
    .equipment-chip::after {
      content: ' →';
      font-size: 0.75rem;
      opacity: 0.5;
      transition: opacity 0.15s, transform 0.15s;
    }
    .equipment-chip:hover {
      background: rgba(249, 115, 22, 0.1);
      border-color: var(--orange, #f97316);
      color: var(--orange, #f97316);
      transform: translateY(-1px);
    }
    .equipment-chip:hover::after {
      opacity: 1;
      transform: translateX(2px);
    }
    .equipment-section {
      margin-top: 1.5rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--dark-border, #333);
      border-radius: 8px;
      background: var(--dark-surface, #1a1a1a);
    }
    /* ── YouTube embed ───────────────────────────────────────────────── */
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      border-radius: 8px;
      margin: 1.5rem 0;
      background: #000;
    }
    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .video-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      border-radius: 4px;
      padding: 0.12rem 0.4rem;
      font-size: 0.73rem;
      font-weight: 600;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
  </style>
</head>
<body data-nav-init="true" data-active-page="workouts">
<main class="container">

  <div id="workout-header" class="loading">
    <div class="spinner"></div>
  </div>

  <!-- WORKOUT DETAILS -->
  <div id="workout-details" style="display: none;">
    <section class="section">
      <div id="description-section"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>Movements</h2>
      </div>
      <div id="movements-table"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>Log Your Result</h2>
      </div>
      <div id="log-result-section"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>Leaderboard</h2>
      </div>
      <div class="filter-chips" id="leaderboard-filters">
        <button class="chip active" data-period="week">This Week</button>
        <button class="chip" data-period="month">This Month</button>
        <button class="chip" data-period="all">All Time</button>
      </div>
      <div id="leaderboard-table" style="margin-top: 1.5rem;"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>Related Workouts</h2>
      </div>
      <div id="related-workouts" class="grid grid-cols-3"></div>
    </section>
  </div>

</main>

<!-- FOOTER -->
<script src="/js/footer.js"></script>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Log Your Result</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="result-error" style="display:none;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:#E74C3C;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:14px"></div>
      <div class="form-group">
        <label>Your Score</label>
        <input type="text" id="result-score" placeholder="e.g., 4:32 or 15 rounds">
      </div>
      <div class="form-group">
        <label>Notes (Optional)</label>
        <textarea id="result-notes" placeholder="Scaled weight? Modifications? How did it feel?"></textarea>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="result-rx">
          Completed RX (Prescribed weight)
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeResultModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitResult()">Log Result</button>
    </div>
  </div>
</div>

<script>
  let currentWorkout = null;
  let currentResults = [];
  let leaderboardPeriod = 'week';
  let currentUser = null;

  const ADMIN_EMAILS = ['rob@carlbloom.com'];

  function isAdmin(user) {
    return user && ADMIN_EMAILS.includes(user.email);
  }

  function canManageWorkout(w) {
    if (!currentUser || !w) return false;
    if (isAdmin(currentUser)) return true;
    return w.user_id && w.user_id === currentUser.id;
  }

  async function deleteCurrentWorkout() {
    if (!currentWorkout || !canManageWorkout(currentWorkout)) return;
    const title = currentWorkout.title || currentWorkout.name;
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    try {
      await db.deleteWorkout(currentWorkout.id);
      showToast('Workout deleted.', 'success');
      setTimeout(() => { window.location.href = '/workouts.html'; }, 1200);
    } catch (e) {
      showToast('Error deleting workout.', 'error');
    }
  }

  const AFFILIATE_TAG = 'homewodrx0f-20';

  // Complete equipment → Amazon search URL map.
  // Covers all values from both movements.equipment and benchmark_workouts.equipment
  // (including camelCase variants used in benchmark data).
  const EQUIPMENT_LINKS = {
    // ── Core barbell / weight room ─────────────────────────────────────────────
    'barbell':           `https://www.amazon.com/s?k=barbell&tag=${AFFILIATE_TAG}`,
    'bumper plates':     `https://www.amazon.com/s?k=bumper+plates&tag=${AFFILIATE_TAG}`,
    'plates':            `https://www.amazon.com/s?k=weight+plates&tag=${AFFILIATE_TAG}`,
    'bench':             `https://www.amazon.com/s?k=weight+bench&tag=${AFFILIATE_TAG}`,
    'dumbbells':         `https://www.amazon.com/s?k=dumbbells+set&tag=${AFFILIATE_TAG}`,
    'dumbbell':          `https://www.amazon.com/s?k=dumbbells+set&tag=${AFFILIATE_TAG}`,
    'kettlebell':        `https://www.amazon.com/s?k=kettlebell&tag=${AFFILIATE_TAG}`,
    'sandbag':           `https://www.amazon.com/s?k=crossfit+sandbag&tag=${AFFILIATE_TAG}`,
    // ── Pull / gymnastics ─────────────────────────────────────────────────────
    'pull-up bar':       `https://www.amazon.com/s?k=pull-up+bar&tag=${AFFILIATE_TAG}`,
    'pull up bar':       `https://www.amazon.com/s?k=pull-up+bar&tag=${AFFILIATE_TAG}`,
    'pullupbar':         `https://www.amazon.com/s?k=pull-up+bar&tag=${AFFILIATE_TAG}`,
    'gymnastics rings':  `https://www.amazon.com/s?k=gymnastics+rings&tag=${AFFILIATE_TAG}`,
    'gymnastic rings':   `https://www.amazon.com/s?k=gymnastics+rings&tag=${AFFILIATE_TAG}`,
    'rings':             `https://www.amazon.com/s?k=gymnastics+rings&tag=${AFFILIATE_TAG}`,
    'parallettes':       `https://www.amazon.com/s?k=parallettes&tag=${AFFILIATE_TAG}`,
    'parallel bars':     `https://www.amazon.com/s?k=parallel+bars+gymnastics&tag=${AFFILIATE_TAG}`,
    'climbing rope':     `https://www.amazon.com/s?k=climbing+rope+crossfit&tag=${AFFILIATE_TAG}`,
    'rope':              `https://www.amazon.com/s?k=climbing+rope+crossfit&tag=${AFFILIATE_TAG}`,
    // ── Cardio machines ───────────────────────────────────────────────────────
    'rower':             `https://www.amazon.com/s?k=rowing+machine&tag=${AFFILIATE_TAG}`,
    'assault bike':      `https://www.amazon.com/s?k=assault+bike&tag=${AFFILIATE_TAG}`,
    'echo bike':         `https://www.amazon.com/s?k=echo+bike&tag=${AFFILIATE_TAG}`,
    'bike erg':          `https://www.amazon.com/s?k=bike+erg+assault&tag=${AFFILIATE_TAG}`,
    'ski erg':           `https://www.amazon.com/s?k=ski+erg&tag=${AFFILIATE_TAG}`,
    'sled':              `https://www.amazon.com/s?k=weight+sled+crossfit&tag=${AFFILIATE_TAG}`,
    'battle ropes':      `https://www.amazon.com/s?k=battle+ropes&tag=${AFFILIATE_TAG}`,
    // ── Accessories ──────────────────────────────────────────────────────────
    'box':               `https://www.amazon.com/s?k=plyo+box&tag=${AFFILIATE_TAG}`,
    'medicine ball':     `https://www.amazon.com/s?k=medicine+ball&tag=${AFFILIATE_TAG}`,
    'wall ball':         `https://www.amazon.com/s?k=wall+ball&tag=${AFFILIATE_TAG}`,
    'wallball':          `https://www.amazon.com/s?k=wall+ball&tag=${AFFILIATE_TAG}`,
    'wallballtarget':    `https://www.amazon.com/s?k=wall+ball+target&tag=${AFFILIATE_TAG}`,
    'jump rope':         `https://www.amazon.com/s?k=crossfit+jump+rope&tag=${AFFILIATE_TAG}`,
    'jumprope':          `https://www.amazon.com/s?k=crossfit+jump+rope&tag=${AFFILIATE_TAG}`,
    'weight vest':       `https://www.amazon.com/s?k=weight+vest&tag=${AFFILIATE_TAG}`,
    'weightedvest':      `https://www.amazon.com/s?k=weight+vest&tag=${AFFILIATE_TAG}`,
    'vest':              `https://www.amazon.com/s?k=weight+vest&tag=${AFFILIATE_TAG}`,
    'ab wheel':          `https://www.amazon.com/s?k=ab+wheel&tag=${AFFILIATE_TAG}`,
    'ghd machine':       `https://www.amazon.com/s?k=GHD+machine+crossfit&tag=${AFFILIATE_TAG}`,
    'ghd':               `https://www.amazon.com/s?k=GHD+machine+crossfit&tag=${AFFILIATE_TAG}`,
    'resistance bands':  `https://www.amazon.com/s?k=resistance+bands+set&tag=${AFFILIATE_TAG}`,
  };

  // Items to surface on bodyweight/no-equipment workouts.
  // Even athletes doing body-weight-only WODs buy accessories, recovery gear, and books.
  // Category-level links for the bodyweight/general section.
  // Broad enough that users self-select what they want — no bad guesses.
  const POPULAR_GEAR = [
    { name: 'Training Shoes',          url: `https://www.amazon.com/s?k=cross+training+shoes&tag=${AFFILIATE_TAG}` },
    { name: 'Fitness Apparel',         url: `https://www.amazon.com/s?k=fitness+workout+clothing&tag=${AFFILIATE_TAG}` },
    { name: 'Gymnastics & Bars',       url: `https://www.amazon.com/s?k=gymnastics+pull+up+bars+rings&tag=${AFFILIATE_TAG}` },
    { name: 'Kettlebells & Dumbbells', url: `https://www.amazon.com/s?k=kettlebells+dumbbells&tag=${AFFILIATE_TAG}` },
    { name: 'Cardio Equipment',        url: `https://www.amazon.com/s?k=home+gym+cardio+equipment&tag=${AFFILIATE_TAG}` },
    { name: 'Knee & Joint Support',    url: `https://www.amazon.com/s?k=knee+sleeves+joint+support&tag=${AFFILIATE_TAG}` },
    { name: 'Lifting Accessories',     url: `https://www.amazon.com/s?k=gym+lifting+accessories&tag=${AFFILIATE_TAG}` },
    { name: 'Recovery Gear',           url: `https://www.amazon.com/s?k=fitness+recovery+foam+roller+massage+gun&tag=${AFFILIATE_TAG}` },
  ];

  // Non-purchasable "equipment" values to filter out of display
  const SKIP_EQUIPMENT = new Set(['bodyweight', 'running', 'none', '']);

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  // Convert camelCase DB values to a readable display name:
  //   "jumpRope" → "Jump Rope",  "pullUpBar" → "Pull Up Bar"
  function equipmentDisplayName(e) {
    return e
      .replace(/([A-Z])/g, ' $1')
      .replace(/[-_]/g, ' ')
      .trim()
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function getEquipmentLink(equipment) {
    const key = equipment.toLowerCase().trim();
    // Try exact key first, then camelCase-collapsed (e.g. "jumprope")
    return EQUIPMENT_LINKS[key]
      || EQUIPMENT_LINKS[key.replace(/\s+/g, '')]
      || `https://www.amazon.com/s?k=${encodeURIComponent(equipmentDisplayName(equipment))}&tag=${AFFILIATE_TAG}`;
  }

  let isBenchmark = false;

  // ── SEO helpers ──────────────────────────────────────────────────────────────
  function injectJsonLd(data) {
    const existing = document.getElementById('structured-data');
    if (existing) existing.remove();
    const script = document.createElement('script');
    script.id = 'structured-data';
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(data);
    document.head.appendChild(script);
  }

  // Read slug from path (/workouts/:slug) or query param (?slug=)
  function getWorkoutSlug() {
    const pathMatch = window.location.pathname.match(/\/workouts\/([^\/]+)/);
    if (pathMatch) return decodeURIComponent(pathMatch[1]);
    return new URLSearchParams(window.location.search).get('slug');
  }

  // ── YouTube helpers ──────────────────────────────────────────────────────────
  function extractYouTubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function youtubeEmbed(url, title) {
    const id = extractYouTubeId(url);
    if (!id) return '';
    return `
      <div class="video-container">
        <iframe
          src="https://www.youtube-nocookie.com/embed/${id}"
          title="${title || 'Workout video'}"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>`;
  }

  async function loadWorkout() {
    const slug = getWorkoutSlug();
    const id = new URLSearchParams(window.location.search).get('id');
    try {
      if (slug) {
        currentWorkout = await db.getBenchmarkBySlug(slug);
        isBenchmark = true;
        if (!currentWorkout) { const wh=document.getElementById('workout-header'); wh.classList.remove('loading'); wh.innerHTML = '<p class="text-muted">Workout not found.</p>'; return; }
      } else if (id) {
        currentWorkout = await db.getWorkoutById(id);
        isBenchmark = false;
        if (!currentWorkout) { const wh=document.getElementById('workout-header'); wh.classList.remove('loading'); wh.innerHTML = '<p class="text-muted">Workout not found.</p>'; return; }
      }
      renderWorkoutHeader(); renderWorkoutDetails(); renderRelatedWorkouts(); loadLeaderboard();

      const wName = currentWorkout.title || currentWorkout.name;
      const wDesc = currentWorkout.description
        ? currentWorkout.description.substring(0, 155)
        : `View this CrossFit workout on HomeWODrx.`;

      document.title = `${wName} CrossFit Workout | HomeWODrx`;
      document.querySelector('meta[name="description"]').setAttribute('content', `${wName}: ${wDesc}`);
      document.querySelector('meta[property="og:title"]').setAttribute('content', `${wName} | HomeWODrx`);
      document.querySelector('meta[property="og:description"]').setAttribute('content', `${wName}: ${wDesc}`);

      // Canonical + og:url — pretty path for benchmarks, query-param for user workouts
      const canonicalPath = (isBenchmark && currentWorkout.slug)
        ? (window.location.pathname.startsWith('/workouts/')
            ? `https://homewodrx.com/workouts/${currentWorkout.slug}`
            : `https://homewodrx.com/workout?slug=${currentWorkout.slug}`)
        : `https://homewodrx.com/workout?id=${id}`;
      document.getElementById('canonical-url').href = canonicalPath;
      document.querySelector('meta[property="og:url"]').setAttribute('content', canonicalPath);

      // JSON-LD structured data
      const movementNames = (currentWorkout.movements || []).map(m => m.name || m.movement || '').filter(Boolean);
      const ldData = [
        {
          '@context': 'https://schema.org',
          '@type': 'ExercisePlan',
          'name': `${wName} CrossFit Workout`,
          'description': currentWorkout.description || `${wName} is a CrossFit ${currentWorkout.format || 'workout'}.`,
          'url': canonicalPath,
          'exerciseType': `CrossFit — ${currentWorkout.format || 'Workout'}`,
          ...(currentWorkout.duration_estimate ? { 'activityDuration': currentWorkout.duration_estimate } : {}),
          ...(movementNames.length ? {
            'workExample': movementNames.map(n => ({ '@type': 'ExerciseAction', 'name': n }))
          } : {}),
        },
        {
          '@context': 'https://schema.org',
          '@type': 'BreadcrumbList',
          'itemListElement': [
            { '@type': 'ListItem', 'position': 1, 'name': 'Home',     'item': 'https://homewodrx.com/' },
            { '@type': 'ListItem', 'position': 2, 'name': 'Workouts', 'item': 'https://homewodrx.com/workouts' },
            { '@type': 'ListItem', 'position': 3, 'name': wName,      'item': canonicalPath },
          ],
        },
      ];
      injectJsonLd(ldData);

      document.getElementById('workout-details').style.display = '';
    } catch (error) {
      console.error('Error loading workout:', error);
      const wh=document.getElementById('workout-header'); wh.classList.remove('loading'); wh.innerHTML = '<p class="text-muted">Error loading workout.</p>';
    }
  }

  function renderWorkoutHeader() {
    const w = currentWorkout;
    const createdBy = w.username ? `Created by ${w.username}` : '';
    const categoryBadgeMap = {
      girl:      '<span class="badge badge-girl">Girl WOD</span>',
      hero:      '<span class="badge badge-hero">Hero WOD</span>',
      open:      '<span class="badge badge-open">Open WOD</span>',
      games:     '<span class="badge badge-games">Games WOD</span>',
      partner:   '<span class="badge badge-partner">Partner WOD</span>',
      benchmark: '<span class="badge badge-benchmark">Benchmark</span>',
      user:      '<span class="badge badge-success">Community</span>',
      daily:     '<span class="badge badge-orange">Daily WOD</span>',
    };
    const categoryBadge = categoryBadgeMap[w.category] || '';
    const wkHeaderEl = document.getElementById('workout-header');
    wkHeaderEl.classList.remove('loading');
    wkHeaderEl.innerHTML = `
      <div style="padding: 2rem 0; margin-bottom: 2rem; border-bottom: 1px solid var(--dark-border);">
        <h1>${w.title || w.name}</h1>
        ${createdBy ? `<p class="text-muted">${createdBy}</p>` : ''}
        <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;">
          ${categoryBadge}
          <span class="badge badge-orange">${w.format}</span>
          <span class="badge badge-orange">${w.duration_estimate}</span>
          <span class="badge badge-orange">${w.difficulty}</span>
          <span class="badge badge-orange">${w.body_focus}</span>
        </div>
        <div style="display:flex;gap:1rem;">
          <button class="btn btn-primary" onclick="openResultModal()">Log Your Result</button>
          ${isBenchmark ? `<a href="/workouts.html" class="btn btn-secondary">Browse Similar</a>` : ''}
        </div>
        ${canManageWorkout(w) ? `<div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button onclick="deleteCurrentWorkout()" style="background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.4);color:#E74C3C;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:0.85rem;font-weight:600;">🗑 Delete Workout</button>
        </div>` : ''}
      </div>`;
  }

  function renderWorkoutDetails() {
    const w = currentWorkout;
    document.getElementById('description-section').innerHTML = `
      <p>${w.description}</p>
      ${w.scoring_notes ? `<div style="margin-top:1.5rem;"><h4>Scoring Guide</h4><p>${w.scoring_notes}</p></div>` : ''}
      ${w.tips&&w.tips.length>0?`<div style="margin-top:1.5rem;"><h4>Tips</h4><ul style="margin-left:1.5rem;">${w.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`:''}
      ${w.youtube_url ? youtubeEmbed(w.youtube_url, w.title || w.name) : ''}`;
    if (w.movements && w.movements.length > 0) {
      document.getElementById('movements-table').innerHTML = `
        <table><thead><tr><th>Movement</th><th>Reps / Duration</th><th>Rx (Men / Women)</th><th>Tip</th></tr></thead><tbody>
          ${w.movements.map(m => { const mn = m.name || m.movement || ''; return `<tr><td><a href="/movement.html?slug=${slugify(mn)}" class="movement-link">${mn}</a></td><td>${m.reps||'-'}</td><td><span class="text-muted">${m.rx_men||''} / ${m.rx_women||''}</span></td><td><span class="text-muted" style="font-size:0.9rem;">${m.tip||''}</span></td></tr>`; }).join('')}
        </tbody></table>`;
    }
    // Determine displayable equipment (filter out bodyweight/running/none)
    const gearItems = (w.equipment || []).filter(e => !SKIP_EQUIPMENT.has(e.toLowerCase().trim()));
    const isBodyweightOnly = gearItems.length === 0;

    if (isBodyweightOnly) {
      // Bodyweight WOD: show accessories, recovery gear, and books — all relevant to any CrossFitter
      document.getElementById('movements-table').innerHTML += `
        <div class="equipment-section">
          <h4 style="margin-bottom:0.3rem;">Fitness Essentials</h4>
          <p class="text-muted" style="font-size:0.85rem;margin-bottom:0.85rem;">No gear required for this WOD — but great athletes invest in recovery, protection, and the right kit. Shop on Amazon (affiliate links help support HomeWODrx at no extra cost to you).</p>
          <div style="display:flex;flex-wrap:wrap;gap:0.5rem;">
            ${POPULAR_GEAR.map(g => `<a href="${g.url}" class="equipment-chip" target="_blank" rel="noopener sponsored">${g.name}</a>`).join('')}
          </div>
        </div>`;
    } else {
      // Equipment-specific WOD: show the actual gear used
      document.getElementById('movements-table').innerHTML += `
        <div class="equipment-section">
          <h4 style="margin-bottom:0.3rem;">Gear for This Workout</h4>
          <p class="text-muted" style="font-size:0.85rem;margin-bottom:0.85rem;">Shop the equipment used in this WOD on Amazon (affiliate links help support HomeWODrx at no extra cost to you).</p>
          <div style="display:flex;flex-wrap:wrap;gap:0.5rem;">
            ${gearItems.map(e => `<a href="${getEquipmentLink(e)}" class="equipment-chip" target="_blank" rel="noopener sponsored">${equipmentDisplayName(e)}</a>`).join('')}
          </div>
        </div>`;
    }
    document.getElementById('log-result-section').innerHTML = `<p class="text-muted" style="margin-bottom:1rem;">Record your time, rounds, or reps.</p><button class="btn btn-primary" onclick="openResultModal()">Log Your Result</button>`;
  }

  async function loadLeaderboard(period = 'week') {
    leaderboardPeriod = period;
    const container = document.getElementById('leaderboard-table');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      let results = [];
      if (currentWorkout.slug) results = await db.getBenchmarkLeaderboard(currentWorkout.slug, 100);
      else if (currentWorkout.id) results = await db.getResults({ workoutId: currentWorkout.id, limit: 100 });
      const now = new Date(); const periodDate = new Date();
      if (period==='week') periodDate.setDate(now.getDate()-7);
      else if (period==='month') periodDate.setMonth(now.getMonth()-1);
      if (period!=='all') results = results.filter(r=>new Date(r.date)>=periodDate);
      if (results.length===0) { container.innerHTML = '<p class="text-muted">No results yet.</p>'; return; }
      results.sort((a,b)=>{if(currentWorkout.scoring_type==='time')return(a.score_seconds||999999)-(b.score_seconds||999999);else if(currentWorkout.scoring_type==='rounds_reps')return(b.score_rounds||b.score_reps||0)-(a.score_rounds||a.score_reps||0);else return(b.score_reps||0)-(a.score_reps||0);});
      currentResults=results;
      container.innerHTML = `<table><thead><tr><th>Rank</th><th>Athlete</th><th>Score</th><th>Rx</th><th>Date</th></tr></thead><tbody>${results.slice(0,20).map((r,i)=>`<tr><td class="leaderboard-rank rank-${i+1<=3?i+1:''}">${i+1}</td><td>${r.username}</td><td><strong>${r.score_display}</strong></td><td>${r.is_rx?'RX':'Scaled'}</td><td class="text-muted">${new Date(r.date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>`;
    } catch (e) { container.innerHTML = '<p class="text-muted">Error loading leaderboard.</p>'; }
  }

  async function renderRelatedWorkouts() {
    const w = currentWorkout;
    if (!w) return;
    const allBenchmarks = await db.getAllBenchmarks();
    const wMovements = (w.movements||[]).map(m=>slugify(m.name||m.movement||''));
    const related = allBenchmarks
      .filter(b=>b.slug!==w.slug)
      .map(b=>({...b,_score:(b.category===w.category?2:0)+wMovements.filter(m=>(b.movements||[]).map(m=>slugify(m.name||m.movement||'')).includes(m)).length}))
      .filter(b=>b._score>0).sort((a,b)=>b._score-a._score).slice(0,3);
    document.getElementById('related-workouts').innerHTML = related.length ?
      related.map(b=>{const vb=b.youtube_url?`<span class="video-badge">▶ Video</span>`:'';return`<a href="/workout.html?slug=${b.slug}" style="text-decoration:none;"><div class="card"><h4>${b.name}${vb}</h4><p class="text-muted" style="font-size:0.9rem;margin-bottom:0.4rem;">${formatWodMeta(b)}</p><p style="font-size:0.85rem;color:var(--mu,#888);margin-bottom:0.75rem;">${summarizeMovements(b)}</p><div><span class="badge badge-orange">${b.difficulty}</span>${b.category==='girl'?'<span class="badge">The Girls</span>':''}${b.category==='hero'?'<span class="badge">Hero WOD</span>':''}</div></div></a>`}).join('') :
      '<p class="text-muted">No related workouts found.</p>';
  }

  async function openResultModal() {
    const user = await db.getUser();
    if (!user) { openWorkoutAuthModal(); return; }
    document.getElementById('result-modal').classList.add('active');
  }

  function openWorkoutAuthModal(mode = 'login') {
    switchWorkoutAuthTab(mode);
    document.getElementById('workout-auth-modal').classList.add('active');
  }
  function closeWorkoutAuthModal() {
    document.getElementById('workout-auth-modal').classList.remove('active');
    const errEl = document.getElementById('workout-auth-error');
    errEl.textContent = ''; errEl.style.display = 'none';
  }
  function switchWorkoutAuthTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('workout-auth-title').textContent = isLogin ? 'Sign In to Log Result' : 'Create Account';
    document.getElementById('workout-auth-sub').textContent = isLogin ? 'Sign in to record your results and appear on the leaderboard.' : 'Join HomeWODrx free — track results and compete.';
    document.getElementById('workout-login-form').style.display = isLogin ? 'block' : 'none';
    document.getElementById('workout-signup-form').style.display = isLogin ? 'none' : 'block';
  }
  async function submitWorkoutLogin() {
    const email = document.getElementById('workout-li-email').value.trim();
    const pass  = document.getElementById('workout-li-pass').value;
    const errEl = document.getElementById('workout-auth-error');
    errEl.style.display = 'none';
    if (!email || !pass) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }
    const { user, error } = await db.signIn(email, pass);
    if (error) { errEl.textContent = error.message || 'Sign in failed.'; errEl.style.display = 'block'; return; }
    closeWorkoutAuthModal();
    document.getElementById('result-modal').classList.add('active');
  }
  async function submitWorkoutSignup() {
    const username = document.getElementById('workout-su-user').value.trim();
    const email    = document.getElementById('workout-su-email').value.trim();
    const pass     = document.getElementById('workout-su-pass').value;
    const errEl    = document.getElementById('workout-auth-error');
    errEl.style.display = 'none';
    if (!username || !email || !pass) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
    const { user, error } = await db.signUp(email, pass, username);
    if (error) { errEl.textContent = error.message || 'Sign up failed.'; errEl.style.display = 'block'; return; }
    closeWorkoutAuthModal();
    document.getElementById('result-modal').classList.add('active');
  }
  function closeResultModal() { document.getElementById('result-modal').classList.remove('active'); }

  async function submitResult() {
    const user = await db.getUser();
    if (!user) { openWorkoutAuthModal(); return; }
    const score = document.getElementById('result-score').value;
    const notes = document.getElementById('result-notes').value;
    const isRx = document.getElementById('result-rx').checked;
    if (!score) {
      const errEl = document.getElementById('result-error');
      errEl.textContent = 'Please enter your score.';
      errEl.style.display = 'block';
      return;
    }
    try {
      const result = { user_id:user.id, username:user.email?.split('@')[0]||'unknown', benchmark_slug:currentWorkout.slug||null, workout_id:currentWorkout.id||null, score_display:score, score_seconds:currentWorkout.scoring_type==='time'?parseTimeToSeconds(score):null, score_rounds:currentWorkout.scoring_type==='rounds_reps'?parseRoundsReps(score):null, score_reps:currentWorkout.scoring_type==='total_reps'?parseInt(score):null, is_rx:isRx, notes:notes, date:new Date().toISOString().split('T')[0] };
      const {error} = await db.saveResult(result);
      if (error) throw error;
      closeResultModal();
      document.getElementById('result-score').value='';
      document.getElementById('result-notes').value='';
      document.getElementById('result-rx').checked=false;
      document.getElementById('result-error').style.display='none';
      showWorkoutToast('Result logged! 🎉', 'success');
      loadLeaderboard(leaderboardPeriod);
    } catch (e) {
      const errEl = document.getElementById('result-error');
      errEl.textContent = 'Error logging result. Please try again.';
      errEl.style.display = 'block';
    }
  }

  function parseTimeToSeconds(t) { const parts=t.split(':'); return parts.length===2?parseInt(parts[0])*60+parseInt(parts[1]):parseInt(t); }
  function parseRoundsReps(s) { const m=s.match(/(\d+)/); return m?parseInt(m[1]):0; }

  function showWorkoutToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.textContent = message;
    toast.style.cssText = `position:fixed;bottom:24px;right:24px;background:${type==='success'?'#22C55E':'#E8530A'};color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideInToast .3s ease-out`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await db.getUser().catch(() => null);
    loadWorkout();
    document.querySelectorAll('#leaderboard-filters .chip').forEach(chip => {
      chip.addEventListener('click', e => {
        document.querySelectorAll('#leaderboard-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        loadLeaderboard(e.target.dataset.period);
      });
    });
    document.querySelector('.modal-close').addEventListener('click', closeResultModal);
    document.getElementById('result-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('result-modal')) closeResultModal();
    });
  });
</script>

<!-- AUTH MODAL -->
<style>
  #workout-auth-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;padding:20px}

  #workout-auth-modal .wam{background:var(--dark-card,#1E1E2C);border:1px solid var(--dark-border,#2E2E42);border-radius:14px;padding:28px 28px 24px;width:100%;max-width:380px;position:relative}
  #workout-auth-modal .wam-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text-muted,#888899);font-size:20px;cursor:pointer;line-height:1}

  #workout-auth-modal .wamfield{margin-bottom:14px}
  #workout-auth-modal .wamfield label{display:block;font-size:11px;font-weight:700;color:var(--text-muted,#888899);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  #workout-auth-modal .wamfield input{width:100%;background:#16161F;border:1px solid var(--dark-border,#2E2E42);border-radius:8px;padding:10px 12px;color:var(--text-primary,#EAEAF0);font-size:14px;outline:none;font-family:inherit;box-sizing:border-box}

  #workout-auth-modal .wambtn:hover{background:#FF6B2B}

  @keyframes slideInToast{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
<div id="workout-auth-modal">
  <div class="wam">
    <button class="wam-close" onclick="closeWorkoutAuthModal()">✕</button>
    <h2 id="workout-auth-title">Sign In to Log Result</h2>
    <p class="wamsub" id="workout-auth-sub">Sign in to record your results and appear on the leaderboard.</p>
    <div id="workout-auth-error" class="wamerr"></div>
    <div id="workout-login-form">
      <div class="wamfield"><label>Email</label><input type="email" id="workout-li-email" placeholder="you@email.com"></div>
      <div class="wamfield"><label>Password</label><input type="password" id="workout-li-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')submitWorkoutLogin()"></div>
      <button class="wambtn" onclick="submitWorkoutLogin()">Sign In →</button>
      <p class="wamlink">No account? <a onclick="switchWorkoutAuthTab('signup')">Sign up free</a></p>
    </div>
    <div id="workout-signup-form" style="display:none">
      <div class="wamfield"><label>Username</label><input type="text" id="workout-su-user" placeholder="e.g. firebreather_rob" maxlength="20"></div>
      <div class="wamfield"><label>Email</label><input type="email" id="workout-su-email" placeholder="you@email.com"></div>
      <div class="wamfield"><label>Password</label><input type="password" id="workout-su-pass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')submitWorkoutSignup()"></div>
      <button class="wambtn" onclick="submitWorkoutSignup()">Create Account →</button>
      <p class="wamlink">Already have one? <a onclick="switchWorkoutAuthTab('login')">Log in</a></p>
    </div>
  </div>
</div>
</body>
