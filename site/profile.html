<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Profile — HomeWODrx</title>
<meta name="description" content="View athlete profile, workout history, and results on HomeWODrx.">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="stylesheet" href="/css/style.css">
<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/db.js"></script>
<script src="/js/benchmarks.js"></script>
<script src="/js/nav.js"></script>
<style>
.prof-page{max-width:1000px;margin:0 auto;padding:32px 20px 80px}
.prof-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.prof-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;flex-shrink:0}
.prof-info h1{font-size:clamp(22px,4vw,30px);font-weight:900;margin-bottom:4px}
.prof-info p{color:var(--mu);font-size:14px}
.prof-info .joined{font-size:12px;color:var(--mu);margin-top:4px}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.stat-card .val{font-size:24px;font-weight:900;color:var(--or)}
.stat-card .lbl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.section-title{font-size:13px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.prof-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}
.prof-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:20px;transition:border-color .15s}
.prof-card:hover{border-color:var(--or)}
.prof-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.prof-card h3{font-size:16px;font-weight:800;margin-bottom:4px}
.prof-card .date{color:var(--mu);font-size:12px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
.badge-or{background:rgba(196,18,18,.15);color:var(--orl);border:1px solid rgba(196,18,18,.3)}
.badge-mu{background:rgba(136,136,153,.15);color:var(--mu);border:1px solid rgba(136,136,153,.3)}
.badge-gr{background:rgba(39,174,96,.15);color:#27ae60;border:1px solid rgba(39,174,96,.3)}
.results-table{width:100%;border-collapse:collapse;font-size:13px}
.results-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--bd);background:var(--dk2)}
.results-table td{padding:10px 14px;border-bottom:1px solid var(--bd)}
.results-table tr:hover td{background:rgba(255,255,255,.02)}
.score-val{font-weight:800;color:var(--orl);font-size:14px}
.rx-badge{background:rgba(39,174,96,.15);color:#27ae60;border:1px solid rgba(39,174,96,.3);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.empty-state{text-align:center;padding:40px 20px;color:var(--mu)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state h3{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:8px}
.empty-state p{font-size:14px}
.tab-bar{display:flex;gap:0;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:20px;width:fit-content}
.tab-btn{padding:9px 18px;font-size:13px;font-weight:700;color:var(--mu);cursor:pointer;background:var(--dk3);border:none;transition:all .15s}
.tab-btn.active{background:var(--or);color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}
.edit-bio{background:var(--dk3);border:1px solid var(--bd);border-radius:7px;padding:8px 14px;color:var(--mu);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px}
.edit-bio:hover{border-color:var(--or);color:var(--or)}
.wod-overlay{position:fixed;top:60px;left:0;right:0;bottom:0;z-index:900;background:var(--bg);overflow-y:auto;display:none}
.wod-overlay.open{display:block}
.wod-overlay .inner{max-width:800px;margin:0 auto;padding:32px 20px 80px}
.back-btn{background:none;border:none;color:var(--or);font-size:14px;font-weight:700;cursor:pointer;padding:8px 0;margin-bottom:20px}
.back-btn:hover{text-decoration:underline}
.wod-detail-title{font-size:28px;font-weight:900;margin-bottom:8px}
.wod-detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.wod-section{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:16px}
.wod-section h3{font-size:13px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.wod-section pre{white-space:pre-wrap;font-family:inherit;font-size:14px;line-height:1.7;color:var(--tx)}
@media(max-width:600px){.prof-header{flex-direction:column;text-align:center}.prof-grid{grid-template-columns:1fr}.stats-bar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<main>
<div class="prof-page">

  <!-- Loading -->
  <div id="prof-loading" style="text-align:center;padding:60px 20px;color:var(--mu)">
    <p>Loading profile...</p>
  </div>

  <!-- Not Found -->
  <div id="prof-notfound" style="display:none">
    <div class="empty-state">
      <div class="icon">🤷</div>
      <h3>Profile not found</h3>
      <p>This athlete profile doesn't exist or couldn't be loaded.</p>
    </div>
  </div>

  <!-- Profile Content -->
  <div id="prof-content" style="display:none">

    <!-- Header -->
    <div class="prof-header">
      <div class="prof-avatar" id="prof-avatar">?</div>
      <div class="prof-info">
        <h1 id="prof-username">—</h1>
        <p id="prof-bio"></p>
        <div class="joined" id="prof-joined"></div>
        <button class="edit-bio" id="edit-bio-btn" style="display:none" onclick="toggleBioEdit()">Edit Profile</button>
      </div>
    </div>

    <!-- Bio Edit (own profile only) -->
    <div id="bio-edit-section" style="display:none;margin-bottom:24px">
      <div style="background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:20px">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Bio</label>
        <textarea id="bio-input" rows="3" style="width:100%;background:var(--dk3);border:1px solid var(--bd);border-radius:7px;padding:10px;color:var(--tx);font-size:14px;outline:none;font-family:inherit;resize:vertical" placeholder="Tell us about yourself..."></textarea>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button onclick="saveBio()" style="padding:8px 16px;background:var(--or);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer">Save</button>
          <button onclick="toggleBioEdit()" style="padding:8px 16px;background:var(--dk3);color:var(--mu);border:1px solid var(--bd);border-radius:7px;font-size:13px;font-weight:700;cursor:pointer">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="prof-stats">
      <div class="stat-card"><div class="val" id="stat-workouts">0</div><div class="lbl">Workouts</div></div>
      <div class="stat-card"><div class="val" id="stat-results">0</div><div class="lbl">Results Logged</div></div>
      <div class="stat-card"><div class="val" id="stat-public">0</div><div class="lbl">Public WODs</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('workouts')">Workouts</button>
      <button class="tab-btn" onclick="switchTab('results')">Results</button>
    </div>

    <!-- Tab: Workouts -->
    <div class="tab-content active" id="tab-workouts">
      <div class="prof-grid" id="prof-workouts-grid"></div>
      <div id="prof-workouts-empty" class="empty-state" style="display:none">
        <div class="icon">💪</div>
        <h3>No workouts yet</h3>
        <p>This athlete hasn't created any public workouts.</p>
      </div>
    </div>

    <!-- Tab: Results -->
    <div class="tab-content" id="tab-results">
      <div style="overflow-x:auto">
        <table class="results-table" id="prof-results-table" style="display:none">
          <thead>
            <tr>
              <th>Workout</th>
              <th>Score</th>
              <th>Rx</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="prof-results-body"></tbody>
        </table>
      </div>
      <div id="prof-results-empty" class="empty-state" style="display:none">
        <div class="icon">📊</div>
        <h3>No results yet</h3>
        <p>This athlete hasn't logged any results.</p>
      </div>
    </div>

  </div>
</div>
</main>

<!-- WOD Detail Overlay -->
<div class="wod-overlay" id="wod-detail-overlay">
  <div class="inner">
    <button class="back-btn" onclick="closeWodDetail()">← Back to Profile</button>
    <div id="wod-detail-content"></div>
  </div>
</div>

<script>
let currentUser = null;
let profileData = null;
let profileWorkouts = [];
let isOwnProfile = false;

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getAvatarColor(userId) {
  const colors = ['#C41212', '#E03030', '#FF8C42', '#FFA500', '#FFB84D'];
  const hash = (userId || '').split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
  return colors[hash % colors.length];
}

// ── WOD Detail ──
async function openWodDetail(workoutId) {
  const w = profileWorkouts.find(x => x.id === workoutId) || await db.getWorkoutById(workoutId);
  if (!w) return;

  let movementsHtml = '';
  if (w.movements) {
    const moves = Array.isArray(w.movements) ? w.movements : (typeof w.movements === 'string' ? w.movements.split(',') : []);
    movementsHtml = moves.map(m => typeof m === 'object' ? `${m.name || m.movement || ''}${m.reps ? ' \u00d7 ' + m.reps : ''}` : m.trim()).filter(Boolean).join('\n');
  }

  document.getElementById('wod-detail-content').innerHTML = `
    <h1 class="wod-detail-title">${escHtml(w.title)}</h1>
    <div class="wod-detail-meta">
      <span class="badge badge-or">${escHtml(w.format || 'AMRAP')}</span>
      <span class="badge badge-mu">${cap(w.level || 'intermediate')}</span>
      ${w.duration ? `<span class="badge badge-mu">${escHtml(String(w.duration))} min</span>` : ''}
      ${w.equipment ? `<span class="badge badge-mu">${escHtml(w.equipment)}</span>` : ''}
    </div>
    ${w.description ? `<div class="wod-section"><h3>Description</h3><pre>${escHtml(w.description)}</pre></div>` : ''}
    ${movementsHtml ? `<div class="wod-section"><h3>Movements</h3><pre>${escHtml(movementsHtml)}</pre></div>` : ''}
    ${w.scoring ? `<div class="wod-section"><h3>Scoring</h3><pre>${escHtml(w.scoring)}</pre></div>` : ''}`;

  document.getElementById('wod-detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeWodDetail() {
  document.getElementById('wod-detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Tab Switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'workouts' && i === 0) || (tab === 'results' && i === 1));
  });
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ── Bio Edit ──
function toggleBioEdit() {
  const section = document.getElementById('bio-edit-section');
  const visible = section.style.display !== 'none';
  section.style.display = visible ? 'none' : 'block';
  if (!visible) {
    document.getElementById('bio-input').value = profileData?.bio || '';
  }
}

async function saveBio() {
  const bio = document.getElementById('bio-input').value.trim();
  try {
    if (typeof supabaseClient !== 'undefined' && supabaseClient) {
      await supabaseClient
        .from('profiles')
        .update({ bio })
        .eq('id', currentUser.id);
    }
    profileData.bio = bio;
    document.getElementById('prof-bio').textContent = bio;
    document.getElementById('bio-edit-section').style.display = 'none';
  } catch (e) {
    alert('Failed to save bio: ' + (e.message || 'Unknown error'));
  }
}

// ── Load Profile ──
async function loadProfile() {
  const params = new URLSearchParams(window.location.search);
  // Support both ?user=name and /u/name URL patterns
  let username = params.get('user');
  if (!username) {
    const pathMatch = window.location.pathname.match(/^\/u\/([^/]+)/);
    if (pathMatch) username = decodeURIComponent(pathMatch[1]);
  }

  currentUser = await db.getUser();

  if (!username && !currentUser) {
    document.getElementById('prof-loading').style.display = 'none';
    document.getElementById('prof-notfound').style.display = 'block';
    return;
  }

  // Determine which profile to load
  let profile = null;
  let profileUserId = null;

  if (username) {
    // Try loading by username
    profile = await db.getProfileByUsername(username);
    if (profile) {
      profileUserId = profile.id;
    }
  }

  // If no profile found by username, and we have a current user, check if it's their own profile
  if (!profile && currentUser) {
    const currentUsername = currentUser.email?.split('@')[0] || '';
    if (!username || username === currentUsername || username === 'me') {
      profile = await db.getProfile(currentUser.id);
      profileUserId = currentUser.id;
    }
  }

  if (!profile) {
    document.getElementById('prof-loading').style.display = 'none';
    document.getElementById('prof-notfound').style.display = 'block';
    return;
  }

  profileData = profile;
  isOwnProfile = currentUser && (profileUserId === currentUser.id);

  // Update page title
  document.title = `${profile.username || 'Athlete'} — HomeWODrx`;

  // Render header
  const avatarColor = profile.avatar_color || getAvatarColor(profileUserId);
  const initial = (profile.username || 'A').charAt(0).toUpperCase();
  document.getElementById('prof-avatar').style.backgroundColor = avatarColor;
  document.getElementById('prof-avatar').textContent = initial;
  document.getElementById('prof-username').textContent = profile.username || 'Athlete';
  document.getElementById('prof-bio').textContent = profile.bio || '';
  document.getElementById('prof-joined').textContent = profile.created_at ? `Joined ${formatDate(profile.created_at)}` : '';

  if (isOwnProfile) {
    document.getElementById('edit-bio-btn').style.display = 'inline-block';
  }

  // Load workouts for this user
  // For own profile: show all workouts (public + private)
  // For other profiles: show only public workouts
  let workouts = await db.getWorkouts({ userId: profileUserId });
  if (!isOwnProfile) {
    workouts = workouts.filter(w => w.is_public || w.isPublic);
  }

  // Load results
  const results = await db.getResults({ userId: profileUserId });

  // Stats
  document.getElementById('stat-workouts').textContent = workouts.length;
  document.getElementById('stat-results').textContent = results.length;
  document.getElementById('stat-public').textContent = workouts.filter(w => w.is_public || w.isPublic).length;

  // Render workouts
  const grid = document.getElementById('prof-workouts-grid');
  const workoutsEmpty = document.getElementById('prof-workouts-empty');

  if (workouts.length === 0) {
    grid.innerHTML = '';
    workoutsEmpty.style.display = 'block';
  } else {
    workoutsEmpty.style.display = 'none';
    // Store workouts for detail view
    profileWorkouts = workouts;

    grid.innerHTML = workouts.map(w => `
      <div class="prof-card" onclick="openWodDetail('${escHtml(w.id)}')" style="cursor:pointer">
        <div class="prof-card-meta">
          <span class="badge badge-or">${escHtml(w.format || 'AMRAP')}</span>
          <span class="badge badge-mu">${cap(w.level || 'intermediate')}</span>
          ${w.is_public || w.isPublic ? '<span class="badge badge-gr">🌍 Public</span>' : '<span class="badge badge-mu">🔒 Private</span>'}
        </div>
        <h3>${escHtml(w.title)}</h3>
        <div class="date">${formatDate(w.created_at || w.createdAt)}</div>
      </div>`).join('');
  }

  // Render results
  const resultsTable = document.getElementById('prof-results-table');
  const resultsBody = document.getElementById('prof-results-body');
  const resultsEmpty = document.getElementById('prof-results-empty');

  if (results.length === 0) {
    resultsTable.style.display = 'none';
    resultsEmpty.style.display = 'block';
  } else {
    resultsEmpty.style.display = 'none';
    resultsTable.style.display = 'table';
    resultsBody.innerHTML = results.map(r => `
      <tr>
        <td style="font-weight:700">${escHtml(r.benchmark_slug || r.workout_id || '—')}</td>
        <td class="score-val">${escHtml(r.score_display || '—')}</td>
        <td>${r.is_rx ? '<span class="rx-badge">Rx</span>' : 'Scaled'}</td>
        <td style="color:var(--mu)">${formatDate(r.date || r.created_at)}</td>
      </tr>`).join('');
  }

  // Show content
  document.getElementById('prof-loading').style.display = 'none';
  document.getElementById('prof-content').style.display = 'block';
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  await Nav.init('profile');
  loadProfile();
});
</script>

<!-- FOOTER -->
<script src="/js/footer.js"></script>
</body>
</html>
