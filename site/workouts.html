        <button class="chip" data-type="benchmark">Benchmarks</button>

      </div>
    </div>
    <div class="filter-section">

      <div class="filter-chips" id="format-filters">

<script src="/js/footer.js"></script>

<script>
  let allWorkouts = [];
  let filteredWorkouts = [];
  let pageUser = null;
  const ADMIN_EMAILS = ['rob@carlbloom.com'];
  function canDeleteWorkout(w) {
    if (!pageUser || !w || w.category !== 'user') return false;
    if (ADMIN_EMAILS.includes(pageUser.email)) return true;
    return w.user_id && w.user_id === pageUser.id;
  }
  async function deleteWorkoutCard(id, event) {
    event.preventDefault(); event.stopPropagation();
    if (!confirm('Delete this workout? This cannot be undone.')) return;
    try {
      await db.deleteWorkout(id);
      allWorkouts = allWorkouts.filter(w => w.id !== id);
      applyFilters();
    } catch(e) { alert('Error deleting workout.'); }
  }
  let currentFilters = {
    type: 'all',
    format: 'all',
    search: '',
    movement: null
  };
  let displayCount = 12;

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function titleCase(slug) {
    return slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  function checkMovementParam() {
    const params = new URLSearchParams(window.location.search);
    const movement = params.get('movement');
    if (movement) {
      currentFilters.movement = movement;
      const label = titleCase(movement);
      document.getElementById('movement-filter-label').textContent = label;
      document.getElementById('movement-filter-banner').style.display = 'flex';
      document.title = `${label} Workouts - HomeWODrx`;
      document.querySelector('meta[name="description"]').setAttribute(
        'content',
        `Browse all CrossFit workouts that include ${label} on HomeWODrx.`
      );
    }
    const type = params.get('type');
    if (type) {
      currentFilters.type = type;
      document.querySelectorAll('#type-filters .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.type === type);
      });
    }
  }

  function clearMovementFilter() {
    currentFilters.movement = null;
    document.getElementById('movement-filter-banner').style.display = 'none';
    document.getElementById('movement-filter-label').textContent = '';
    document.title = 'Browse Workouts - HomeWODrx';
    const url = new URL(window.location.href);
    url.searchParams.delete('movement');
    history.replaceState({}, '', url);
    applyFilters();
  }

  async function loadWorkouts() {
    const container = document.getElementById('workouts-container');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      // Load benchmarks from Supabase (falls back to BENCHMARKS JS array if Supabase unavailable)
      allWorkouts = await db.getAllBenchmarks();

      const userWorkouts = await db.getWorkouts({ isPublic: true, limit: 1000 });
      if (userWorkouts && userWorkouts.length > 0) {
        allWorkouts = allWorkouts.concat(userWorkouts.map(w => ({
          ...w,
          name: w.title || w.name || 'Untitled Workout',
          difficulty: w.difficulty || w.level || 'intermediate',
          category: 'user',
          slug: w.id,
          movements: (w.movements || []).map(m => ({ ...m, name: m.name || m.movement || '' }))
        })));
      }

      // Add the last 90 daily WODs so site content grows automatically each day
      const dailyWods = await generateRecentDailyWods(90);
      if (dailyWods.length > 0) {
        allWorkouts = allWorkouts.concat(dailyWods);
      }

      // Update type filter chips with live counts — runs after all sources are loaded
      const categoryCounts = {};
      for (const w of allWorkouts) {
        if (w.category) categoryCounts[w.category] = (categoryCounts[w.category] || 0) + 1;
      }
      document.querySelectorAll('#type-filters .chip[data-type]').forEach(chip => {
        const type = chip.dataset.type;
        if (type && type !== 'all' && categoryCounts[type]) {
          chip.textContent = `${chip.textContent.trim()} (${categoryCounts[type]})`;
        }
      });

      applyFilters();
    } catch (error) {
      console.error('Error loading workouts:', error);
      container.innerHTML = '<p class="text-muted">Error loading workouts. Please try again.</p>';
    }
  }

  // Generate workout entries for the last N days from DailyWOD engine
  async function generateRecentDailyWods(days) {
    if (typeof DailyWOD === 'undefined') return [];
    const wods = [];
    const today = new Date();
    // Fetch config and movements once to avoid repeated Supabase calls in the loop
    const [config, movementDB] = await Promise.all([
      DailyWOD.getConfig().catch(() => DailyWOD.defaultConfig),
      DailyWOD._loadMovements().catch(() => ({}))
    ]);
    for (let i = 0; i < days; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const dateStr = d.toISOString().split('T')[0];
      try {
        const dayOfWeek = new Date(dateStr + 'T12:00:00').getDay();
        const seed = DailyWOD.getSeedForDate(dateStr);
        const rng = DailyWOD.seededRng(seed);
        const difficulty = config.difficultyByDay[dayOfWeek] || 'intermediate';
        const bodyFocus  = config.bodyFocusByDay[dayOfWeek]  || 'full-body';
        const format     = config.formatByDay[dayOfWeek]     || 'amrap';
        const durRange   = config.durationByDay[dayOfWeek]   || [20, 30];
        const duration   = durRange[0] + Math.floor(rng() * (durRange[1] - durRange[0] + 1));
        const equipment  = config.equipment || ['bodyweight'];
        // Pass pre-loaded movementDB so this loop makes zero extra Supabase calls
        const pool = DailyWOD._buildPool(equipment, difficulty, bodyFocus, rng, movementDB);
        let wod;
        if (format === 'amrap')        wod = DailyWOD._genAMRAP(pool, difficulty, duration, bodyFocus, rng);
        else if (format === 'emom')    wod = DailyWOD._genEMOM(pool, difficulty, duration, bodyFocus, rng);
        else if (format === 'fortime') wod = DailyWOD._genForTime(pool, difficulty, rng);
        else                           wod = DailyWOD._genCircuit(pool, difficulty, duration, bodyFocus, rng);
        if (wod) {
          const dateLabel = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          wods.push({
            name: `Daily WOD \u2014 ${dateLabel}`,
            category: 'daily',
            format: wod.format,
            difficulty: difficulty,
            body_focus: bodyFocus,
            movements: (wod.rows || []).map(r => ({ name: r.movement })),
            _date: dateStr,
            _title: wod.title
          });
        }
      } catch (e) { /* skip this date */ }
    }
    return wods;
  }

  function applyFilters() {
    filteredWorkouts = allWorkouts.filter(w => {
      if (currentFilters.type !== 'all' && w.category !== currentFilters.type) return false;
      if (currentFilters.format !== 'all' && !w.format.toLowerCase().includes(currentFilters.format.toLowerCase())) return false;
      if (currentFilters.search && !(w.name || w.title || '').toLowerCase().includes(currentFilters.search.toLowerCase())) return false;

      if (currentFilters.movement) {
        if (!w.movements || w.movements.length === 0) return false;
        const hasMovement = w.movements.some(m => slugify(m.name) === currentFilters.movement);
        if (!hasMovement) return false;
      }

      return true;
    });

    // Default order: by category, daily WODs newest first within their group
    const catOrder = { 'girl': 0, 'hero': 1, 'open': 2, 'games': 3, 'partner': 4, 'benchmark': 5, 'user': 6, 'daily': 7 };
    filteredWorkouts.sort((a, b) => {
      const ao = catOrder[a.category] ?? 3;
      const bo = catOrder[b.category] ?? 3;
      if (ao !== bo) return ao - bo;
      if (a.category === 'daily' && b.category === 'daily') {
        return (b._date || '').localeCompare(a._date || '');
      }
      return 0;
    });

    renderWorkouts();
  }

  function renderWorkouts() {
    const container = document.getElementById('workouts-container');
    const displayed = filteredWorkouts.slice(0, displayCount);

    if (displayed.length === 0) {
      const emptyMsg = currentFilters.movement
        ? `No workouts found that include <strong>${titleCase(currentFilters.movement)}</strong>. <a href="/movement.html?slug=${currentFilters.movement}" style="color:var(--orange);">View movement guide →</a>`
        : 'No workouts found. Try adjusting your filters.';
      container.innerHTML = `<div style="grid-column: 1/-1;"><p class="text-muted">${emptyMsg}</p></div>`;
      document.getElementById('load-more-btn').style.display = 'none';
      return;
    }

    container.innerHTML = displayed.map(w => {
      const isUser    = w.category === 'user';
      const isDaily   = w.category === 'daily';
      const href = isDaily
        ? `/daily-wod.html?date=${w._date}`
        : (isUser ? `/workout.html?id=${w.id}` : `/workout.html?slug=${w.slug}`);
      const categoryBadge = (() => {
        switch (w.category) {
          case 'girl':      return '<span class="badge badge-girl">Girl WOD</span>';
          case 'hero':      return '<span class="badge badge-hero">Hero WOD</span>';
          case 'open':      return '<span class="badge badge-open">Open WOD</span>';
          case 'games':     return '<span class="badge badge-games">Games WOD</span>';
          case 'partner':   return '<span class="badge badge-partner">Partner WOD</span>';
          case 'benchmark': return '<span class="badge badge-benchmark">Benchmark</span>';
          case 'user':      return '<span class="badge badge-success">Community</span>';
          case 'daily':     return '<span class="badge badge-orange">Daily WOD</span>';
          default:          return '';
        }
      })();
      return `
        <a href="${href}" style="text-decoration: none;">
          <div class="card">
            <h4>${w.name}</h4>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.4rem;">
              ${formatWodMeta(w)}
            </p>
            <p style="font-size: 0.85rem; color: var(--mu, #888); margin-bottom: 0.75rem;">
              ${summarizeMovements(w)}
            </p>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
              ${categoryBadge}
              ${w.youtube_url ? '<span class="badge badge-video">▶ Video</span>' : ''}
              ${isUser && canDeleteWorkout(w) ? `<button onclick="deleteWorkoutCard('${w.id}',event)" style="margin-left:auto;background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.35);color:#E74C3C;border-radius:6px;padding:3px 10px;font-size:0.75rem;cursor:pointer;font-weight:600;">🗑</button>` : ''}
            </div>
          </div>
        </a>
      `;
    }).join('');

    const loadMoreBtn = document.getElementById('load-more-btn');
    if (filteredWorkouts.length > displayCount) {
      loadMoreBtn.style.display = 'inline-block';
    } else {
      loadMoreBtn.style.display = 'none';
    }
  }

  function setupFilterListeners() {
    document.querySelectorAll('#type-filters .chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('#type-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentFilters.type = e.target.dataset.type;
        displayCount = 12;
        applyFilters();
      });
    });

    document.querySelectorAll('#format-filters .chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('#format-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentFilters.format = e.target.dataset.format;
        displayCount = 12;
        applyFilters();
      });
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      currentFilters.search = e.target.value;
      displayCount = 12;
      applyFilters();
    });

    document.getElementById('load-more-btn').addEventListener('click', () => {
      displayCount += 12;
      renderWorkouts();
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    pageUser = await db.getUser().catch(() => null);
    checkMovementParam();
    setupFilterListeners();
    loadWorkouts();
  });
</script>
