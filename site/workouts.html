<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Workouts - HomeWODrx</title>
  <meta name="description" content="Browse and filter all CrossFit benchmarks and user-generated workouts.">
  <meta property="og:title" content="Browse Workouts - HomeWODrx">
  <meta property="og:description" content="Browse and filter all CrossFit benchmarks and user-generated workouts.">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/benchmarks.js"></script>
  <script src="/js/movements.js"></script>
  <script src="/js/movement-db.js"></script>
  <script src="/js/daily-wod.js"></script>
  <script src="/js/nav.js"></script>
  <style>
    .movement-filter-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--dark-surface, #1e1e1e);
      border: 1px solid var(--orange, #f97316);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .movement-filter-banner strong {
      color: var(--orange, #f97316);
    }
    .movement-filter-banner .clear-btn {
      background: none;
      border: 1px solid var(--dark-border, #333);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: inherit;
    }
    .movement-filter-banner .clear-btn:hover {
      border-color: var(--orange, #f97316);
      color: var(--orange, #f97316);
    }
  </style>
</head>
<body data-nav-init="true" data-active-page="workouts">
<main class="container">

  <section style="margin-bottom: 2rem; padding: 2rem 0;">
    <h1>Browse Workouts</h1>
    <p class="text-muted">Filter and search from our complete library of benchmarks and user-generated WODs.</p>
  </section>

  <!-- MOVEMENT FILTER BANNER (shown when ?movement= param is active) -->
  <div id="movement-filter-banner" style="display: none;" class="movement-filter-banner">
    <span>Filtering by movement: <strong id="movement-filter-label"></strong></span>
    <button class="clear-btn" onclick="clearMovementFilter()">× Clear filter</button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-section">
      <label class="filter-label">Type</label>
      <div class="filter-chips" id="type-filters">
        <button class="chip active" data-type="all">All</button>
        <button class="chip" data-type="girl">The Girls</button>
        <button class="chip" data-type="hero">Heroes</button>
        <button class="chip" data-type="benchmark">Community Benchmarks</button>
        <button class="chip" data-type="user">User-Generated</button>
        <button class="chip" data-type="daily">Daily WODs</button>
      </div>
    </div>
    <div class="filter-section">
      <label class="filter-label">Format</label>
      <div class="filter-chips" id="format-filters">
        <button class="chip active" data-format="all">All</button>
        <button class="chip" data-format="amrap">AMRAP</button>
        <button class="chip" data-format="emom">EMOM</button>
        <button class="chip" data-format="fortime">For Time</button>
        <button class="chip" data-format="circuit">Circuit</button>
      </div>
    </div>
    <div class="filter-section">
      <label class="filter-label">Difficulty</label>
      <div class="filter-chips" id="difficulty-filters">
        <button class="chip active" data-difficulty="all">All</button>
        <button class="chip" data-difficulty="beginner">Beginner</button>
        <button class="chip" data-difficulty="intermediate">Intermediate</button>
        <button class="chip" data-difficulty="advanced">Advanced</button>
      </div>
    </div>
    <div class="filter-section">
      <label class="filter-label">Body Focus</label>
      <div class="filter-chips" id="focus-filters">
        <button class="chip active" data-focus="all">All</button>
        <button class="chip" data-focus="full-body">Full Body</button>
        <button class="chip" data-focus="upper">Upper</button>
        <button class="chip" data-focus="lower">Lower</button>
        <button class="chip" data-focus="core">Core</button>
        <button class="chip" data-focus="conditioning">Conditioning</button>
      </div>
    </div>
    <div class="filter-section">
      <label class="filter-label">Search</label>
      <input type="text" id="search-input" placeholder="Search by workout name...">
    </div>
    <div class="filter-section">
      <label class="filter-label">Sort By</label>
      <select id="sort-select">
        <option value="newest">Newest First</option>
        <option value="alphabetical">Alphabetical</option>
        <option value="difficulty">Difficulty (Easiest First)</option>
        <option value="difficulty-hard">Difficulty (Hardest First)</option>
      </select>
    </div>
  </div>

  <!-- WORKOUTS GRID -->
  <div id="workouts-container" class="grid grid-cols-3">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- LOAD MORE -->
  <div style="text-align: center; margin-top: 2rem;">
    <button id="load-more-btn" class="btn btn-secondary" style="display: none;">Load More</button>
  </div>

</main>

<!-- FOOTER -->
<script src="/js/footer.js"></script>

<script>
  let allWorkouts = [];
  let filteredWorkouts = [];
  let pageUser = null;
  const ADMIN_EMAILS = ['rob@carlbloom.com'];
  function canDeleteWorkout(w) {
    if (!pageUser || !w || w.category !== 'user') return false;
    if (ADMIN_EMAILS.includes(pageUser.email)) return true;
    return w.user_id && w.user_id === pageUser.id;
  }
  async function deleteWorkoutCard(id, event) {
    event.preventDefault(); event.stopPropagation();
    if (!confirm('Delete this workout? This cannot be undone.')) return;
    try {
      await db.deleteWorkout(id);
      allWorkouts = allWorkouts.filter(w => w.id !== id);
      applyFilters();
    } catch(e) { alert('Error deleting workout.'); }
  }
  let currentFilters = {
    type: 'all',
    format: 'all',
    difficulty: 'all',
    focus: 'all',
    search: '',
    movement: null
  };
  let displayCount = 12;

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function titleCase(slug) {
    return slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  function checkMovementParam() {
    const params = new URLSearchParams(window.location.search);
    const movement = params.get('movement');
    if (movement) {
      currentFilters.movement = movement;
      const label = titleCase(movement);
      document.getElementById('movement-filter-label').textContent = label;
      document.getElementById('movement-filter-banner').style.display = 'flex';
      document.title = `${label} Workouts - HomeWODrx`;
      document.querySelector('meta[name="description"]').setAttribute(
        'content',
        `Browse all CrossFit workouts that include ${label} on HomeWODrx.`
      );
    }
  }

  function clearMovementFilter() {
    currentFilters.movement = null;
    document.getElementById('movement-filter-banner').style.display = 'none';
    document.getElementById('movement-filter-label').textContent = '';
    document.title = 'Browse Workouts - HomeWODrx';
    const url = new URL(window.location.href);
    url.searchParams.delete('movement');
    history.replaceState({}, '', url);
    applyFilters();
  }

  async function loadWorkouts() {
    const container = document.getElementById('workouts-container');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      allWorkouts = [...BENCHMARKS];

      const userWorkouts = await db.getWorkouts({ isPublic: true, limit: 1000 });
      if (userWorkouts && userWorkouts.length > 0) {
        allWorkouts = allWorkouts.concat(userWorkouts.map(w => ({
          ...w,
          category: 'user',
          slug: w.id
        })));
      }

      // Add the last 30 daily WODs so site content grows automatically each day
      const dailyWods = await generateRecentDailyWods(30);
      if (dailyWods.length > 0) {
        allWorkouts = allWorkouts.concat(dailyWods);
      }

      applyFilters();
    } catch (error) {
      console.error('Error loading workouts:', error);
      container.innerHTML = '<p class="text-muted">Error loading workouts. Please try again.</p>';
    }
  }

  // Generate workout entries for the last N days from DailyWOD engine
  async function generateRecentDailyWods(days) {
    if (typeof DailyWOD === 'undefined') return [];
    const wods = [];
    const today = new Date();
    // Fetch config once to avoid repeated Supabase calls
    const config = await DailyWOD.getConfig().catch(() => DailyWOD.defaultConfig);
    for (let i = 0; i < days; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const dateStr = d.toISOString().split('T')[0];
      try {
        const dayOfWeek = new Date(dateStr + 'T12:00:00').getDay();
        const seed = DailyWOD.getSeedForDate(dateStr);
        const rng = DailyWOD.seededRng(seed);
        const difficulty = config.difficultyByDay[dayOfWeek] || 'intermediate';
        const bodyFocus  = config.bodyFocusByDay[dayOfWeek]  || 'full-body';
        const format     = config.formatByDay[dayOfWeek]     || 'amrap';
        const durRange   = config.durationByDay[dayOfWeek]   || [20, 30];
        const duration   = durRange[0] + Math.floor(rng() * (durRange[1] - durRange[0] + 1));
        const equipment  = config.equipment || ['bodyweight'];
        const pool = DailyWOD._buildPool(equipment, difficulty, bodyFocus, rng);
        let wod;
        if (format === 'amrap')        wod = DailyWOD._genAMRAP(pool, difficulty, duration, bodyFocus, rng);
        else if (format === 'emom')    wod = DailyWOD._genEMOM(pool, difficulty, duration, bodyFocus, rng);
        else if (format === 'fortime') wod = DailyWOD._genForTime(pool, difficulty, rng);
        else                           wod = DailyWOD._genCircuit(pool, difficulty, duration, bodyFocus, rng);
        if (wod) {
          const dateLabel = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          wods.push({
            name: `Daily WOD \u2014 ${dateLabel}`,
            category: 'daily',
            format: wod.format,
            difficulty: difficulty,
            body_focus: bodyFocus,
            movements: (wod.rows || []).map(r => ({ name: r.movement })),
            _date: dateStr,
            _title: wod.title
          });
        }
      } catch (e) { /* skip this date */ }
    }
    return wods;
  }

  function applyFilters() {
    filteredWorkouts = allWorkouts.filter(w => {
      if (currentFilters.type !== 'all' && w.category !== currentFilters.type) return false;
      if (currentFilters.format !== 'all' && w.format.toLowerCase() !== currentFilters.format.toLowerCase()) return false;
      if (currentFilters.difficulty !== 'all' && w.difficulty !== currentFilters.difficulty) return false;
      if (currentFilters.focus !== 'all' && w.body_focus !== currentFilters.focus) return false;
      if (currentFilters.search && !w.name.toLowerCase().includes(currentFilters.search.toLowerCase())) return false;

      if (currentFilters.movement) {
        if (!w.movements || w.movements.length === 0) return false;
        const hasMovement = w.movements.some(m => slugify(m.name) === currentFilters.movement);
        if (!hasMovement) return false;
      }

      return true;
    });

    const sortBy = document.getElementById('sort-select').value;
    if (sortBy === 'alphabetical') {
      filteredWorkouts.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sortBy === 'difficulty') {
      const diffOrder = { 'beginner': 1, 'intermediate': 2, 'advanced': 3 };
      filteredWorkouts.sort((a, b) => (diffOrder[a.difficulty] || 0) - (diffOrder[b.difficulty] || 0));
    } else if (sortBy === 'difficulty-hard') {
      const diffOrder = { 'beginner': 1, 'intermediate': 2, 'advanced': 3 };
      filteredWorkouts.sort((a, b) => (diffOrder[b.difficulty] || 0) - (diffOrder[a.difficulty] || 0));
    } else {
      const catOrder = { 'girl': 0, 'hero': 1, 'benchmark': 2, 'user': 3, 'daily': 4 };
      filteredWorkouts.sort((a, b) => {
        const ao = catOrder[a.category] ?? 3;
        const bo = catOrder[b.category] ?? 3;
        if (ao !== bo) return ao - bo;
        // Daily WODs: newest first
        if (a.category === 'daily' && b.category === 'daily') {
          return (b._date || '').localeCompare(a._date || '');
        }
        return 0;
      });
    }

    renderWorkouts();
  }

  function renderWorkouts() {
    const container = document.getElementById('workouts-container');
    const displayed = filteredWorkouts.slice(0, displayCount);

    if (displayed.length === 0) {
      const emptyMsg = currentFilters.movement
        ? `No workouts found that include <strong>${titleCase(currentFilters.movement)}</strong>. <a href="/movement.html?slug=${currentFilters.movement}" style="color:var(--orange);">View movement guide →</a>`
        : 'No workouts found. Try adjusting your filters.';
      container.innerHTML = `<div style="grid-column: 1/-1;"><p class="text-muted">${emptyMsg}</p></div>`;
      document.getElementById('load-more-btn').style.display = 'none';
      return;
    }

    container.innerHTML = displayed.map(w => {
      const isUser  = w.category === 'user';
      const isDaily = w.category === 'daily';
      const href = isDaily
        ? `/daily-wod.html?date=${w._date}`
        : (isUser ? `/workout.html?id=${w.id}` : `/workout.html?slug=${w.slug}`);
      return `
        <a href="${href}" style="text-decoration: none;">
          <div class="card">
            <h4>${w.name}</h4>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.4rem;">
              ${formatWodMeta(w)}
            </p>
            <p style="font-size: 0.85rem; color: var(--mu, #888); margin-bottom: 0.75rem;">
              ${summarizeMovements(w)}
            </p>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
              ${isUser  ? '<span class="badge badge-success">Community</span>' : ''}
              ${isDaily ? '<span class="badge badge-orange">Daily WOD</span>' : ''}
              ${isUser && canDeleteWorkout(w) ? `<button onclick="deleteWorkoutCard('${w.id}',event)" style="margin-left:auto;background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.35);color:#E74C3C;border-radius:6px;padding:3px 10px;font-size:0.75rem;cursor:pointer;font-weight:600;">🗑</button>` : ''}
            </div>
          </div>
        </a>
      `;
    }).join('');

    const loadMoreBtn = document.getElementById('load-more-btn');
    if (filteredWorkouts.length > displayCount) {
      loadMoreBtn.style.display = 'inline-block';
    } else {
      loadMoreBtn.style.display = 'none';
    }
  }

  function setupFilterListeners() {
    document.querySelectorAll('#type-filters .chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('#type-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentFilters.type = e.target.dataset.type;
        displayCount = 12;
        applyFilters();
      });
    });

    document.querySelectorAll('#format-filters .chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('#format-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentFilters.format = e.target.dataset.format;
        displayCount = 12;
        applyFilters();
      });
    });

    document.querySelectorAll('#difficulty-filters .chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('#difficulty-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentFilters.difficulty = e.target.dataset.difficulty;
        displayCount = 12;
        applyFilters();
      });
    });

    document.querySelectorAll('#focus-filters .chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('#focus-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentFilters.focus = e.target.dataset.focus;
        displayCount = 12;
        applyFilters();
      });
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      currentFilters.search = e.target.value;
      displayCount = 12;
      applyFilters();
    });

    document.getElementById('sort-select').addEventListener('change', applyFilters);

    document.getElementById('load-more-btn').addEventListener('click', () => {
      displayCount += 12;
      renderWorkouts();
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    pageUser = await db.getUser().catch(() => null);
    checkMovementParam();
    setupFilterListeners();
    loadWorkouts();
  });
</script>
</body>
</html>
