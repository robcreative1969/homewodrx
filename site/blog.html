  <style>
/* ── Layout ── */
.wrap { max-width: 1248px; margin: 0 auto; padding: 0 24px; }

/* ── Page header ── */
.page-header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 28px 0 24px;
}
.page-header-inner { max-width: 1248px; margin: 0 auto; padding: 0 24px; }
.page-title { font-family: var(--font-head); font-size: 3rem; letter-spacing: .04em; line-height: 1; color: var(--text); }
.page-sub { font-size: .9rem; color: var(--muted); margin-top: 6px; max-width: 500px; line-height: 1.6; }
@media (max-width: 600px) { .page-title { font-size: 2.2rem; } }

/* ── Filter bar ── */
.filter-bar {
  background: var(--white); border-bottom: 1px solid var(--border);
  position: sticky; top: var(--nav-h); z-index: 90;
}
.filter-bar-inner {
  display: flex; align-items: center; gap: 8px; padding: 12px 0; flex-wrap: wrap;
}
.filter-chip {
  padding: 6px 16px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--white);
  color: var(--muted); font-size: .8rem; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
  font-family: var(--font-body);
}
.filter-chip:hover { border-color: var(--or); color: var(--or); background: var(--or-xlight); }
.filter-chip.active { border-color: var(--or); color: var(--or); background: var(--or-xlight); }
.filter-count {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--or); color: #fff; font-size: .65rem; font-weight: 700;
  margin-left: 4px;
}

/* ── Blog main ── */
.blog-main { padding: 48px 0 80px; }

/* ── Featured post ── */
.featured-post {
  background: var(--white); border-radius: var(--radius-lg);
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
  overflow: hidden; display: block;
  margin-bottom: 48px; transition: box-shadow .2s;
  text-decoration: none; color: var(--text);
}
.featured-post:hover { box-shadow: var(--shadow-md); }
.featured-body { padding: 36px 40px; display: flex; flex-direction: column; justify-content: space-between; }
.feat-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.feat-tag {
  font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--or); background: var(--or-xlight); padding: 4px 10px; border-radius: 6px;
}
.feat-read-time { font-size: .78rem; color: var(--muted); }
.featured-body h2 {
  font-family: var(--font-head); font-size: clamp(28px, 3.5vw, 38px);
  letter-spacing: .03em; line-height: 1.1; margin-bottom: 14px; color: var(--text);
}
.featured-body p {
  font-size: .95rem; color: var(--muted); line-height: 1.7; margin-bottom: 28px; flex: 1;
}
.feat-footer { display: flex; align-items: center; justify-content: space-between; }
.feat-date { font-size: .78rem; color: var(--muted2); }
.btn-read {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 22px; background: var(--or); color: #fff; border: none;
  border-radius: var(--radius); font-size: .875rem; font-weight: 700;
  transition: background .15s, transform .15s; cursor: pointer;
}
.btn-read:hover { background: var(--or-dark); transform: translateY(-1px); }
.btn-read svg { width: 14px; height: 14px; }
@media (max-width: 640px) {
  .featured-body { padding: 24px 20px; }
}

/* ── Section heading ── */
.section-hdr { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.section-hdr h2 {
  font-family: var(--font-head); font-size: clamp(22px, 3vw, 28px);
  letter-spacing: .04em; color: var(--text);
}
.section-hdr-line { flex: 1; height: 1px; background: var(--border); }

/* ── Post grid ── */
.post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 960px) { .post-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .post-grid { grid-template-columns: 1fr; } }

.post-card {
  background: var(--white); border-radius: var(--radius-lg);
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
  overflow: hidden; display: flex; flex-direction: column;
  transition: box-shadow .2s, transform .2s;
  text-decoration: none; color: var(--text);
}
.post-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }


.post-card-body { padding: 20px 20px 16px; flex: 1; display: flex; flex-direction: column; }
.pc-tag {
  font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--or); margin-bottom: 8px;
}
.post-card-body h3 {
  font-size: 1rem; font-weight: 700; line-height: 1.35;
  color: var(--text); margin-bottom: 8px; flex: 1;
}
.post-card-body p { font-size: .825rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
.pc-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.pc-date { font-size: .72rem; color: var(--muted2); }
.pc-link {
  font-size: .78rem; font-weight: 700; color: var(--or);
  display: inline-flex; align-items: center; gap: 4px;
  transition: gap .15s;
}
.pc-link:hover { gap: 8px; }

/* ── Newsletter strip ── */
.newsletter-strip {
  background: var(--text); border-radius: var(--radius-lg);
  padding: 44px 48px; margin: 48px 0 0;
  display: flex; align-items: center; gap: 40px; flex-wrap: wrap;
  position: relative; overflow: hidden;
}
.newsletter-strip::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 260px; height: 260px; border-radius: 50%;
  background: radial-gradient(circle, rgba(196,18,18,.25) 0%, transparent 70%);
  pointer-events: none;
}
.nl-copy { flex: 1; min-width: 240px; }
.nl-eyebrow {
  font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
  color: var(--or); margin-bottom: 8px;
}
.nl-copy h2 {
  font-family: var(--font-head); font-size: clamp(24px, 3.5vw, 34px);
  letter-spacing: .04em; color: #fff; margin-bottom: 8px; line-height: 1.1;
}
.nl-copy p { font-size: .9rem; color: rgba(255,255,255,.6); line-height: 1.6; }
.nl-form { display: flex; gap: 10px; flex-wrap: wrap; }
.nl-input {
  flex: 1; min-width: 220px; padding: 12px 16px;
  border: 1.5px solid rgba(255,255,255,.15); background: rgba(255,255,255,.07);
  border-radius: var(--radius); color: #fff; font-size: .9rem;
  font-family: var(--font-body); outline: none; transition: border-color .15s;
}
.nl-input::placeholder { color: rgba(255,255,255,.35); }
.nl-input:focus { border-color: var(--or); }
.nl-btn {
  padding: 12px 22px; background: var(--or); color: #fff; border: none;
  border-radius: var(--radius); font-size: .875rem; font-weight: 700;
  cursor: pointer; transition: background .15s; white-space: nowrap;
  font-family: var(--font-body);
}
.nl-btn:hover { background: var(--or-dark); }
  </style>

</head>

<body data-nav-init="true" data-active-page="blog">

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <h1 class="page-title">BLOG</h1>
    <p class="page-sub">WOD guides, scaling strategies, home gym builds, and everything in between — written for athletes who train outside the box.</p>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="wrap">
    <div class="filter-bar-inner">
      <button class="filter-chip active" data-filter="all" onclick="filterPosts('all', this)">All <span class="filter-count" id="totalPostCount">—</span></button>
      <button class="filter-chip" data-filter="training" onclick="filterPosts('training', this)">Training</button>
      <button class="filter-chip" data-filter="wod-guides" onclick="filterPosts('wod-guides', this)">WOD Guides</button>
      <button class="filter-chip" data-filter="equipment" onclick="filterPosts('equipment', this)">Equipment</button>
      <button class="filter-chip" data-filter="mobility" onclick="filterPosts('mobility', this)">Mobility</button>
      <button class="filter-chip" data-filter="programming" onclick="filterPosts('programming', this)">Programming</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="blog-main">
  <div class="wrap">

    <!-- FEATURED POST — auto-populated from first grid card by JS; no edits needed here -->
    <a class="featured-post" id="featuredPost" href="#"></a>

    <!-- MORE POSTS -->
    <div class="section-hdr">
      <h2>More Articles</h2>
      <div class="section-hdr-line"></div>
    </div>

    <div class="post-grid" id="postGrid">
      <!-- Posts are rendered here dynamically from /blog-posts.json — do not add cards manually -->
    </div><!-- /post-grid -->

    <!-- NEWSLETTER -->
    <div class="newsletter-strip">
      <div class="nl-copy">
        <div class="nl-eyebrow">Stay in the loop</div>
        <h2>New Guides, Every Week</h2>
        <p>WOD breakdowns, scaling tips, and home gym advice — straight to your inbox. No spam, ever.</p>
      </div>
      <form class="nl-form" id="nl-form" onsubmit="nlSubmit(event)">
        <input class="nl-input" id="nl-email" type="email" placeholder="your@email.com" aria-label="Email address" required/>
        <button class="nl-btn" id="nl-btn" type="submit">Subscribe Free</button>
      </form>
      <p class="nl-msg" id="nl-msg" style="display:none;margin-top:10px;font-size:.875rem;"></p>
    </div>

  </div><!-- /wrap -->
</div><!-- /blog-main -->

<script>
var ARROW_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
var ARROW_LG  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

function buildCard(post) {
  var a = document.createElement('a');
  a.className = 'post-card';
  a.href = post.file;
  a.dataset.category = post.category;
  a.innerHTML =
    '<div class="post-card-body">' +
      '<div class="pc-tag">' + post.categoryLabel + '</div>' +
      '<h3>' + post.title + '</h3>' +
      '<p>' + post.excerpt + '</p>' +
      '<div class="pc-footer">' +
        '<span class="pc-date">' + post.date + ' · ' + post.readTime + '</span>' +
        '<span class="pc-link">Read ' + ARROW_SVG + '</span>' +
      '</div>' +
    '</div>';
  return a;
}

function buildFeatured(post) {
  var featured = document.getElementById('featuredPost');
  if (!featured) return;
  featured.href = post.file;
  featured.dataset.category = post.category;
  featured.innerHTML =
    '<div class="featured-body">' +
      '<div>' +
        '<div class="feat-meta">' +
          '<span class="feat-tag">Featured</span>' +
          '<span class="feat-read-time">' + post.readTime + '</span>' +
        '</div>' +
        '<h2>' + post.title + '</h2>' +
        '<p>' + post.excerpt + '</p>' +
      '</div>' +
      '<div class="feat-footer">' +
        '<span class="feat-date">' + post.date + '</span>' +
        '<span class="btn-read">Read Article ' + ARROW_LG + '</span>' +
      '</div>' +
    '</div>';
}

function updateCounts(posts) {
  // "All" total
  var countEl = document.getElementById('totalPostCount');
  if (countEl) countEl.textContent = posts.length;
}

function filterPosts(category, btn) {
  document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');

  document.querySelectorAll('#postGrid .post-card').forEach(function(card) {
    card.style.display = (category === 'all' || card.dataset.category === category) ? '' : 'none';
  });

  var feat = document.getElementById('featuredPost');
  if (feat && feat.dataset.category) {
    feat.style.display = (category === 'all' || feat.dataset.category === category) ? '' : 'none';
  }
}

// Load posts from JSON manifest — no manual edits to this file ever needed
fetch('/blog-posts.json')
  .then(function(r) { return r.json(); })
  .then(function(posts) {
    if (!posts || !posts.length) return;

    // First post → featured hero
    buildFeatured(posts[0]);

    // Remaining posts → grid cards
    var grid = document.getElementById('postGrid');
    posts.slice(1).forEach(function(post) {
      grid.appendChild(buildCard(post));
    });

    // Update "All" count badge
    updateCounts(posts);

    // Apply ?cat= URL param filter if present
    var catParam = new URLSearchParams(window.location.search).get('cat');
    if (catParam) {
      var chip = document.querySelector('.filter-chip[data-filter="' + catParam + '"]');
      if (chip) filterPosts(catParam, chip);
    }
  })
  .catch(function(err) {
    console.error('Failed to load blog-posts.json:', err);
  });

async function nlSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('nl-email').value.trim();
  const btn   = document.getElementById('nl-btn');
  const msg   = document.getElementById('nl-msg');

  btn.disabled = true;
  btn.textContent = 'Subscribing…';

  try {
    if (!supabaseClient) await initSupabase();
    const { error } = await supabaseClient
      .from('email_subscribers')
      .insert({ email, source: 'blog' });

    msg.style.display = 'block';
    if (error && error.code === '23505') {
      msg.style.color = 'rgba(255,255,255,.6)';
      msg.textContent = 'You\'re already on the list!';
      btn.textContent = 'Subscribed';
    } else if (error) {
      throw error;
    } else {
      msg.style.color = '#4ade80';
      msg.textContent = '✓ You\'re in! We\'ll be in touch.';
      btn.textContent = 'Subscribed ✓';
      document.getElementById('nl-email').value = '';
    }
  } catch (err) {
    msg.style.display = 'block';
    msg.style.color = '#f87171';
    msg.textContent = 'Something went wrong — please try again.';
    btn.disabled = false;
    btn.textContent = 'Subscribe Free';
    console.error('Subscribe error:', err);
  }
}
</script>
