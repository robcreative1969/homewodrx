<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Sentry Error Monitoring -->
  <script src="https://js.sentry-cdn.com/aab375d3ffbac4d168ad50d9722faebb.min.js" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - HomeWODrx</title>
  <meta name="description" content="Create your free HomeWODrx account to track workouts and compete on leaderboards.">

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/benchmarks.js"></script>
  <script src="/js/nav.js"></script>
  <style>
    .auth-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo a {
      text-decoration: none;
      display: inline-block;
    }

    .auth-logo-img {
      height: 36px;
      width: auto;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .auth-subtitle {
      color: var(--text-muted, #888);
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      background: var(--dark-bg);
      border: 1px solid var(--dark-border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--orange);
    }

    .form-input::placeholder {
      color: #555;
    }

    .auth-error {
      background: rgba(196, 18, 18, 0.1);
      border: 1px solid rgba(196, 18, 18, 0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--orange);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .auth-error.visible {
      display: block;
    }

    .auth-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #22c55e;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .auth-success.visible {
      display: block;
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted, #888);
    }

    .auth-footer a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--dark-border);
      margin: 1.5rem 0;
    }

    /* ── Password reveal wrapper ── */
    .password-wrapper {
      position: relative;
    }
    .password-wrapper .form-input {
      padding-right: 2.75rem;
    }
    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #666;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text-primary); }
    .toggle-pw svg { width: 18px; height: 18px; }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HZM475VDN3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HZM475VDN3');
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body data-nav-init="true" data-active-page="">
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/"><img src="/HomeWODRx-logo-white-red-black-strip-040626.png" alt="HomeWODrx" class="auth-logo-img"></a>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Free forever. Track WODs, log PRs, and compete on leaderboards.</p>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-success" id="auth-success"></div>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="rxathlete42"
            required
            autocomplete="username"
            minlength="3"
            maxlength="30"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="new-password"
              minlength="8"
            />
            <button type="button" class="toggle-pw" onclick="togglePw('password', this)" aria-label="Show password">
              <svg id="eye-password" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password-confirm">Confirm Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password-confirm"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="new-password"
              minlength="8"
            />
            <button type="button" class="toggle-pw" onclick="togglePw('password-confirm', this)" aria-label="Show password">
              <svg id="eye-password-confirm" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-submit" id="submit-btn">
          Create Account
        </button>
      </form>

      <hr class="divider">

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Log in</a>
      </div>
    </div>
  </main>

  <script>
    // ── Show/hide password toggle ──
    const EYE_OPEN = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
    const EYE_OFF  = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.03-3.618m3.16-2.614A9.955 9.955 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.526 2.872M6.343 6.343L3 3m18 18l-3.343-3.343M9.88 9.88a3 3 0 104.243 4.243"/></svg>`;
    function togglePw(inputId, btn) {
      const inp = document.getElementById(inputId);
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      btn.innerHTML = showing ? EYE_OPEN : EYE_OFF;
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('password-confirm').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('auth-error');
      const successEl = document.getElementById('auth-success');

      // Reset messages
      errorEl.className = 'auth-error';
      successEl.className = 'auth-success';

      // Confirm passwords match
      if (password !== passwordConfirm) {
        errorEl.textContent = 'Passwords do not match. Please try again.';
        errorEl.className = 'auth-error visible';
        return;
      }

      // Loading state
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const { user, error } = await db.signUp(email, password, { username });

        if (error) {
          errorEl.textContent = error.message || 'Could not create account. Please try again.';
          errorEl.className = 'auth-error visible';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        if (user) {
          successEl.textContent = 'Account created! Check your email to confirm, then log in.';
          successEl.className = 'auth-success visible';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Account Created!';
        }
      } catch (err) {
        errorEl.textContent = 'Something went wrong. Please try again.';
        errorEl.className = 'auth-error visible';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
