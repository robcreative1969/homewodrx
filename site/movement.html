<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movement Guide - HomeWODrx</title>
  <meta name="description" content="Learn this CrossFit movement and find every workout that includes it.">
  <meta property="og:title" content="Movement Guide - HomeWODrx">
  <meta property="og:description" content="Learn this CrossFit movement and find every workout that includes it.">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/benchmarks.js"></script>
  <script src="/js/nav.js"></script>
  <style>
    .movement-hero {
      padding: 2.5rem 0 2rem;
      border-bottom: 1px solid var(--dark-border, #333);
      margin-bottom: 2rem;
    }
    .movement-hero h1 {
      margin-bottom: 0.5rem;
      text-transform: capitalize;
    }
    .movement-hero .breadcrumb {
      font-size: 0.9rem;
      color: var(--text-muted, #888);
      margin-bottom: 1rem;
    }
    .movement-hero .breadcrumb a {
      color: var(--orange, #f97316);
      text-decoration: none;
    }
    .movement-hero .breadcrumb a:hover { text-decoration: underline; }

    .movement-tips {
      background: var(--dark-surface, #1e1e1e);
      border: 1px solid var(--dark-border, #333);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .movement-tips h3 { margin-bottom: 0.75rem; }
    .movement-tips ul { margin-left: 1.5rem; }
    .movement-tips li { margin-bottom: 0.4rem; }

    .workout-count-badge {
      display: inline-block;
      background: var(--orange, #f97316);
      color: #fff;
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }
    .section-title-row {
      display: flex;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted, #888);
    }
  </style>
</head>
<body data-nav-init="true" data-active-page="workouts">
<main class="container">

  <div id="movement-header" class="loading">
    <div class="spinner"></div>
  </div>

  <div id="movement-content" style="display:none;">
    <section class="section">
      <div class="section-title-row">
        <h2>Workouts with this Movement <span class="workout-count-badge" id="workout-count">0</span></h2>
      </div>
      <div id="workouts-grid" class="grid grid-cols-3"></div>
    </section>
  </div>

</main>

<script src="/js/footer.js"></script>

<script>
  // ── Helpers ─────────────────────────────────────────────────────────────────
  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function titleCase(slug) {
    return slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  // ── Movement family map: slug → variant slugs that count as the same movement
  const MOVEMENT_FAMILIES = {
    'running':    ['400m-run', '800m-run', '1-mile-run', '100m-sprint'],
    'rowing':     ['1000m-row', 'row-for-calories'],
    'cleans':     ['squat-cleans', 'hang-power-cleans', 'power-cleans', 'clean-and-jerks'],
    'snatches':   ['squat-snatches', 'power-snatches'],
    'deadlifts':  ['deadlift', 'sumo-deadlift-high-pulls'],
    'deadlift':   ['deadlifts', 'sumo-deadlift-high-pulls'],
    'pull-ups':   ['chest-to-bar-pull-ups', 'jumping-pull-ups', 'kipping-pull-ups'],
    'muscle-ups': ['burpee-muscle-ups'],
    'thrusters':  ['thruster'],
    'thruster':   ['thrusters'],
  };

  // ── Main page loader ─────────────────────────────────────────────────────────
  async function loadMovementPage() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      document.getElementById('movement-header').innerHTML = '<p class="text-muted">No movement specified.</p>';
      return;
    }

    const movementName = titleCase(slug);

    // ── 1. Load movement from Supabase ────────────────────────────────────────
    let info = null;
    try {
      const { data, error } = await supabaseClient
        .from('movements')
        .select('name, slug, muscles, description, tips, daily_wod_eligible, category')
        .eq('slug', slug)
        .maybeSingle();

      if (!error && data) info = data;
    } catch (e) {
      console.warn('Supabase movement fetch failed:', e);
    }

    const displayName = info?.name || movementName;

    // ── 2. Update SEO meta ────────────────────────────────────────────────────
    document.title = `${displayName} - CrossFit Movement Guide | HomeWODrx`;
    document.querySelector('meta[name="description"]').setAttribute(
      'content',
      info?.description
        ? `Learn the ${displayName} CrossFit movement. ${info.description.substring(0, 120)}`
        : `Find every CrossFit workout that includes ${displayName} on HomeWODrx.`
    );
    document.querySelector('meta[property="og:title"]').setAttribute('content', `${displayName} - HomeWODrx`);

    // ── 3. Render hero / coaching section ─────────────────────────────────────
    const tips = Array.isArray(info?.tips) ? info.tips : [];
    document.getElementById('movement-header').innerHTML = `
      <div class="movement-hero">
        <div class="breadcrumb">
          <a href="/movements.html">Movement Library</a> ›
          ${displayName}
        </div>
        <h1>${displayName}</h1>
        ${info?.description
          ? `<p class="text-muted" style="max-width: 680px; line-height: 1.6;">${info.description}</p>`
          : `<p class="text-muted">Find every workout that includes ${displayName}.</p>`}
        ${info?.muscles
          ? `<p style="margin-top: 0.75rem;"><strong>Primary muscles:</strong> <span class="text-muted">${info.muscles}</span></p>`
          : ''}
        ${info?.daily_wod_eligible
          ? `<p style="margin-top: 0.75rem; font-size: 0.88rem; color: var(--text-muted, #888);">
               ⚡ Part of the <a href="/daily-wod.html" style="color: var(--orange, #f97316); text-decoration: none;">Daily WOD</a> rotation
             </p>`
          : ''}
      </div>
      ${tips.length ? `
        <div class="movement-tips">
          <h3>Coaching Cues</h3>
          <ul>
            ${tips.map(tip => `<li>${tip}</li>`).join('')}
          </ul>
        </div>
      ` : ''}
    `;

    // ── 4. Find matching workouts ─────────────────────────────────────────────
    const family = MOVEMENT_FAMILIES[slug] || [];

    // Benchmarks — read from Supabase (all 107 WODs); fall back to JS array
    let allBenchmarks = [];
    try {
      allBenchmarks = await db.getAllBenchmarks();
    } catch (e) {
      allBenchmarks = (typeof BENCHMARKS !== 'undefined') ? BENCHMARKS : [];
    }

    const matchingBenchmarks = allBenchmarks.filter(b =>
      b.movements && b.movements.some(m => {
        const ms = slugify(m.name || '');
        return ms === slug || family.includes(ms);
      })
    );

    // Community (user-generated) workouts from Supabase
    let matchingUserWorkouts = [];
    try {
      const allUserWorkouts = await db.getWorkouts({ isPublic: true, limit: 1000 });
      matchingUserWorkouts = allUserWorkouts.filter(w =>
        w.movements && w.movements.some(m => slugify(m.movement || m.name || '') === slug)
      );
    } catch (e) {
      // silent fail
    }

    // ── 5. Render workout count + cards ──────────────────────────────────────
    const totalCount = matchingBenchmarks.length + matchingUserWorkouts.length;
    document.getElementById('workout-count').textContent = totalCount;

    if (totalCount === 0) {
      document.getElementById('workouts-grid').innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <p>No workouts found for <strong>${displayName}</strong>.</p>
          <p style="margin-top: 0.5rem;">
            <a href="/workouts.html" style="color: var(--orange);">Browse all workouts &rarr;</a>
          </p>
        </div>
      `;
    } else {
      const CATEGORY_LABELS = {
        girl:      ['badge', 'The Girls'],
        hero:      ['badge', 'Hero WOD'],
        open:      ['badge', 'Open WOD'],
        games:     ['badge', 'Games WOD'],
        partner:   ['badge', 'Partner WOD'],
        benchmark: ['badge-benchmark', 'Benchmark'],
      };

      const benchmarkCards = matchingBenchmarks.map(w => {
        const [badgeClass, badgeLabel] = CATEGORY_LABELS[w.category] || ['badge', w.category];
        return `
        <a href="/workout.html?slug=${w.slug}" style="text-decoration: none;">
          <div class="card">
            <h4>${w.name}</h4>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.4rem;">
              ${formatWodMeta(w)}
            </p>
            <p style="font-size: 0.85rem; color: var(--text-muted, #888); margin-bottom: 0.75rem;">
              ${summarizeMovements(w)}
            </p>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
              <span class="badge badge-orange">${w.difficulty}</span>
              <span class="badge badge-orange">${w.body_focus}</span>
              <span class="${badgeClass}">${badgeLabel}</span>
            </div>
          </div>
        </a>
      `}).join('');

      const userCards = matchingUserWorkouts.map(w => {
        const normalizedW = {
          ...w,
          movements: (w.movements || []).map(m => ({ ...m, name: m.name || m.movement || '' }))
        };
        return `
        <a href="/workout.html?id=${w.id}" style="text-decoration: none;">
          <div class="card">
            <h4>${w.title || w.name || 'Community WOD'}</h4>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.4rem;">
              ${w.format || 'Custom'} ${w.username ? '&bull; by ' + w.username : ''}
            </p>
            <p style="font-size: 0.85rem; color: var(--mu, #888); margin-bottom: 0.75rem;">
              ${summarizeMovements(normalizedW)}
            </p>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
              <span class="badge badge-orange">${w.difficulty || w.level || 'intermediate'}</span>
              <span class="badge">Community</span>
            </div>
          </div>
        </a>
      `;
      }).join('');

      document.getElementById('workouts-grid').innerHTML = benchmarkCards + userCards;
    }

    document.getElementById('movement-content').style.display = '';
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await initSupabase();
    loadMovementPage();
  });
</script>
</body>
</html>
