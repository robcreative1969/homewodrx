  function equipmentDisplayName(e) {
    return e
      .replace(/([A-Z])/g, ' $1')
      .replace(/[-_]/g, ' ')
      .trim()
      .replace(/\b\w/g, c => c.toUpperCase());
  }

    const key = equipment.toLowerCase().trim();
    return EQUIPMENT_LINKS[key]

      || `https://www.amazon.com/s?k=${encodeURIComponent(equipmentDisplayName(equipment))}&tag=${AFFILIATE_TAG}`;
  }

  function renderEquipmentSection(equipment) {
    const gearItems = (equipment || []).filter(e => !SKIP_EQUIPMENT.has(e.toLowerCase().trim()));
    if (gearItems.length > 0) {
      return `
        <div class="equipment-section">
          <h4 style="margin-bottom:0.3rem;">Equipment for This Movement</h4>
          <p class="text-muted" style="font-size:0.85rem;margin-bottom:0.85rem;">Shop the gear you need on Amazon (affiliate links help support HomeWODrx at no extra cost to you).</p>

          </div>
        </div>`;
    }
    // Bodyweight movement: show accessories, recovery gear, and books — relevant to any CrossFitter

        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;">
          ${POPULAR_GEAR.map(g => `<a href="${g.url}" class="equipment-chip" target="_blank" rel="noopener sponsored">${g.name}</a>`).join('')}

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function copyShareLink(btn) {
    navigator.clipboard.writeText(window.location.href).then(() => {
      btn.classList.add('copied');
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '🔗 Copy Link'; }, 2000);
    }).catch(() => { prompt('Copy this link:', window.location.href); });
  }

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function titleCase(slug) {
    return slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  // ── Generate the last N daily WODs algorithmically (same engine as workouts.html) ──
  async function generateRecentDailyWods(days) {
    if (typeof DailyWOD === 'undefined') return [];
    const wods = [];
    const today = new Date();
    const [config, movementDB] = await Promise.all([
      DailyWOD.getConfig().catch(() => DailyWOD.defaultConfig),
      DailyWOD._loadMovements().catch(() => ({}))
    ]);
    for (let i = 0; i < days; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const dateStr = d.toISOString().split('T')[0];
      try {
        const dayOfWeek = new Date(dateStr + 'T12:00:00').getDay();
        const seed      = DailyWOD.getSeedForDate(dateStr);
        const rng       = DailyWOD.seededRng(seed);
        const difficulty = config.difficultyByDay[dayOfWeek] || 'intermediate';
        const bodyFocus  = config.bodyFocusByDay[dayOfWeek]  || 'full-body';
        const format     = config.formatByDay[dayOfWeek]     || 'amrap';
        const durRange   = config.durationByDay[dayOfWeek]   || [20, 30];
        const duration   = durRange[0] + Math.floor(rng() * (durRange[1] - durRange[0] + 1));
        const equipment  = config.equipment || ['bodyweight'];
        const pool = DailyWOD._buildPool(equipment, difficulty, bodyFocus, rng, movementDB);
        let wod;
        if (format === 'amrap')        wod = DailyWOD._genAMRAP(pool, difficulty, duration, bodyFocus, rng);
        else if (format === 'emom')    wod = DailyWOD._genEMOM(pool, difficulty, duration, bodyFocus, rng);
        else if (format === 'fortime') wod = DailyWOD._genForTime(pool, difficulty, rng);
        else                           wod = DailyWOD._genCircuit(pool, difficulty, duration, bodyFocus, rng);
        if (wod) {
          const dateLabel = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          wods.push({
            name: `Daily WOD \u2014 ${dateLabel}`,
            category: 'daily',
            format: wod.format,
            difficulty,
            body_focus: bodyFocus,
            movements: (wod.rows || []).map(r => ({ name: r.movement, reps: r.reps })),
            _date: dateStr,
          });
        }
      } catch (e) { /* skip this date */ }
    }
    return wods;
  }

  // ── Movement family map: slug → variant slugs that count as the same movement
  const MOVEMENT_FAMILIES = {
    'running':    ['400m-run', '800m-run', '1-mile-run', '100m-sprint'],

  // ── YouTube helpers ──────────────────────────────────────────────────────────
  function extractYouTubeId(url) {
    if (!url) return null;
    // Handles: youtube.com/watch?v=ID, youtu.be/ID, youtube.com/embed/ID
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function youtubeEmbed(url) {
    const id = extractYouTubeId(url);
    if (!id) return '';
    return `
      <div class="video-container">
        <iframe
          src="https://www.youtube-nocookie.com/embed/${id}"
          title="Movement technique video"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>`;
  }

  // ── Inject JSON-LD structured data into <head> ──────────────────────────────
  function injectJsonLd(data) {
    const existing = document.getElementById('structured-data');
    if (existing) existing.remove();
    const script = document.createElement('script');
    script.id = 'structured-data';
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(data);
    document.head.appendChild(script);
  }

  // ── Read slug from path (/movements/:slug) or query param (?slug=) ──────────
  function getSlug() {
    const pathMatch = window.location.pathname.match(/\/movements\/([^\/]+)/);
    if (pathMatch) return decodeURIComponent(pathMatch[1]);
    return new URLSearchParams(window.location.search).get('slug');
  }

  // ── Main page loader ─────────────────────────────────────────────────────────
  async function loadMovementPage() {
    const slug = getSlug();

    if (!slug) {
      document.getElementById('movement-header').innerHTML = '<p class="text-muted">No movement specified.</p>';
      return;
    }

    const movementName = titleCase(slug);

    // ── 1. Load movement from Supabase ────────────────────────────────────────
    let info = null;
    try {
      const { data, error } = await supabaseClient
        .from('movements')
        .select('name, slug, muscles, description, tips, daily_wod_eligible, category, youtube_url, equipment')
        .eq('slug', slug)
        .maybeSingle();

      if (!error && data) info = data;
    } catch (e) {
      console.warn('Supabase movement fetch failed:', e);
    }

    const displayName = info?.name || movementName;

    // ── 2. Update SEO meta ────────────────────────────────────────────────────
    document.title = `${displayName} - CrossFit Movement Guide | HomeWODrx`;
    const metaDesc = info?.description
      ? `Learn the ${displayName} CrossFit movement. ${info.description.substring(0, 120)}`
      : `Find every CrossFit workout that includes ${displayName} on HomeWODrx.`;
    document.querySelector('meta[name="description"]').setAttribute('content', metaDesc);
    document.querySelector('meta[property="og:title"]').setAttribute('content', `${displayName} - CrossFit Movement Guide | HomeWODrx`);
    document.querySelector('meta[property="og:description"]').setAttribute('content', metaDesc);

    // Canonical + og:url — use pretty path if on that URL pattern, else query-param form
    const canonicalPath = window.location.pathname.startsWith('/movements/')
      ? `https://homewodrx.com/movements/${slug}`
      : `https://homewodrx.com/movement?slug=${slug}`;
    document.getElementById('canonical-url').href = canonicalPath;
    document.querySelector('meta[property="og:url"]').setAttribute('content', canonicalPath);

    // OG image — use YouTube thumbnail if video available, else branded default
    const ytId = info?.youtube_url
      ? (info.youtube_url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/) || [])[1]
      : null;
    const ogImg = ytId
      ? `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`
      : 'https://homewodrx.com/images/og-default.png';
    document.getElementById('og-image').setAttribute('content', ogImg);
    document.getElementById('og-image-width').setAttribute('content', ytId ? '1280' : '1200');
    document.getElementById('og-image-height').setAttribute('content', ytId ? '720' : '630');
    document.getElementById('og-image-alt').setAttribute('content', `${displayName} CrossFit Movement Guide — HomeWODrx`);
    document.getElementById('twitter-image').setAttribute('content', ogImg);

    // ── 2b. Inject JSON-LD structured data ───────────────────────────────────
    const tips = Array.isArray(info?.tips) ? info.tips : [];
    const ldData = [
      {
        '@context': 'https://schema.org',
        '@type': 'HowTo',
        'name': `How to Do ${displayName} — CrossFit Technique Guide`,
        'description': info?.description || `Step-by-step technique guide for ${displayName} in CrossFit.`,
        'url': canonicalPath,
        ...(tips.length ? {
          'step': tips.map((tip, i) => ({
            '@type': 'HowToStep',
            'position': i + 1,
            'text': tip,
          }))
        } : {}),
        ...(info?.muscles ? {
          'tool': [{ '@type': 'HowToTool', 'name': info.muscles }]
        } : {}),
      },
      {
        '@context': 'https://schema.org',
        '@type': 'BreadcrumbList',
        'itemListElement': [
          { '@type': 'ListItem', 'position': 1, 'name': 'Home',             'item': 'https://homewodrx.com/' },
          { '@type': 'ListItem', 'position': 2, 'name': 'Movement Library', 'item': 'https://homewodrx.com/movements' },
          { '@type': 'ListItem', 'position': 3, 'name': displayName,        'item': canonicalPath },
        ],
      },
    ];
    injectJsonLd(ldData);

    // ── 3. Render hero / coaching section ─────────────────────────────────────
    const headerEl = document.getElementById('movement-header');
    headerEl.classList.remove('loading');
    headerEl.innerHTML = `
      <div class="movement-hero">
        <div class="breadcrumb">
          <a href="/movements">Movement Library</a> ›
          ${displayName}
        </div>
        <h1>${displayName}</h1>
        ${info?.description
          ? `<p class="text-muted" style="max-width: 680px; line-height: 1.6;">${info.description}</p>`
          : `<p class="text-muted">Find every workout that includes ${displayName}.</p>`}
        ${info?.muscles
          ? `<p style="margin-top: 0.75rem;"><strong>Primary muscles:</strong> <span class="text-muted">${info.muscles}</span></p>`
          : ''}
        ${info?.daily_wod_eligible
          ? `<p style="margin-top: 0.75rem; font-size: 0.88rem; color: var(--text-muted, #888);">
               ⚡ Part of the <a href="/daily-wod.html" style="color: var(--orange, #f97316); text-decoration: none;">Daily WOD</a> rotation
             </p>`
          : ''}
        <div class="share-bar">
          <span class="share-bar-label">Share:</span>
          <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(displayName+' movement guide on HomeWODrx 💪')}&url=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" class="share-btn">𝕏 Post</a>
          <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" class="share-btn">f Share</a>
          <button class="share-btn" onclick="copyShareLink(this)">🔗 Copy Link</button>
        </div>
      </div>
      ${tips.length ? `
        <div class="movement-tips">
          <h3>Coaching Cues</h3>
          <ul>
            ${tips.map(tip => `<li>${tip}</li>`).join('')}
          </ul>
        </div>
      ` : ''}
      ${info?.youtube_url ? youtubeEmbed(info.youtube_url) : ''}
      ${renderEquipmentSection(info?.equipment)}
    `;

    // ── 4. Find matching workouts ─────────────────────────────────────────────
    const family = MOVEMENT_FAMILIES[slug] || [];

    // Benchmarks — read from Supabase (all 107 WODs); fall back to JS array
    let allBenchmarks = [];
    try {
      allBenchmarks = await db.getAllBenchmarks();
    } catch (e) {
      allBenchmarks = (typeof BENCHMARKS !== 'undefined') ? BENCHMARKS : [];
    }

    const matchingBenchmarks = allBenchmarks.filter(b =>
      b.movements && b.movements.some(m => {
        const ms = slugify(m.name || '');
        return ms === slug || family.includes(ms);
      })
    );

    // Community (user-generated) workouts from Supabase
    let matchingUserWorkouts = [];
    try {
      const allUserWorkouts = await db.getWorkouts({ isPublic: true, limit: 1000 });
      matchingUserWorkouts = allUserWorkouts.filter(w =>
        w.movements && w.movements.some(m => slugify(m.movement || m.name || '') === slug)
      );
    } catch (e) {
      // silent fail
    }

    // Daily WODs — generate last 60 days and filter for this movement
    let matchingDailyWods = [];
    try {
      const recentDailyWods = await generateRecentDailyWods(60);
      matchingDailyWods = recentDailyWods.filter(w =>
        w.movements && w.movements.some(m => {
          const ms = slugify(m.name || '');
          return ms === slug || family.includes(ms);
        })
      );
    } catch (e) {
      // silent fail — daily WOD section is optional
    }

    // ── 5. Render workout count + cards ──────────────────────────────────────
    const totalCount = matchingBenchmarks.length + matchingUserWorkouts.length + matchingDailyWods.length;
    document.getElementById('workout-count').textContent = totalCount;

    if (totalCount === 0) {
      document.getElementById('workouts-grid').innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <p>No workouts found for <strong>${displayName}</strong>.</p>
          <p style="margin-top: 0.5rem;">
            <a href="/workouts.html" style="color: var(--orange);">Browse all workouts &rarr;</a>
          </p>
        </div>
      `;
    } else {
      const CATEGORY_LABELS = {
        girl:      ['badge badge-girl', 'Girl WOD'],
        hero:      ['badge badge-hero', 'Hero WOD'],
        open:      ['badge badge-open', 'Open WOD'],
        games:     ['badge badge-games', 'Games WOD'],
        partner:   ['badge badge-partner', 'Partner WOD'],
        benchmark: ['badge badge-benchmark', 'Benchmark'],
      };

      const benchmarkCards = matchingBenchmarks.map(w => {
        const [badgeClass, badgeLabel] = CATEGORY_LABELS[w.category] || ['badge', w.category];
        const videoBadge = w.youtube_url ? `<span class="video-badge">▶ Video</span>` : '';
        return `
        <a href="/workout.html?slug=${w.slug}" style="text-decoration: none;">
          <div class="card">
            <h4>${w.name}${videoBadge}</h4>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.4rem;">
              ${formatWodMeta(w)}
            </p>
            <p style="font-size: 0.85rem; color: var(--text-muted, #888); margin-bottom: 0.75rem;">
              ${summarizeMovements(w)}
            </p>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
              <span class="badge badge-orange">${w.difficulty}</span>
              <span class="badge badge-orange">${w.body_focus}</span>
              <span class="${badgeClass}">${badgeLabel}</span>
            </div>
          </div>
        </a>
      `}).join('');

      const userCards = matchingUserWorkouts.map(w => {
        const normalizedW = {
          ...w,
          movements: (w.movements || []).map(m => ({ ...m, name: m.name || m.movement || '' }))
        };
        return `
        <a href="/workout.html?id=${w.id}" style="text-decoration: none;">
          <div class="card">
            <h4>${w.title || w.name || 'Community WOD'}</h4>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.4rem;">
              ${w.format || 'Custom'} ${w.username ? '&bull; by ' + w.username : ''}
            </p>
            <p style="font-size: 0.85rem; color: var(--mu, #888); margin-bottom: 0.75rem;">
              ${summarizeMovements(normalizedW)}
            </p>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
              <span class="badge badge-orange">${w.difficulty || w.level || 'intermediate'}</span>
              <span class="badge badge-success">Community</span>
            </div>
          </div>
        </a>
      `;
      }).join('');

      const dailyWodCards = matchingDailyWods.map(w => `
        <a href="/daily-wod.html?date=${w._date}" style="text-decoration: none;">
          <div class="card">
            <h4>${w.name}</h4>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.4rem;">
              ${formatWodMeta(w)}
            </p>
            <p style="font-size: 0.85rem; color: var(--text-muted, #888); margin-bottom: 0.75rem;">
              ${summarizeMovements(w)}
            </p>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
              <span class="badge badge-orange">${w.difficulty}</span>
              <span class="badge badge-orange">${w.body_focus}</span>
              <span class="badge badge-orange">Daily WOD</span>
            </div>
          </div>
        </a>
      `).join('');

      document.getElementById('workouts-grid').innerHTML = benchmarkCards + userCards + dailyWodCards;
    }

    document.getElementById('movement-content').style.display = '';
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await initSupabase();
    loadMovementPage();
  });
</script>
</body>
</html>
