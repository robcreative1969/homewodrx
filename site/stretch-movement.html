<script>
// ── Helpers ──────────────────────────────────────────────────────────────────

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function titleCase(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
}

function getSlug() {
  const m = window.location.pathname.match(/\/stretches\/([^\/]+)/);
  if (m) return decodeURIComponent(m[1]).replace(/\.html$/, '');
  return new URLSearchParams(window.location.search).get('slug');
}

function copyShareLink(btn) {
  navigator.clipboard.writeText(window.location.href).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '🔗 Copy Link'; }, 2000);
  }).catch(() => { prompt('Copy this link:', window.location.href); });
}

// ── Modality display meta ─────────────────────────────────────────────────────
const MODALITY_META = {
  static:  { label: 'Static',  cls: 'sbadge-static',  emoji: '🧘' },
  dynamic: { label: 'Dynamic', cls: 'sbadge-dynamic',  emoji: '🏃' },
  pnf:     { label: 'PNF',     cls: 'sbadge-pnf',      emoji: '💪' },
  yoga:    { label: 'Yoga',    cls: 'sbadge-yoga',      emoji: '🌿' },
};

const LEVEL_META = {
  b: { label: 'Beginner',     cls: 'sbadge-level-b', tdcls: 'level-b' },
  i: { label: 'Intermediate', cls: 'sbadge-level-i', tdcls: 'level-i' },
  a: { label: 'Advanced',     cls: 'sbadge-level-a', tdcls: 'level-a' },
};

const FOCUS_META = {
  full:       { label: 'Full Body',        emoji: '🧘' },
  hips:       { label: 'Hips & Glutes',    emoji: '🦋' },
  hamstrings: { label: 'Hamstrings',       emoji: '🦵' },
  back:       { label: 'Back & Spine',     emoji: '🔄' },
  shoulders:  { label: 'Shoulders',        emoji: '💪' },
  chest:      { label: 'Chest',            emoji: '🫁' },
  calves:     { label: 'Calves & Ankles',  emoji: '🦶' },
};

// ── Affiliate gear for stretching/recovery ────────────────────────────────────
const AFFILIATE_TAG = 'homewodrx0f-20';
const RECOVERY_GEAR = [
  { name: 'Foam Roller',          url: `https://www.amazon.com/s?k=foam+roller&tag=${AFFILIATE_TAG}` },
  { name: 'Resistance Bands',     url: `https://www.amazon.com/s?k=resistance+bands+set&tag=${AFFILIATE_TAG}` },
  { name: 'Yoga Mat',             url: `https://www.amazon.com/s?k=yoga+mat&tag=${AFFILIATE_TAG}` },
  { name: 'Massage Gun',          url: `https://www.amazon.com/s?k=massage+gun+recovery&tag=${AFFILIATE_TAG}` },
  { name: 'Yoga Blocks',          url: `https://www.amazon.com/s?k=yoga+blocks&tag=${AFFILIATE_TAG}` },
  { name: 'Stretching Strap',     url: `https://www.amazon.com/s?k=stretching+strap&tag=${AFFILIATE_TAG}` },
  { name: 'Lacrosse Ball',        url: `https://www.amazon.com/s?k=lacrosse+ball+trigger+point&tag=${AFFILIATE_TAG}` },
  { name: 'Knee Sleeves',         url: `https://www.amazon.com/s?k=knee+sleeves+compression&tag=${AFFILIATE_TAG}` },
];

// ── Collect ALL stretches from STRETCH_DB into a flat array ──────────────────
function getAllStretches() {
  const all = [];
  for (const [modality, arr] of Object.entries(STRETCH_DB)) {
    arr.forEach(s => all.push({ ...s, modality }));
  }
  return all;
}

// ── Find stretch entries by slug (may return multiple for pigeon-pose) ────────
function findStretchBySlug(slug) {
  const results = [];
  for (const [modality, arr] of Object.entries(STRETCH_DB)) {
    arr.forEach(s => {
      if (slugify(s.name) === slug) results.push({ ...s, modality });
    });
  }
  return results;
}

// ── Find related stretches ────────────────────────────────────────────────────
function findRelated(currentSlug, currentFocus, limit = 4) {
  const all = getAllStretches();
  const scored = all
    .filter(s => slugify(s.name) !== currentSlug)
    .map(s => {
      const overlap = (s.focus || []).filter(f => currentFocus.includes(f)).length;
      return { ...s, overlap };
    })
    .filter(s => s.overlap > 0)
    .sort((a, b) => b.overlap - a.overlap);

  // Deduplicate by slug (same stretch in multiple modalities)
  const seen = new Set();
  const unique = [];
  for (const s of scored) {
    const sl = slugify(s.name);
    if (!seen.has(sl)) {
      seen.add(sl);
      unique.push(s);
    }
    if (unique.length >= limit) break;
  }
  return unique;
}

// ── Hold/reps table HTML ──────────────────────────────────────────────────────
function buildHoldTable(stretch) {
  const levels = ['b', 'i', 'a'];
  const isReps = stretch.timedOrReps === 'reps' || (stretch.reps && !stretch.hold);

  const rows = levels.map(lv => {
    const meta = LEVEL_META[lv];
    const inLevel = (stretch.level || []).includes(lv);
    let val = '—';
    if (inLevel) {
      if (isReps && stretch.reps) {
        val = `${stretch.reps[lv]} reps`;
      } else if (stretch.hold) {
        val = `${stretch.hold[lv]}s hold`;
      }
    }
    const dimmed = inLevel ? '' : 'style="opacity:0.35;"';
    return `
      <tr ${dimmed}>
        <td><span class="sbadge ${meta.cls}">${meta.label}</span></td>
        <td class="${meta.tdcls} val">${val}</td>
        ${stretch.sides ? `<td style="color:var(--text-muted,#888);font-size:0.82rem">each side</td>` : '<td></td>'}
      </tr>`;
  }).join('');

  const sidesNote = stretch.sides
    ? `<div class="sides-note">↩ Perform on each side individually.</div>`
    : '';

  return `
    <div class="hold-table-wrap">
      <h3>Duration by Level</h3>
      <table class="hold-table">
        <thead>
          <tr>
            <th style="text-align:left">Level</th>
            <th>${isReps ? 'Reps' : 'Hold Time'}</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      ${sidesNote}
    </div>`;
}

// ── Related stretch cards ─────────────────────────────────────────────────────
function buildRelatedCards(related) {
  if (!related.length) return '';
  const cards = related.map(s => {
    const sl = slugify(s.name);
    const modMeta = MODALITY_META[s.modality] || {};
    const focusLabels = (s.focus || []).slice(0, 2)
      .map(f => (FOCUS_META[f] || {}).label || f)
      .join(' · ');
    return `
      <a href="/stretches/${sl}" class="related-card">
        <div class="rc-name">${s.name}</div>
        <div class="rc-meta">${modMeta.label || s.modality}${focusLabels ? ' · ' + focusLabels : ''}</div>
      </a>`;
  }).join('');
  return `
    <section class="related-section">
      <h2>Related Stretches</h2>
      <div class="related-grid">${cards}</div>
    </section>`;
}

// ── Inject JSON-LD ────────────────────────────────────────────────────────────
function injectJsonLd(data) {
  const existing = document.getElementById('structured-data');
  if (existing) existing.remove();
  const script = document.createElement('script');
  script.id = 'structured-data';
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(data);
  document.head.appendChild(script);
}

// ── Main page render ──────────────────────────────────────────────────────────
function renderStretchPage() {
  const slug = getSlug();
  const headerEl = document.getElementById('stretch-header');
  const bodyEl   = document.getElementById('stretch-body');

  if (!slug) {
    headerEl.classList.remove('loading');
    headerEl.innerHTML = '<p class="text-muted">No stretch specified.</p>';
    return;
  }

  const matches = findStretchBySlug(slug);

  if (!matches.length) {
    headerEl.classList.remove('loading');
    headerEl.innerHTML = `
      <div style="padding:3rem 0;text-align:center;">
        <p style="font-size:1.1rem;color:var(--text-muted,#888)">Stretch not found: <strong>${slug}</strong></p>
        <a href="/stretch" style="color:var(--or,#C41212);margin-top:1rem;display:inline-block;">← Back to Stretch Generator</a>
      </div>`;
    return;
  }

  // Primary entry (first match); collect all modalities for this name
  const primary = matches[0];
  const modalities = [...new Set(matches.map(m => m.modality))];
  const displayName = primary.name;

  // Merge levels across all modality entries for this stretch
  const allLevels = [...new Set(matches.flatMap(m => m.level || []))];

  // Get rich content
  const content = (typeof STRETCH_CONTENT !== 'undefined' && STRETCH_CONTENT[slug]) || null;

  // ── Update SEO meta ──────────────────────────────────────────────
  const canonicalPath = `https://homewodrx.com/stretches/${slug}`;
  document.title = `${displayName} - Stretch Guide & Coaching Cues | HomeWODrx`;
  const metaDesc = content?.description
    ? content.description.substring(0, 155)
    : `Learn how to perform ${displayName}: step-by-step coaching cues and hold times by level on HomeWODrx.`;
  document.querySelector('meta[name="description"]').setAttribute('content', metaDesc);
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${displayName} - Stretch Guide | HomeWODrx`);
  document.querySelector('meta[property="og:description"]').setAttribute('content', metaDesc);
  document.getElementById('canonical-url').href = canonicalPath;
  document.querySelector('meta[property="og:url"]').setAttribute('content', canonicalPath);

  if (content?.youtube) {
    const ogImg = `https://img.youtube.com/vi/${content.youtube}/maxresdefault.jpg`;
    document.getElementById('og-image').setAttribute('content', ogImg);
    document.getElementById('og-image-width').setAttribute('content', '1280');
    document.getElementById('og-image-height').setAttribute('content', '720');
    document.getElementById('twitter-image').setAttribute('content', ogImg);
  }

  // ── JSON-LD structured data ──────────────────────────────────────
  const cues = content?.cues || [];
  injectJsonLd([
    {
      '@context': 'https://schema.org',
      '@type': 'HowTo',
      'name': `How to Do ${displayName}`,
      'description': metaDesc,
      'url': canonicalPath,
      ...(cues.length ? {
        'step': cues.map((cue, i) => ({
          '@type': 'HowToStep',
          'position': i + 1,
          'text': cue,
        }))
      } : {}),
    },
    {
      '@context': 'https://schema.org',
      '@type': 'BreadcrumbList',
      'itemListElement': [
        { '@type': 'ListItem', 'position': 1, 'name': 'Home',             'item': 'https://homewodrx.com/' },
        { '@type': 'ListItem', 'position': 2, 'name': 'Stretch Generator','item': 'https://homewodrx.com/stretch' },
        { '@type': 'ListItem', 'position': 3, 'name': displayName,        'item': canonicalPath },
      ],
    },
  ]);

  // ── Build modality badges ────────────────────────────────────────
  const modBadges = modalities.map(m => {
    const meta = MODALITY_META[m] || { label: m, cls: '' };
    return `<span class="sbadge ${meta.cls}">${meta.emoji} ${meta.label}</span>`;
  }).join('');

  // ── Build level badges ───────────────────────────────────────────
  const levelOrder = ['b','i','a'];
  const levelBadges = levelOrder
    .filter(lv => allLevels.includes(lv))
    .map(lv => `<span class="sbadge ${LEVEL_META[lv].cls}">${LEVEL_META[lv].label}</span>`)
    .join('');

  // ── Build focus badges ───────────────────────────────────────────
  const focusAreas = [...new Set(matches.flatMap(m => m.focus || []))];
  const focusBadges = focusAreas.map(f => {
    const meta = FOCUS_META[f] || { label: f, emoji: '' };
    return `<span class="sbadge sbadge-focus">${meta.emoji} ${meta.label}</span>`;
  }).join('');

  // ── PNF callout ──────────────────────────────────────────────────
  const pnfNote = primary.pnfNote;
  const pnfHtml = pnfNote ? `
    <div class="pnf-callout">
      <span class="pnf-icon">💡</span>
      <div class="pnf-body">
        <strong>Contract-Relax Technique</strong>
        <p>${pnfNote} — Contract the muscle isometrically for 5 seconds, relax fully, then deepen the stretch. Repeat 2–3 cycles per side.</p>
      </div>
    </div>` : '';

  // ── Coaching cues ────────────────────────────────────────────────
  const cuesHtml = cues.length
    ? `<div class="coaching-cues">
        <h3>Step-by-Step Coaching Cues</h3>
        <ol class="cue-list">
          ${cues.map((cue, i) => `
            <li>
              <span class="cue-num">${i + 1}</span>
              <span>${cue}</span>
            </li>`).join('')}
        </ol>
      </div>`
    : `<div class="coaching-cues">
        <h3>Coach's Tip</h3>
        <p style="line-height:1.6;color:var(--text-muted,#bbb);">${primary.tip}</p>
      </div>`;

  // ── Related stretches ────────────────────────────────────────────
  const related = findRelated(slug, focusAreas);
  const relatedHtml = buildRelatedCards(related);

  // ── Render hero ──────────────────────────────────────────────────
  headerEl.classList.remove('loading');
  headerEl.innerHTML = `
    <div class="stretch-hero">
      <div class="breadcrumb">
        <a href="/stretch">Stretch Generator</a> › ${displayName}
      </div>
      <h1>${displayName}</h1>
      <div class="badge-row">
        ${modBadges}
        ${levelBadges}
        ${focusBadges}
      </div>
      ${content?.description
        ? `<p class="stretch-description">${content.description}</p>`
        : `<p class="stretch-description">${primary.tip}</p>`}
      <div class="share-bar">
        <span class="share-bar-label">Share:</span>
        <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(displayName+' stretch guide on HomeWODrx 🧘')}&url=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" class="share-btn">𝕏 Post</a>
        <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" class="share-btn">f Share</a>
        <button class="share-btn" onclick="copyShareLink(this)">🔗 Copy Link</button>
      </div>
    </div>`;

  // ── Render body ──────────────────────────────────────────────────
  bodyEl.style.display = 'block';
  bodyEl.innerHTML = `
    ${buildHoldTable(primary)}
    ${pnfHtml}
    ${cuesHtml}
    ${buildVideoSection(displayName, content?.youtube || null)}
    ${buildRecoverySection()}
    ${relatedHtml}
    <div class="generator-cta">
      <h3>Build Your Custom Stretch Session</h3>
      <p>Choose your focus area, duration, and level — get a personalized stretch routine in seconds.</p>
      <a href="/stretch" class="btn btn-primary">Open Stretch Generator →</a>
    </div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', renderStretchPage);
</script>
</body>
</html>
