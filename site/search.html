<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let allWorkouts = [];
let filteredWorkouts = [];
let displayCount = 12;
const PAGE_SIZE = 12;

let filters = {
  query:      '',
  format:     'all',
  difficulty: 'all',
  focus:      'all',
  scoring:    'all',
  duration:   'all',
  equipment:  new Set(),
  modality:   new Set()
};

// ─────────────────────────────────────────────
//  EQUIPMENT KEY → LABEL MAP
// ─────────────────────────────────────────────
const EQ_LABEL = {
  bodyweight:      'Bodyweight',
  barbell:         'Barbell',
  dumbbell:        'Dumbbell',
  kettlebell:      'Kettlebell',
  pullUpBar:       'Pull-Up Bar',
  jumpRope:        'Jump Rope',
  rings:           'Rings',
  rowingMachine:   'Rower',
  assaultBike:     'Air Bike',
  box:             'Box',
  medBall:         'Med Ball',
  resistanceBands: 'Resistance Bands'
};

// ─────────────────────────────────────────────
//  DAILY WOD GENERATOR (last N days)
// ─────────────────────────────────────────────
async function generateRecentDailyWods(days) {
  if (typeof DailyWOD === 'undefined') return [];
  const wods = [];
  const today = new Date();
  const [config, movementDB] = await Promise.all([
    DailyWOD.getConfig().catch(() => DailyWOD.defaultConfig),
    DailyWOD._loadMovements().catch(() => ({}))
  ]);
  for (let i = 0; i < days; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    try {
      const dayOfWeek = new Date(dateStr + 'T12:00:00').getDay();
      const seed       = DailyWOD.getSeedForDate(dateStr);
      const rng        = DailyWOD.seededRng(seed);
      const difficulty = config.difficultyByDay[dayOfWeek] || 'intermediate';
      const bodyFocus  = config.bodyFocusByDay[dayOfWeek]  || 'full-body';
      const format     = config.formatByDay[dayOfWeek]     || 'amrap';
      const durRange   = config.durationByDay[dayOfWeek]   || [20, 30];
      const duration   = durRange[0] + Math.floor(rng() * (durRange[1] - durRange[0] + 1));
      const equipment  = config.equipment || ['bodyweight'];
      const pool = DailyWOD._buildPool(equipment, difficulty, bodyFocus, rng, movementDB);
      let wod;
      if (format === 'amrap')        wod = DailyWOD._genAMRAP(pool, difficulty, duration, bodyFocus, rng);
      else if (format === 'emom')    wod = DailyWOD._genEMOM(pool, difficulty, duration, bodyFocus, rng);
      else if (format === 'fortime') wod = DailyWOD._genForTime(pool, difficulty, rng);
      else                           wod = DailyWOD._genCircuit(pool, difficulty, duration, bodyFocus, rng);
      if (wod) {
        const dateLabel = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        wods.push({
          id:         dateStr,
          slug:       dateStr,
          title:      `Daily WOD — ${dateLabel}`,
          category:   'daily',
          format:     wod.format,
          difficulty: difficulty,
          body_focus: bodyFocus,
          duration:   duration,
          movements:  (wod.rows || []).map(r => ({ movement: r.movement, reps: r.reps || '' })),
          description: (wod.rows || []).map(r => `${r.reps ? r.reps + ' ' : ''}${r.movement}`).join(', '),
          _date:      dateStr
        });
      }
    } catch (e) { /* skip this date */ }
  }
  return wods;
}

// ─────────────────────────────────────────────
//  LOAD DATA
// ─────────────────────────────────────────────
async function loadAllWorkouts() {
  // Start with benchmarks (live from Supabase so youtube_url etc. are included)
  try {
    const liveBenchmarks = await db.getAllBenchmarks();
    allWorkouts = (liveBenchmarks || []).map(b => ({
      ...b,
      id: b.slug,
      category: b.category || 'benchmark',
      title: b.name,
      movements: (b.movements || []).map(m => ({
        movement: m.name || m.movement || '',
        reps: m.reps || '',
        tip: m.tip || ''
      }))
    }));
  } catch (e) {
    // Fall back to static array if Supabase is unavailable
    allWorkouts = BENCHMARKS.map(b => ({
      ...b,
      id: b.slug,
      category: b.category || 'benchmark',
      title: b.name,
      movements: (b.movements || []).map(m => ({
        movement: m.name || m.movement || '',
        reps: m.reps || '',
        tip: m.tip || ''
      }))
    }));
  }

  // Add user-generated public workouts from Supabase
  try {
    const userWorkouts = await db.getWorkouts({ isPublic: true, limit: 1000 });
    if (userWorkouts && userWorkouts.length > 0) {
      allWorkouts = allWorkouts.concat(userWorkouts.map(w => ({
        ...w,
        title: w.title || w.name,
        category: 'user',
        slug: w.id,
        difficulty: w.level,
        duration_estimate: w.duration ? `${w.duration} min` : null,
        movements: (w.movements || []).map(m => ({
          movement: m.movement || m.name || '',
          reps: m.reps || '',
          tip: m.tip || ''
        }))
      })));
    }
  } catch (e) {
    console.warn('Could not load user workouts:', e);
  }

  // Add last 365 days of daily WODs for searchable content
  try {
    const dailyWods = await generateRecentDailyWods(365);
    if (dailyWods.length > 0) {
      allWorkouts = allWorkouts.concat(dailyWods);
    }
  } catch (e) {
    console.warn('Could not generate daily WODs:', e);
  }

  runSearch();
}

// ─────────────────────────────────────────────
//  SEARCH + FILTER ENGINE
// ─────────────────────────────────────────────
function scoreWorkout(w, query) {
  if (!query) return 1;
  const q = query.toLowerCase();
  const terms = q.split(/\s+/).filter(Boolean);
  let score = 0;

  const title  = (w.title || w.name || '').toLowerCase();
  const desc   = (w.description || '').toLowerCase();
  const mvs    = (w.movements || []).map(m => (m.movement || '').toLowerCase()).join(' ');
  const format = (w.format || '').toLowerCase();
  const eq     = (w.equipment || []).join(' ').toLowerCase();
  const cat    = (w.category || '').toLowerCase();

  for (const t of terms) {
    if (title.includes(t))  score += 10;
    if (title === t)        score += 20;   // exact title match
    if (mvs.includes(t))    score += 6;
    if (format.includes(t)) score += 4;
    if (desc.includes(t))   score += 2;
    if (eq.includes(t))     score += 2;
    if (cat.includes(t))    score += 1;
  }
  return score;
}

function matchesDuration(w) {
  if (filters.duration === 'all') return true;
  // Try numeric duration first (user workouts have `duration` in minutes)
  // Benchmarks have `duration_estimate` like "8–15 min"
  let mins = null;
  if (typeof w.duration === 'number') {
    mins = w.duration;
  } else if (w.duration_estimate) {
    const m = w.duration_estimate.match(/(\d+)/);
    if (m) mins = parseInt(m[1]);
  }
  if (mins === null) return true; // unknown → include

  if (filters.duration === '0-10')  return mins < 10;
  if (filters.duration === '10-20') return mins >= 10 && mins <= 20;
  if (filters.duration === '20-30') return mins > 20 && mins <= 30;
  if (filters.duration === '30+')   return mins > 30;
  return true;
}

// Maps chip keys to all possible stored equivalents (data is inconsistent across benchmarks/generator/user workouts)
const EQ_ALIASES = {
  dumbbell:        ['dumbbell', 'dumbbells'],
  rowingMachine:   ['rowingmachine', 'rower'],
  medBall:         ['medball', 'wallball', 'wall ball', 'med ball', 'medicineball', 'medicine ball'],
  resistanceBands: ['resistancebands', 'resistance bands', 'resistance band', 'bands'],
  assaultBike:     ['assaultbike', 'assault bike', 'echo bike', 'bike erg', 'airbike', 'air bike', 'airdyne', 'fan bike']
};

function matchesEquipment(w) {
  if (filters.equipment.size === 0) return true;
  const weq = (w.equipment || []).map(e => e.toLowerCase());
  for (const eq of filters.equipment) {
    const aliases = EQ_ALIASES[eq] || [eq.toLowerCase()];
    const found = aliases.some(alias => weq.includes(alias));
    if (!found) return false;
  }
  return true;
}

const MODALITY_KEYWORDS = {
  run:        ['run'],
  row:        ['row'],
  bike:       ['bike', 'assault'],
  ski:        ['ski'],
  jumprope:   ['double-under', 'double under', 'jump rope', 'single under'],
  gymnastics: ['pull-up', 'pull up', 'muscle-up', 'muscle up', 'handstand',
               'ring dip', 'rope climb', 'toes-to-bar', 'toes to bar',
               'chest-to-bar', 'bar dip'],
  olympic:    ['clean', 'snatch', 'jerk', 'thruster'],
  carries:    ['carry', 'farmer', 'sandbag', 'yoke', 'suitcase'],
  burpees:    ['burpee']
};

function matchesModality(w) {
  if (filters.modality.size === 0) return true;
  // Search both movement names and description for modality keywords
  const mvText = (w.movements || []).map(m => (m.movement || '').toLowerCase()).join(' ');
  const searchText = mvText + ' ' + (w.description || '').toLowerCase();
  for (const mod of filters.modality) {
    const keywords = MODALITY_KEYWORDS[mod] || [mod];
    const found = keywords.some(kw => searchText.includes(kw));
    if (!found) return false;
  }
  return true;
}

function runSearch() {
  const q = filters.query.trim();

  filteredWorkouts = allWorkouts.filter(w => {
    // Full-text query
    if (q) {
      const score = scoreWorkout(w, q);
      if (score === 0) return false;
      w._score = score;
    } else {
      w._score = 0;
    }

    // Chip filters
    if (filters.format !== 'all' && (w.format || '').toLowerCase() !== filters.format.toLowerCase()) return false;
    if (filters.difficulty !== 'all' && (w.difficulty || '') !== filters.difficulty) return false;
    if (filters.focus !== 'all') {
      const wFocus = (w.body_focus || '');
      if (wFocus !== filters.focus) return false;
    }
    if (filters.scoring !== 'all' && (w.scoring_type || '') !== filters.scoring) return false;
    if (!matchesDuration(w)) return false;
    if (!matchesEquipment(w)) return false;
    if (!matchesModality(w)) return false;

    return true;
  });

  // Sort
  const sort = document.getElementById('sort-select').value;
  filteredWorkouts.sort((a, b) => {
    if (sort === 'relevance') {
      return (b._score || 0) - (a._score || 0);
    } else if (sort === 'popular') {
      return (b.view_count || 0) - (a.view_count || 0);
    } else if (sort === 'az') {
      return (a.title || a.name || '').localeCompare(b.title || b.name || '');
    } else if (sort === 'duration-asc') {
      return getDurationMins(a) - getDurationMins(b);
    } else if (sort === 'duration-desc') {
      return getDurationMins(b) - getDurationMins(a);
    } else {
      // newest: user workouts first, then benchmarks
      const aIsUser = a.category === 'user' ? 1 : 0;
      const bIsUser = b.category === 'user' ? 1 : 0;
      if (bIsUser !== aIsUser) return bIsUser - aIsUser;
      if (a.created_at && b.created_at) return new Date(b.created_at) - new Date(a.created_at);
      return 0;
    }
  });

  displayCount = PAGE_SIZE;
  renderResults();
  renderActiveFilters();
  updateFilterBadge();
}

function getDurationMins(w) {
  if (typeof w.duration === 'number') return w.duration;
  if (w.duration_estimate) {
    const m = w.duration_estimate.match(/(\d+)/);
    if (m) return parseInt(m[1]);
  }
  return 999;
}

// ─────────────────────────────────────────────
//  RENDER RESULTS
// ─────────────────────────────────────────────
function hl(text, query) {
  if (!query || !text) return escHtml(text || '');
  const terms = query.trim().split(/\s+/).filter(Boolean);
  let result = escHtml(text);
  for (const t of terms) {
    const re = new RegExp(`(${escRe(t)})`, 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function difficultyBadge(d) {
  if (!d) return '';
  const cls = d === 'beginner' ? 'badge-success' : d === 'advanced' ? 'badge-danger' : 'badge-warning';
  return `<span class="badge ${cls}">${d.charAt(0).toUpperCase() + d.slice(1)}</span>`;
}

function categoryBadge(cat) {
  if (cat === 'girl')      return '<span class="badge badge-girl">Girl WOD</span>';
  if (cat === 'hero')      return '<span class="badge badge-hero">Hero WOD</span>';
  if (cat === 'open')      return '<span class="badge badge-open">Open WOD</span>';
  if (cat === 'games')     return '<span class="badge badge-games">Games WOD</span>';
  if (cat === 'partner')   return '<span class="badge badge-partner">Partner WOD</span>';
  if (cat === 'benchmark') return '<span class="badge badge-benchmark">Benchmark</span>';
  if (cat === 'user')      return '<span class="badge badge-success">Community</span>';
  if (cat === 'daily')     return '<span class="badge badge-orange">Daily WOD</span>';
  return '';
}

function renderResults() {
  const container = document.getElementById('results-container');
  const q = filters.query.trim();
  const displayed = filteredWorkouts.slice(0, displayCount);

  // Update count
  const total = filteredWorkouts.length;
  const countEl = document.getElementById('results-count');
  if (q || hasActiveFilters()) {
    countEl.innerHTML = `<strong>${total}</strong> result${total !== 1 ? 's' : ''}`;
  } else {
    countEl.innerHTML = `<strong>${total}</strong> workouts`;
  }

  if (displayed.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No workouts found</h3>
        <p>Try a different search term or adjust your filters.</p>
      </div>`;
    document.getElementById('load-more-btn').style.display = 'none';
    return;
  }

  container.innerHTML = displayed.map(w => {
    const isUser  = w.category === 'user';
    const isDaily = w.category === 'daily';
    const href = isDaily  ? `/daily-wod.html?date=${w._date}`
               : isUser   ? `/workout.html?id=${w.id}`
               :             `/workout.html?slug=${w.slug}`;
    const title  = w.title || w.name || '';
    const mvNames = (w.movements || []).slice(0, 4).map(m => m.movement).filter(Boolean);
    const mvText  = mvNames.length > 0
      ? hl(mvNames.join(', '), q) + (w.movements.length > 4 ? ` +${w.movements.length - 4} more` : '')
      : '<em style="opacity:.5">No movements listed</em>';

    const dur = w.duration ? `${w.duration} min` : (w.duration_estimate || '');

    return `
      <a href="${href}" style="text-decoration:none;display:flex;flex-direction:column;">
        <div class="card result-card">
          <h4>${hl(title, q)}</h4>
          <div class="result-meta">
            ${w.format ? `<span>📋 ${escHtml(w.format)}</span>` : ''}
            ${dur       ? `<span>⏱ ${escHtml(dur)}</span>` : ''}
            ${w.body_focus ? `<span>🎯 ${escHtml(w.body_focus.replace(/-/g,' '))}</span>` : ''}
          </div>
          <div class="result-movements">${mvText}</div>
          <div class="result-footer">
            ${categoryBadge(w.category)}
            ${difficultyBadge(w.difficulty)}
            ${w.youtube_url ? '<span class="badge badge-video">▶ Video</span>' : ''}
          </div>
        </div>
      </a>`;
  }).join('');

  const btn = document.getElementById('load-more-btn');
  btn.style.display = filteredWorkouts.length > displayCount ? 'inline-block' : 'none';
}

// ─────────────────────────────────────────────
//  ACTIVE FILTER PILLS
// ─────────────────────────────────────────────
function hasActiveFilters() {
  return filters.format !== 'all' ||
    filters.difficulty !== 'all' ||
    filters.focus !== 'all' ||
    filters.scoring !== 'all' ||
    filters.duration !== 'all' ||
    filters.equipment.size > 0 ||
    filters.modality.size > 0;
}

function renderActiveFilters() {
  const wrap = document.getElementById('active-filters');
  const pills = [];

  if (filters.format !== 'all')
    pills.push({ label: `Format: ${filters.format}`, key: 'format' });
  if (filters.difficulty !== 'all')
    pills.push({ label: `Level: ${filters.difficulty}`, key: 'difficulty' });
  if (filters.focus !== 'all')
    pills.push({ label: `Focus: ${filters.focus.replace(/-/g,' ')}`, key: 'focus' });
  if (filters.scoring !== 'all')
    pills.push({ label: `Scoring: ${filters.scoring.replace(/_/g,' ')}`, key: 'scoring' });
  if (filters.duration !== 'all')
    pills.push({ label: `Duration: ${filters.duration === '0-10' ? '< 10 min' : filters.duration === '30+' ? '30+ min' : filters.duration + ' min'}`, key: 'duration' });
  for (const eq of filters.equipment)
    pills.push({ label: `Eq: ${EQ_LABEL[eq] || eq}`, key: 'eq:' + eq });

  const MOD_LABEL = {
    run: 'Running', row: 'Rowing', bike: 'Biking', ski: 'Skiing',
    jumprope: 'Jump Rope', gymnastics: 'Gymnastics',
    olympic: 'Olympic Lifting', carries: 'Carries', burpees: 'Burpees'
  };
  for (const mod of filters.modality)
    pills.push({ label: `Modality: ${MOD_LABEL[mod] || mod}`, key: 'mod:' + mod });

  wrap.innerHTML = pills.map(p =>
    `<button class="active-pill" data-clear="${escHtml(p.key)}">${escHtml(p.label)} <span class="pill-x">×</span></button>`
  ).join('');
}

function updateFilterBadge() {
  const count = [
    filters.format !== 'all',
    filters.difficulty !== 'all',
    filters.focus !== 'all',
    filters.scoring !== 'all',
    filters.duration !== 'all',
    ...Array.from(filters.equipment).map(() => true),
    ...Array.from(filters.modality).map(() => true)
  ].filter(Boolean).length;

  const badge = document.getElementById('filter-count-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function clearFilter(key) {
  if (key === 'format')     { filters.format = 'all'; setChipActive('format-filters', 'all', 'format'); }
  else if (key === 'difficulty') { filters.difficulty = 'all'; setChipActive('difficulty-filters', 'all', 'difficulty'); }
  else if (key === 'focus')      { filters.focus = 'all'; setChipActive('focus-filters', 'all', 'focus'); }
  else if (key === 'scoring')    { filters.scoring = 'all'; setChipActive('scoring-filters', 'all', 'scoring'); }
  else if (key === 'duration')   { filters.duration = 'all'; setDurChipActive('all'); }
  else if (key.startsWith('eq:')) {
    const eq = key.slice(3);
    filters.equipment.delete(eq);
    const chip = document.querySelector(`[data-eq="${eq}"]`);
    if (chip) chip.classList.remove('active');
  }
  else if (key.startsWith('mod:')) {
    const mod = key.slice(4);
    filters.modality.delete(mod);
    const chip = document.querySelector(`[data-mod="${mod}"]`);
    if (chip) chip.classList.remove('active');
  }
  runSearch();
}

function resetAllFilters() {
  filters.format     = 'all';
  filters.difficulty = 'all';
  filters.focus      = 'all';
  filters.scoring    = 'all';
  filters.duration   = 'all';
  filters.equipment  = new Set();
  filters.modality   = new Set();

  setChipActive('format-filters', 'all', 'format');
  setChipActive('difficulty-filters', 'all', 'difficulty');
  setChipActive('focus-filters', 'all', 'focus');
  setChipActive('scoring-filters', 'all', 'scoring');
  setDurChipActive('all');
  document.querySelectorAll('.eq-chip').forEach(c => c.classList.remove('active'));
  runSearch();
}

// ─────────────────────────────────────────────
//  CHIP HELPERS
// ─────────────────────────────────────────────
function setChipActive(groupId, value, attr) {
  document.querySelectorAll(`#${groupId} .chip`).forEach(c => {
    c.classList.toggle('active', c.dataset[attr] === value);
  });
}

function setDurChipActive(value) {
  document.querySelectorAll('#duration-filters .dur-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.duration === value);
  });
}

// ─────────────────────────────────────────────
//  EVENT LISTENERS
// ─────────────────────────────────────────────
function setupListeners() {
  // Main search input with debounce
  let debounceTimer;
  const searchInput = document.getElementById('main-search');
  const clearBtn    = document.getElementById('search-clear');

  searchInput.addEventListener('input', () => {
    filters.query = searchInput.value;
    clearBtn.style.display = filters.query ? 'block' : 'none';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runSearch, 280);
  });

  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    filters.query = '';
    clearBtn.style.display = 'none';
    runSearch();
    searchInput.focus();
  });

  // Pre-fill query from ?q= URL param
  const qParam = new URLSearchParams(window.location.search).get('q');
  if (qParam) {
    searchInput.value = qParam;
    filters.query = qParam;
    clearBtn.style.display = 'block';
  }

  // Advanced toggle
  document.getElementById('advanced-toggle').addEventListener('click', () => {
    const btn   = document.getElementById('advanced-toggle');
    const panel = document.getElementById('advanced-panel');
    btn.classList.toggle('open');
    panel.classList.toggle('open');
  });

  // Format chips
  document.querySelectorAll('#format-filters .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      filters.format = chip.dataset.format;
      setChipActive('format-filters', filters.format, 'format');
      runSearch();
    });
  });

  // Difficulty chips
  document.querySelectorAll('#difficulty-filters .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      filters.difficulty = chip.dataset.difficulty;
      setChipActive('difficulty-filters', filters.difficulty, 'difficulty');
      runSearch();
    });
  });

  // Focus chips
  document.querySelectorAll('#focus-filters .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      filters.focus = chip.dataset.focus;
      setChipActive('focus-filters', filters.focus, 'focus');
      runSearch();
    });
  });

  // Scoring chips
  document.querySelectorAll('#scoring-filters .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      filters.scoring = chip.dataset.scoring;
      setChipActive('scoring-filters', filters.scoring, 'scoring');
      runSearch();
    });
  });

  // Duration chips
  document.querySelectorAll('#duration-filters .dur-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      filters.duration = chip.dataset.duration;
      setDurChipActive(filters.duration);
      runSearch();
    });
  });

  // Equipment chips (multi-select toggle)
  document.querySelectorAll('#equipment-filters .eq-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const eq = chip.dataset.eq;
      if (filters.equipment.has(eq)) {
        filters.equipment.delete(eq);
        chip.classList.remove('active');
      } else {
        filters.equipment.add(eq);
        chip.classList.add('active');
      }
      runSearch();
    });
  });

  // Modality chips (multi-select toggle)
  document.querySelectorAll('#modality-filters .eq-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const mod = chip.dataset.mod;
      if (filters.modality.has(mod)) {
        filters.modality.delete(mod);
        chip.classList.remove('active');
      } else {
        filters.modality.add(mod);
        chip.classList.add('active');
      }
      runSearch();
    });
  });

  // Active filter pill clear
  document.getElementById('active-filters').addEventListener('click', e => {
    const pill = e.target.closest('.active-pill');
    if (pill) clearFilter(pill.dataset.clear);
  });

  // Reset all
  document.getElementById('reset-filters').addEventListener('click', resetAllFilters);

  // Sort
  document.getElementById('sort-select').addEventListener('change', runSearch);

  // Load more
  document.getElementById('load-more-btn').addEventListener('click', () => {
    displayCount += PAGE_SIZE;
    renderResults();
  });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setupListeners();
  loadAllWorkouts();
});
</script>
</body>
</html>
