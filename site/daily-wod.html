/* ══ PAGE HEADER ══ */
.page-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 24px 24px 28px; }
.page-header-inner { max-width: 1200px; margin: 0 auto; }
.breadcrumb { font-size: .78rem; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.breadcrumb a { color: var(--muted); text-decoration: none; }
.breadcrumb a:hover { color: var(--or); }
.breadcrumb span { opacity: .4; }
.d20-live-badge { display: inline-flex; align-items: center; gap: 6px; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--or); margin-bottom: 8px; }
.d20-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--or); animation: d20pulse 2s infinite; }
@keyframes d20pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.wod-ph-title { font-family: var(--font-head); font-size: clamp(2rem,5vw,3.2rem); letter-spacing: .04em; line-height: 1; color: var(--text); margin-bottom: 0; }
.wod-ph-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-size: .82rem; color: var(--muted); font-weight: 500; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 14px; }

/* ══ LAYOUT ══ */
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 80px; }
.hero-row { display: grid; grid-template-columns: 1fr 300px; gap: 20px; margin-bottom: 20px; align-items: start; }
.hero-left { display: flex; flex-direction: column; gap: 12px; }
.equip-below-wb { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.equip-below-label { font-family: var(--font-head); font-size: .9rem; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; flex-shrink: 0; }

/* ══ WOD HERO CARD ══ */
.wod-hero-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px 24px; box-shadow: var(--shadow); }
.wod-move-list { list-style: none; margin-bottom: 0; padding: 0; display: table; width: 100%; border-collapse: collapse; }
.wod-move-row { display: table-row; }
.wod-reps { display: table-cell; font-family: var(--font-head); font-size: 1.55rem; color: var(--or); letter-spacing: .04em; line-height: 1; white-space: nowrap; text-align: left; padding: 7px 20px 7px 0; border-bottom: 1px solid #f3f3f3; vertical-align: middle; }
.wod-move-link { display: table-cell; font-size: 1.05rem; font-weight: 600; color: var(--text); text-decoration: none; transition: color .15s; padding: 7px 0; border-bottom: 1px solid #f3f3f3; vertical-align: middle; }
.wod-move-link:hover { color: var(--or); }
.wod-load { font-size: .82rem; color: var(--muted); font-weight: 500; margin-left: 8px; white-space: nowrap; }
.wod-format-desc { font-size: .88rem; color: var(--muted); margin: 0 0 14px; line-height: 1.5; }
.wod-score-note { font-size: .82rem; color: var(--muted); padding: 10px 0 0; }

/* ══ META STACK ══ */
.meta-stack { display: flex; flex-direction: column; gap: 12px; }
.cta-card { background: var(--or); border-radius: var(--radius); padding: 20px; text-align: center; box-shadow: 0 4px 16px rgba(196,18,18,.25); }
.cta-card h3 { font-family: var(--font-head); font-size: 1.5rem; color: white; letter-spacing: .06em; margin-bottom: 6px; }
.cta-card p { font-size: .8rem; color: rgba(255,255,255,.75); margin-bottom: 14px; }
.cta-btn { display: inline-block; width: 100%; background: white; color: var(--or); font-family: var(--font-head); font-size: 1.1rem; letter-spacing: .06em; padding: 10px; border-radius: 7px; border: none; cursor: pointer; transition: background .15s; }
.cta-btn:hover { background: #f5e5e5; }
.action-col { display: flex; flex-direction: column; gap: 8px; }
.action-btn { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--white); font-size: .84rem; font-weight: 700; color: var(--text); text-decoration: none; cursor: pointer; font-family: var(--font-body); transition: all .15s; box-shadow: var(--shadow); width: 100%; }
.action-btn:hover { border-color: var(--or); color: var(--or); background: var(--or-xlight); }
.action-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ══ SHARE CARD ══ */
.share-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
.share-title { font-family: var(--font-head); font-size: .9rem; letter-spacing: .06em; color: var(--muted); padding: 14px 18px 0; text-transform: uppercase; }
.share-pill-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
.share-pill { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: none; font-family: var(--font-body); font-size: .82rem; font-weight: 600; color: var(--text); cursor: pointer; transition: border-color .15s, color .15s, background .15s; text-align: left; width: 100%; }
.share-pill svg { width: 16px; height: 16px; flex-shrink: 0; }
.share-x:hover    { border-color: #000; color: #000; background: #f5f5f5; }
.share-fb:hover   { border-color: #1877f2; color: #1877f2; background: #f0f4ff; }
.share-wa:hover   { border-color: #25d366; color: #25d366; background: #f0fdf4; }
.share-copy:hover { border-color: var(--or); color: var(--or); background: var(--or-xlight); }
.share-pill.copied { border-color: #16a34a; color: #16a34a; background: #f0fdf4; }

/* ══ BENTO ══ */
/* ── Warm-Up / Cool-Down prep rows ── */
.prep-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; font-size: .875rem; gap: 8px; }
.prep-row:last-child { border-bottom: none; }
.prep-row:hover .prep-name { color: var(--or); }
.prep-name { font-weight: 500; }
.prep-reps { color: var(--muted); font-size: .78rem; white-space: nowrap; flex-shrink: 0; }
.bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; grid-auto-flow: dense; }
.span3 { grid-column: span 3; }
.span6 { grid-column: span 6; }
.bc { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 22px 24px; box-shadow: var(--shadow); }
.bc-head { font-family: var(--font-head); font-size: 1.2rem; letter-spacing: .06em; margin-bottom: 14px; color: var(--text); display: flex; align-items: center; gap: 10px; }
.bc-head .icon { width: 28px; height: 28px; border-radius: 6px; background: var(--or-xlight); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--or); }
/* Movement-grouped coaching cues (Daily 20 style) */
.mv-cue-list { display: flex; flex-direction: column; gap: 10px; }
.mv-cue-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 8px; background: #f9f9f9; border: 1px solid var(--border); }
.mv-cue-icon { flex-shrink: 0; width: 28px; height: 28px; border-radius: 6px; background: var(--or-xlight); border: 1px solid #f5cece; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.mv-cue-body { display: flex; flex-direction: column; gap: 2px; }
.mv-cue-name { font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--or); }
.mv-cue-tip { font-size: .875rem; color: var(--text); line-height: 1.45; }
/* Related WODs */
.related-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.rel-card { display: flex; flex-direction: column; gap: 8px; padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); background: #fafafa; text-decoration: none; color: var(--text); transition: all .15s; }
.rel-card:hover { border-color: var(--or); background: var(--or-xlight); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(196,18,18,.12); }
.rel-badge { font-size: .62rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; padding: 2px 8px; border-radius: 4px; align-self: flex-start; }
.rb-girl      { background: #fce7f3; color: #9d174d; }
.rb-hero      { background: #dbeafe; color: #1e40af; }
.rb-benchmark { background: var(--or-xlight); color: var(--or); }
.rb-open      { background: #d1fae5; color: #065f46; }
.rb-games     { background: #fff3e0; color: #e65100; }
.rb-partner   { background: #f3e8ff; color: #7b1fa2; }
.rel-name { font-family: var(--font-head); font-size: 1.4rem; letter-spacing: .04em; line-height: 1; }
.rel-card:hover .rel-name { color: var(--or); }
.rel-desc { font-size: .75rem; color: var(--muted); line-height: 1.4; flex: 1; }
.rel-arrow { font-size: .8rem; color: var(--muted); align-self: flex-end; margin-top: 4px; }
.rel-card:hover .rel-arrow { color: var(--or); }
.scale-row { display: flex; align-items: baseline; gap: 10px; font-size: .875rem; line-height: 1.8; border-bottom: 1px solid #f5f5f5; padding: 4px 0; }
.scale-row:last-child { border: none; }
.scale-mv { font-weight: 600; flex: 1; }
.scale-rx { color: var(--or); font-weight: 700; font-size: .8rem; white-space: nowrap; }
.equip-chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: #fafafa; font-size: .82rem; font-weight: 600; color: var(--text); text-decoration: none; transition: all .15s; }
.equip-chip:hover { border-color: var(--or); color: var(--or); background: var(--or-xlight); }
.equip-chips-wrap { display: flex; flex-wrap: wrap; gap: 9px; }
.equip-section-note { font-size: .78rem; color: var(--muted); margin-bottom: 14px; }
.scale-tab { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: .78rem; font-weight: 700; cursor: pointer; font-family: var(--font-body); background: none; color: var(--muted); transition: all .15s; }
.scale-tab.active { background: var(--or); color: white; border-color: var(--or); }
.scale-tab:hover:not(.active) { border-color: var(--or); color: var(--or); }

/* ══ RESULT MODAL ══ */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.55); align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.active { display: flex; }

/* ══ RESPONSIVE ══ */
@media (max-width: 899px) {
  .hero-row { grid-template-columns: 1fr; }
  .meta-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .action-col { flex-direction: row; flex-wrap: wrap; }
  .action-btn { width: auto; }
  .bento { grid-template-columns: repeat(2, 1fr); }
  .span3, .span6 { grid-column: span 2; }
  .related-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 767px) {
  .page-header { padding: 16px 16px 20px; }
  .page-wrap { padding: 16px 14px 80px; }
  .wod-hero-card { padding: 20px 18px 18px; }
  .meta-stack { display: flex; flex-direction: column; gap: 10px; }
  .bento { grid-template-columns: 1fr; gap: 12px; }
  .span3, .span6 { grid-column: span 1; }
  .related-grid { grid-template-columns: repeat(3, 180px); overflow-x: auto; -webkit-overflow-scrolling: touch; }
}

/* ══ ANIMATIONS ══ */
@keyframes slideInToast { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

<script>
  let currentWod = null;
  let leaderboardPeriod = 'day';

  // Local date string (YYYY-MM-DD) — avoids UTC offset returning "tomorrow" in US timezones
  function localDateStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // ── Amazon Affiliate ──────────────────────────────────────
  const AFFILIATE_TAG = 'homewodrx0f-20';
  const EQUIPMENT_LINKS = {
    'kettlebell': `https://www.amazon.com/s?k=kettlebell&tag=${AFFILIATE_TAG}`,
    'dumbbell': `https://www.amazon.com/s?k=dumbbell&tag=${AFFILIATE_TAG}`,
    'pull-up bar': `https://www.amazon.com/s?k=pull-up+bar&tag=${AFFILIATE_TAG}`,
    'jump rope': `https://www.amazon.com/s?k=crossfit+jump+rope&tag=${AFFILIATE_TAG}`,
    'resistance bands': `https://www.amazon.com/s?k=resistance+bands&tag=${AFFILIATE_TAG}`,
    'barbell': `https://www.amazon.com/s?k=barbell&tag=${AFFILIATE_TAG}`,
    'box': `https://www.amazon.com/s?k=plyo+box&tag=${AFFILIATE_TAG}`,
    'medicine ball': `https://www.amazon.com/s?k=medicine+ball&tag=${AFFILIATE_TAG}`,
    'rings': `https://www.amazon.com/s?k=gymnastics+rings&tag=${AFFILIATE_TAG}`,
    'slam ball': `https://www.amazon.com/s?k=slam+ball&tag=${AFFILIATE_TAG}`,
    'slamball': `https://www.amazon.com/s?k=slam+ball&tag=${AFFILIATE_TAG}`,
    'treadmill': `https://www.amazon.com/s?k=treadmill+home+gym&tag=${AFFILIATE_TAG}`,
    'running': `https://www.amazon.com/s?k=treadmill+home+gym&tag=${AFFILIATE_TAG}`,
    'rower': `https://www.amazon.com/s?k=rowing+machine+home+gym&tag=${AFFILIATE_TAG}`,
    'rowing machine': `https://www.amazon.com/s?k=rowing+machine+home+gym&tag=${AFFILIATE_TAG}`,
    'assault bike': `https://www.amazon.com/s?k=assault+air+bike&tag=${AFFILIATE_TAG}`,
    'assaultbike': `https://www.amazon.com/s?k=assault+air+bike&tag=${AFFILIATE_TAG}`,
    'airdyne': `https://www.amazon.com/s?k=airdyne+bike&tag=${AFFILIATE_TAG}`,
  };
  function getEquipmentLink(equipment) {
    const key = equipment.toLowerCase().trim();
    return EQUIPMENT_LINKS[key] || `https://www.amazon.com/s?k=${encodeURIComponent(equipment)}&tag=${AFFILIATE_TAG}`;
  }

  // Bodyweight essentials — shown on bodyweight-only WODs
  const BODYWEIGHT_ESSENTIALS = [
    { label: 'Exercise Mat',    url: `https://www.amazon.com/s?k=thick+exercise+mat+home+workout&tag=${AFFILIATE_TAG}` },
    { label: 'Ab Wheel',        url: `https://www.amazon.com/s?k=ab+roller+wheel&tag=${AFFILIATE_TAG}` },
    { label: 'Foam Roller',     url: `https://www.amazon.com/s?k=foam+roller+muscle+recovery&tag=${AFFILIATE_TAG}` },
    { label: 'Parallettes',     url: `https://www.amazon.com/s?k=parallettes+push+up&tag=${AFFILIATE_TAG}` },
    { label: 'Knee Sleeves',    url: `https://www.amazon.com/s?k=knee+sleeves+crossfit&tag=${AFFILIATE_TAG}` },
    { label: 'Workout Timer',   url: `https://www.amazon.com/s?k=interval+timer+crossfit&tag=${AFFILIATE_TAG}` },
  ];

  async function loadDailyWod() {
    const params = new URLSearchParams(window.location.search);
    const dateStr = params.get('date') || localDateStr();
    try {
      const wod = await DailyWOD.generate(dateStr);
      currentWod = wod;
      let allBenchmarks = [];
      try { allBenchmarks = (await db.getAllBenchmarks()) || []; } catch(e) {}
      renderDailyWod(wod, dateStr, allBenchmarks);
      document.title = 'Daily 20 – ' + dateStr + ' – HomeWodRx';
    } catch (err) {
      console.error('Error loading daily WOD:', err);
      document.getElementById('workout-main').innerHTML =
        '<div style="text-align:center;padding:80px 24px;color:var(--muted)">Error loading today\'s workout. Please refresh the page.</div>';
    }
  }

  function renderDailyWod(wod, dateStr, allBenchmarks) {
    var formatted = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    var fmtLabel  = {'amrap':'AMRAP','emom':'EMOM','fortime':'For Time','circuit':'Circuit'}[wod.format] || (wod.format||'').toUpperCase();
    var rows      = wod.rows || [];

    // Movement list
    var movesHtml = rows.map(function(r) {
      var mn  = r.movement || r.name || '';
      var rep = r.reps || r.duration || '';
      var slug = mn.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      return '<li class="wod-move-row">' +
        '<span class="wod-reps">' + escHtml(formatReps(rep)) + '</span>' +
        '<a href="/movements/' + slug + '" class="wod-move-link">' + escHtml(mn) + '</a>' +
      '</li>';
    }).join('');

    var scoreNote = wod.scoring
      ? wod.scoring
      : (wod.format === 'amrap' ? 'Total Rounds + Reps' : wod.format === 'fortime' ? 'Total Time' : 'Rounds + Reps');

    // Equipment chips below hero card
    var equip = wod.equipment || [];
    var equipBelowHtml = '';
    if (equip.length) {
      equipBelowHtml = '<div class="equip-below-wb"><span class="equip-below-label">Equipment:</span>' +
        equip.map(function(e) {
          return '<a class="equip-chip" href="' + getEquipmentLink(e) + '" target="_blank" rel="noopener sponsored">' + escHtml(cap(e)) + '</a>';
        }).join('') + '</div>';
    } else if (wod.isBodyweightOnly) {
      equipBelowHtml = '<div class="equip-below-wb"><span class="equip-below-label">Bodyweight only</span></div>';
    }

    // Gear bento card
    var gearCardHtml = '';
    if (equip.length) {
      gearCardHtml = '<div class="bc span6">' +

  async function loadDailyWarmupCooldown(wod) {
    var warmupCard        = document.getElementById('warmup-card');
    var cooldownCard      = document.getElementById('cooldown-card');
    var warmupContainer   = document.getElementById('warmup-container');
    var cooldownContainer = document.getElementById('cooldown-container');
    if (!warmupContainer && !cooldownContainer) return;
    if (!supabaseClient) return;

    try {
      // Collect movement names from the wod rows
      var wodMovNames = (wod.rows || []).map(function(r) {
        return (r.movement || r.name || '').replace(/\s*\([^)]*\)\s*/g, '').trim();
      }).filter(Boolean);
      if (!wodMovNames.length) return;

      // Fetch muscle_groups for the WOD's movements
      var movRes = await supabaseClient
        .from('movements')
        .select('name, muscle_groups')
        .in('name', wodMovNames);
      if (movRes.error || !movRes.data || !movRes.data.length) return;

      // Aggregate unique muscle group tags (exclude 'full' — too generic)
      var muscleSet = {};
      movRes.data.forEach(function(m) {
        (m.muscle_groups || []).forEach(function(mg) { if (mg !== 'full') muscleSet[mg] = true; });
      });
      var muscleTags = Object.keys(muscleSet);
      if (!muscleTags.length) return;

      // Fetch cool-down stretches overlapping WOD muscle groups
      var stretchRes = await supabaseClient
        .from('stretches')
        .select('name, slug, hold_intermediate')
        .overlaps('focus', muscleTags)
        .limit(5);

      // Fetch warm-up movements: eligible + overlaps muscle tags + not already in the WOD
      var warmupRes = await supabaseClient
        .from('movements')
        .select('name, slug')
        .eq('warmup_eligible', true)
        .overlaps('muscle_groups', muscleTags)
        .not('name', 'in', '(' + wodMovNames.map(function(n) { return '"' + n + '"'; }).join(',') + ')')
        .limit(4);

      // Render warm-up card
      if (warmupRes.data && warmupRes.data.length && warmupCard && warmupContainer) {
        warmupContainer.innerHTML = warmupRes.data.map(function(m) {
          return '<a class="prep-row" href="/movements/' + escHtml(m.slug || '') + '">' +
            '<span class="prep-name">' + escHtml(m.name) + '</span>' +
            '<span class="prep-reps">2–3 sets &times; 10 reps</span>' +
          '</a>';
        }).join('');
        warmupCard.style.display = '';
      }

      // Render cool-down card
      if (stretchRes.data && stretchRes.data.length && cooldownCard && cooldownContainer) {
        cooldownContainer.innerHTML = stretchRes.data.map(function(s) {
          var hold = s.hold_intermediate ? s.hold_intermediate + ' sec' : '30–45 sec';
          return '<a class="prep-row" href="/stretches/' + escHtml(s.slug || '') + '">' +
            '<span class="prep-name">' + escHtml(s.name) + '</span>' +
            '<span class="prep-reps">' + hold + '</span>' +
          '</a>';
        }).join('');
        cooldownCard.style.display = '';
      }
    } catch(e) {
      console.warn('loadDailyWarmupCooldown error:', e);
    }
  }

  function printWod() {
    const w = currentWod;
    if (!w) return;
    const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const cap = s => String(s||'').replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    const fmtLabel = ({'amrap':'AMRAP','emom':'EMOM','fortime':'For Time','circuit':'Circuit'})[w.format] || (w.format||'').toUpperCase();
    const rows = (w.rows||[]).map(r => `<tr><td><strong>${escH(r.movement||r.name||'')}</strong></td><td>${escH(r.reps||r.time||'')}</td><td style="color:#555">${escH(r.tip||'')}</td></tr>`).join('');
    const chips = [
      fmtLabel && `<span>${fmtLabel}</span>`,
      w.duration && `<span>${w.duration} min</span>`,
      w.difficulty && `<span>${cap(w.difficulty)}</span>`,
      w.bodyFocus && `<span>${cap(w.bodyFocus)}</span>`,
    ].filter(Boolean).join('');
    const scoring = w.scoring ? `<div class="pscore"><h4>Scoring</h4><p>${escH(w.scoring)}</p></div>` : '';
    const dateStr = new URLSearchParams(window.location.search).get('date') || localDateStr();
    const dateFmt = new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const pa = document.getElementById('print-area');

  function buildDailyTimerUrl(wod) {
    const modeMap  = { amrap: 'amrap', emom: 'emom', fortime: 'fortime', circuit: 'fortime' };
    const labelMap = { amrap: 'AMRAP', emom: 'EMOM', fortime: 'For Time', circuit: 'Circuit' };
    const mode     = modeMap[wod.format] || 'fortime';
    const fmtLabel = labelMap[wod.format] || 'Circuit';
    const duration = wod.duration || 20;
    const name     = encodeURIComponent(wod.title || 'Daily 20');
    const fmtEnc   = encodeURIComponent(fmtLabel);
    // Build moves list from row data so the timer whiteboard shows the WOD
    const movePairs = (wod.rows || []).map(function(r) {
      const mv  = r.movement || r.name || '';
      const rep = String(r.reps || r.duration || '');
      return rep + ':' + mv;
    });
    const movesStr = movePairs.length
      ? '&moves=' + encodeURIComponent(movePairs.join(','))
      : '';
    return '/timer.html?wod=' + name + '&format=' + fmtEnc + '&time=' + duration + movesStr + '&mode=' + mode;
  }

  function launchDailyTimer() {
    const wod = currentWod;
    if (!wod) return;
    // Persist WOD data so timer.html can load movements without a DB fetch
    try { sessionStorage.setItem('dailyWodForTimer', JSON.stringify(wod)); } catch(e) {}
    window.location.href = buildDailyTimerUrl(wod);
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatReps(r) {
    if (!r) return r;
    var s = String(r);
    // "60s" / "60S" → "60 seconds"
    s = s.replace(/(\d+)\s*s\b/gi, '$1 seconds');
    // "20m" → "20 meters" (guards against "min" and "meters")
    s = s.replace(/(\d+)\s*m\b(?!in|eters)/gi, '$1 meters');
    return s;
  }
  function cap(s) {
    return String(s||'').replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  function slugify(name) {
    return String(name||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  async function loadLeaderboard(period, dateStr) {
    dateStr = dateStr || localDateStr();
    leaderboardPeriod = period;
    var card      = document.getElementById('leaderboard-card');
    var container = document.getElementById('leaderboard-table');
    if (!container) return;
    if (card) card.style.display = '';
    container.innerHTML = '<div style="color:var(--muted);font-size:.85rem">Loading&hellip;</div>';
    try {
      var results = await db.getResults({ dailyWodDate: dateStr, limit: 100 });
      if (!results || !results.length) results = [];
      var now = new Date();
      if (period === 'week') {
        var weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7);
        results = results.filter(function(r) { return new Date(r.date) >= weekAgo; });
      } else if (period === 'day') {
        results = results.filter(function(r) { return (r.date || '').startsWith(dateStr); });
      }
      if (!results.length) {
        container.innerHTML = '<p style="color:var(--muted);font-size:.88rem">No results yet — be the first to log one!</p>';
        return;
      }
      results.sort(function(a, b) { return (a.score_seconds || 999999) - (b.score_seconds || 999999); });
      container.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:.82rem">' +
        '<thead><tr>' +
          '<th style="padding:7px 10px;text-align:left;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid var(--border)">Rank</th>' +
          '<th style="padding:7px 10px;text-align:left;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid var(--border)">Athlete</th>' +
          '<th style="padding:7px 10px;text-align:left;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid var(--border)">Score</th>' +
          '<th style="padding:7px 10px;text-align:left;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid var(--border)">Rx</th>' +
        '</tr></thead><tbody>' +
        results.slice(0, 20).map(function(r, i) {
          return '<tr>' +
            '<td style="padding:8px 10px;border-bottom:1px solid var(--border);font-weight:700;color:' + (i < 3 ? 'var(--or)' : 'var(--muted)') + '">' + (i + 1) + '</td>' +
            '<td style="padding:8px 10px;border-bottom:1px solid var(--border)">' + escHtml(r.username || 'Athlete') + '</td>' +
            '<td style="padding:8px 10px;border-bottom:1px solid var(--border);font-weight:700">' + escHtml(r.score_display || '—') + '</td>' +
            '<td style="padding:8px 10px;border-bottom:1px solid var(--border)">' + (r.is_rx ? '<span style="font-size:.65rem;background:rgba(39,174,96,.12);color:#27ae60;border:1px solid rgba(39,174,96,.25);padding:2px 6px;border-radius:4px;font-weight:700">RX</span>' : '<span style="color:var(--muted);font-size:.78rem">Scaled</span>') + '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table>';
    } catch (e) {
      container.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Leaderboard unavailable.</p>';
    }
  }

  async function openResultModal() {
    const user = await db.getUser();
    if (!user) { openWorkoutAuthModal(); return; }
    document.getElementById('result-modal').classList.add('active');
  }

  function closeResultModal() {
    document.getElementById('result-modal').classList.remove('active');
  }

  async function submitResult() {
    const user = await db.getUser();
    if (!user) { openWorkoutAuthModal(); return; }
    const score = document.getElementById('result-score').value;
    const notes = document.getElementById('result-notes').value;
    const isRx  = document.getElementById('result-rx').checked;
    const dateStr = new URLSearchParams(window.location.search).get('date') || localDateStr();
    if (!score) {
      const errEl = document.getElementById('result-error');
      errEl.textContent = 'Please enter your score.';
      errEl.style.display = 'block';
      return;
    }
    try {
      const result = {
        user_id: user.id,
        username: user.email?.split('@')[0] || 'unknown',
        benchmark_slug: null,
        workout_id: null,
        daily_wod_date: dateStr,
        score_display: score,
        score_seconds: null,
        is_rx: isRx,
        notes: notes,
        date: localDateStr()
      };
      const { error } = await db.saveResult(result);
      if (error) throw error;
      closeResultModal();
      document.getElementById('result-score').value = '';
      document.getElementById('result-notes').value = '';
      document.getElementById('result-rx').checked = false;
      document.getElementById('result-error').style.display = 'none';
      showToast('Result logged!', 'success');
      loadLeaderboard(leaderboardPeriod, dateStr);
    } catch (e) {
      const errEl = document.getElementById('result-error');
      errEl.textContent = 'Error logging result. Please try again.';
      errEl.style.display = 'block';
    }
  }

  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.textContent = message;
    toast.style.cssText = `position:fixed;bottom:24px;right:24px;background:${type==='success'?'#22C55E':'#C41212'};color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideInToast .3s ease-out`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  function shareDailyX(e) {
    e.preventDefault();
    var url  = encodeURIComponent(window.location.href);
    var text = encodeURIComponent('Today\'s Daily 20 on HomeWODrx!');
    window.open('https://twitter.com/intent/tweet?text=' + text + '&url=' + url, '_blank', 'width=550,height=420');
  }

  function shareDailyFB(e) {
    e.preventDefault();
    window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href), '_blank', 'width=580,height=400');
  }

  function shareDailyWA(e) {
    e.preventDefault();
    var text = encodeURIComponent('Check out today\'s Daily 20 on HomeWODrx: ' + window.location.href);
    window.open('https://wa.me/?text=' + text, '_blank');
  }

  function copyDailyLink(btn) {
    navigator.clipboard.writeText(window.location.href).then(function() {
      btn.classList.add('copied');
      var prev = btn.innerHTML;
      btn.textContent = '✓ Copied!';
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.innerHTML = prev;
      }, 2500);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadDailyWod();
    document.querySelector('.modal-close').addEventListener('click', closeResultModal);
    document.getElementById('result-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('result-modal')) closeResultModal();
    });
  });
</script>

<!-- AUTH MODAL -->
<style>
  #workout-auth-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;padding:20px}
  #workout-auth-modal.active{display:flex}
  #workout-auth-modal .wam{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:28px 28px 24px;width:100%;max-width:380px;position:relative}
  #workout-auth-modal .wam-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  #workout-auth-modal .wam-close:hover{color:var(--text)}
  #workout-auth-modal h2{font-size:20px;font-weight:900;margin-bottom:4px}
  #workout-auth-modal .wamsub{color:var(--muted);font-size:13px;margin-bottom:18px}
  #workout-auth-modal .wamfield{margin-bottom:14px}
  #workout-auth-modal .wamfield label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  #workout-auth-modal .wamfield input{width:100%;background:#16161F;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit;box-sizing:border-box}
  #workout-auth-modal .wamfield input:focus{border-color:var(--or)}
  #workout-auth-modal .wambtn{width:100%;padding:13px;background:var(--or);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
  #workout-auth-modal .wambtn:hover{background:#E03030}
  #workout-auth-modal .wamlink{text-align:center;margin-top:12px;font-size:13px;color:var(--muted)}
  #workout-auth-modal .wamlink a{color:var(--or);cursor:pointer;text-decoration:none}
  #workout-auth-modal .wam-recovery{display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:12px}
  #workout-auth-modal .wam-recovery a{color:var(--muted);text-decoration:none}
  #workout-auth-modal .wam-recovery a:hover{color:var(--or);text-decoration:underline}
  #workout-auth-modal .wamerr{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:#E74C3C;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
  @keyframes slideInToast{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* print-area: hidden on screen, only visible when printing */
#print-area{display:none}
@media print{
  body > *{display:none!important}
  #print-area{display:block!important;font-family:system-ui,Arial,sans-serif;color:#000;background:#fff;padding:0;margin:0}
  #print-area .ph{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;margin-bottom:20px;border-bottom:3px solid #C41212}
  #print-area .ph img{height:48px;width:auto}
  #print-area .ph .ph-url{font-size:11px;color:#666;text-align:right;line-height:1.4}
  #print-area .pt{font-size:26px;font-weight:900;margin:0 0 4px;color:#000}
  #print-area .ps{font-size:13px;color:#555;margin-bottom:10px}
  #print-area .pm{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  #print-area .pm span{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid #ccc;color:#333;background:#f4f4f4}
  #print-area table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
  #print-area table th{background:#222;color:#fff;padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  #print-area table td{padding:8px 10px;border-bottom:1px solid #ddd;color:#000;vertical-align:top}
  #print-area table tr:last-child td{border-bottom:none}
  #print-area .pscore{border:1px solid #ccc;background:#f8f8f8;border-radius:6px;padding:12px 14px;margin-bottom:18px}
  #print-area .pscore h4{font-size:10px;font-weight:800;color:#C41212;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
  #print-area .pscore p{font-size:13px;color:#222;margin:0;line-height:1.5}
  #print-area .pfoot{margin-top:20px;padding-top:10px;border-top:1px solid #ddd;font-size:10px;color:#999;text-align:center}
}
</style>
<div id="workout-auth-modal">
  <div class="wam">
    <button class="wam-close" onclick="closeWorkoutAuthModal()">&#x2715;</button>
    <h2 id="workout-auth-title">Sign In to Log Result</h2>
    <p class="wamsub" id="workout-auth-sub">Sign in to record your results and appear on the leaderboard.</p>
    <div id="workout-auth-error" class="wamerr"></div>
    <div id="workout-login-form">
      <div class="wamfield"><label>Email</label><input type="email" id="workout-li-email" placeholder="you@email.com"></div>
      <div class="wamfield"><label>Password</label><input type="password" id="workout-li-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')submitWorkoutLogin()"></div>
      <button class="wambtn" onclick="submitWorkoutLogin()">Sign In &#x2192;</button>
      <p class="wamlink">No account? <a onclick="switchWorkoutAuthTab('signup')">Sign up free</a></p>
      <div class="wam-recovery">
        <a href="/login.html">Forgot password?</a>
        <a href="/login.html">Forgot email?</a>
      </div>
    </div>
    <div id="workout-signup-form" style="display:none">
      <div class="wamfield"><label>Username</label><input type="text" id="workout-su-user" placeholder="e.g. firebreather_rob" maxlength="20"></div>
      <div class="wamfield"><label>Email</label><input type="email" id="workout-su-email" placeholder="you@email.com"></div>
      <div class="wamfield"><label>Password</label><input type="password" id="workout-su-pass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')submitWorkoutSignup()"></div>
      <button class="wambtn" onclick="submitWorkoutSignup()">Create Account &#x2192;</button>
      <p class="wamlink">Already have one? <a onclick="switchWorkoutAuthTab('login')">Log in</a></p>
    </div>
  </div>
</div>
<script>
  function openWorkoutAuthModal(mode = 'login') {
    switchWorkoutAuthTab(mode);
    document.getElementById('workout-auth-modal').classList.add('active');
  }
  function closeWorkoutAuthModal() {
    document.getElementById('workout-auth-modal').classList.remove('active');
    const errEl = document.getElementById('workout-auth-error');
    errEl.textContent = ''; errEl.style.display = 'none';
  }
  function switchWorkoutAuthTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('workout-auth-title').textContent = isLogin ? 'Sign In to Log Result' : 'Create Account';
    document.getElementById('workout-auth-sub').textContent = isLogin ? 'Sign in to record your results and appear on the leaderboard.' : 'Join HomeWODrx free — track results and compete.';
    document.getElementById('workout-login-form').style.display = isLogin ? 'block' : 'none';
    document.getElementById('workout-signup-form').style.display = isLogin ? 'none' : 'block';
  }
  async function submitWorkoutLogin() {
    const email = document.getElementById('workout-li-email').value.trim();
    const pass  = document.getElementById('workout-li-pass').value;
    const errEl = document.getElementById('workout-auth-error');
    errEl.style.display = 'none';
    if (!email || !pass) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }
    const { user, error } = await db.signIn(email, pass);
    if (error) { errEl.textContent = error.message || 'Sign in failed.'; errEl.style.display = 'block'; return; }
    closeWorkoutAuthModal();
    document.getElementById('result-modal').classList.add('active');
  }
  async function submitWorkoutSignup() {
    const username = document.getElementById('workout-su-user').value.trim();
    const email    = document.getElementById('workout-su-email').value.trim();
    const pass     = document.getElementById('workout-su-pass').value;
    const errEl    = document.getElementById('workout-auth-error');
    errEl.style.display = 'none';
    if (!username || !email || !pass) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
    const { user, error } = await db.signUp(email, pass, username);
    if (error) { errEl.textContent = error.message || 'Sign up failed.'; errEl.style.display = 'block'; return; }
    closeWorkoutAuthModal();
    document.getElementById('result-modal').classList.add('active');
  }
</script>

<!-- Print-only area: hidden on screen, populated by print function -->
<div id="print-area" aria-hidden="true"></div>
</body>
</html>
