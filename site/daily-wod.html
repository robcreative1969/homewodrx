  <style>
    .dwod-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--orange, #f97316);
      margin-bottom: 6px;
    }
    .dwod-badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--orange, #f97316);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .movement-link {
      color: var(--orange, #f97316);
      text-decoration: none;
      font-weight: 600;
    }
    .movement-link:hover { text-decoration: underline; }
    .equipment-chip {
      display: inline-block;
      background: var(--dark-surface, #1e1e1e);
      border: 1px solid var(--dark-border, #333);
      border-radius: 8px;
      padding: 8px 16px;
      margin: 4px 6px 4px 0;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .equipment-chip:hover {
      border-color: var(--orange, #f97316);
      color: var(--orange, #f97316);
    }
    .equipment-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--dark-border, #333);
    }
  </style>
</head>
<body data-nav-init="true" data-active-page="workouts">
<main class="container">

  <div id="wod-header" class="loading">
    <div class="spinner"></div>
  </div>

  <div id="wod-details" style="display:none;">
    <section class="section">
      <div id="description-section"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>Movements</h2>
      </div>
      <div id="movements-table"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>Log Your Result</h2>
      </div>
      <div id="log-result-section"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>Leaderboard</h2>
      </div>
      <div class="filter-chips" id="leaderboard-filters">
        <button class="chip active" data-period="day">Today</button>
        <button class="chip" data-period="week">This Week</button>
        <button class="chip" data-period="all">All Time</button>
      </div>
      <div id="leaderboard-table" style="margin-top: 1.5rem;"></div>
    </section>
  </div>

</main>

<!-- FOOTER -->
<script src="/js/footer.js"></script>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Log Your Result</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="result-error" style="display:none;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:#E74C3C;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:14px"></div>
      <div class="form-group">
        <label>Your Score</label>
        <input type="text" id="result-score" placeholder="e.g., 4:32 or 15 rounds">
      </div>
      <div class="form-group">
        <label>Notes (Optional)</label>
        <textarea id="result-notes" placeholder="Scaled weight? Modifications? How did it feel?"></textarea>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="result-rx">
          Completed RX (Prescribed weight)
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeResultModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitResult()">Log Result</button>
    </div>
  </div>
</div>

<script>
  let currentWod = null;
  let leaderboardPeriod = 'day';

  // ── Amazon Affiliate ──────────────────────────────────────
  const AFFILIATE_TAG = 'homewodrx0f-20';
  const EQUIPMENT_LINKS = {
    'kettlebell': `https://www.amazon.com/s?k=kettlebell&tag=${AFFILIATE_TAG}`,
    'dumbbell': `https://www.amazon.com/s?k=dumbbell&tag=${AFFILIATE_TAG}`,
    'pull-up bar': `https://www.amazon.com/s?k=pull-up+bar&tag=${AFFILIATE_TAG}`,
    'jump rope': `https://www.amazon.com/s?k=crossfit+jump+rope&tag=${AFFILIATE_TAG}`,
    'resistance bands': `https://www.amazon.com/s?k=resistance+bands&tag=${AFFILIATE_TAG}`,
    'barbell': `https://www.amazon.com/s?k=barbell&tag=${AFFILIATE_TAG}`,
    'box': `https://www.amazon.com/s?k=plyo+box&tag=${AFFILIATE_TAG}`,
    'medicine ball': `https://www.amazon.com/s?k=medicine+ball&tag=${AFFILIATE_TAG}`,

    'running': `https://www.amazon.com/s?k=treadmill+home+gym&tag=${AFFILIATE_TAG}`,
    'rower': `https://www.amazon.com/s?k=rowing+machine+home+gym&tag=${AFFILIATE_TAG}`,
    'rowing machine': `https://www.amazon.com/s?k=rowing+machine+home+gym&tag=${AFFILIATE_TAG}`,
    'assault bike': `https://www.amazon.com/s?k=assault+air+bike&tag=${AFFILIATE_TAG}`,
    'assaultbike': `https://www.amazon.com/s?k=assault+air+bike&tag=${AFFILIATE_TAG}`,
    'airdyne': `https://www.amazon.com/s?k=airdyne+bike&tag=${AFFILIATE_TAG}`,
  };
  function getEquipmentLink(equipment) {
    const key = equipment.toLowerCase().trim();
    return EQUIPMENT_LINKS[key] || `https://www.amazon.com/s?k=${encodeURIComponent(equipment)}&tag=${AFFILIATE_TAG}`;
  }

  // Bodyweight essentials — shown on bodyweight-only WODs
  const BODYWEIGHT_ESSENTIALS = [
    { label: 'Exercise Mat',    url: `https://www.amazon.com/s?k=thick+exercise+mat+home+workout&tag=${AFFILIATE_TAG}` },
    { label: 'Ab Wheel',        url: `https://www.amazon.com/s?k=ab+roller+wheel&tag=${AFFILIATE_TAG}` },
    { label: 'Foam Roller',     url: `https://www.amazon.com/s?k=foam+roller+muscle+recovery&tag=${AFFILIATE_TAG}` },
    { label: 'Parallettes',     url: `https://www.amazon.com/s?k=parallettes+push+up&tag=${AFFILIATE_TAG}` },
    { label: 'Knee Sleeves',    url: `https://www.amazon.com/s?k=knee+sleeves+crossfit&tag=${AFFILIATE_TAG}` },
    { label: 'Workout Timer',   url: `https://www.amazon.com/s?k=interval+timer+crossfit&tag=${AFFILIATE_TAG}` },
  ];

  async function loadDailyWod() {
    const params = new URLSearchParams(window.location.search);
    const dateStr = params.get('date') || new Date().toISOString().split('T')[0];

    try {
      const wod = await DailyWOD.generate(dateStr);
      currentWod = wod;
      renderHeader(wod, dateStr);
      renderDetails(wod);
      loadLeaderboard('day', dateStr);
      document.title = `Daily WOD – ${dateStr} - HomeWODrx`;
      document.getElementById('wod-details').style.display = '';
    } catch (err) {
      console.error('Error loading daily WOD:', err);
      document.getElementById('wod-header').innerHTML = '<p class="text-muted">Error loading today\'s workout.</p>';
    }
  }

  function renderHeader(wod, dateStr) {
    const formatted = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    document.getElementById('wod-header').innerHTML = `
      <div style="padding: 2rem 0; margin-bottom: 2rem; border-bottom: 1px solid var(--dark-border);">
        <div class="dwod-badge">
          <span class="dwod-badge-dot"></span>
          Daily WOD &mdash; ${formatted}
          ${wod.isManual ? '<span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0"> &bull; Curated</span>' : ''}
        </div>
        <h1>${escHtml(wod.title || 'Daily Workout')}</h1>
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;">
          <span class="badge badge-orange">${escHtml(({'amrap':'AMRAP','emom':'EMOM','fortime':'For Time','circuit':'Circuit'})[wod.format] || (wod.format||'AMRAP').toUpperCase())}</span>
          <span class="badge badge-orange">${wod.duration || 20} min</span>
          <span class="badge badge-orange">${cap(wod.difficulty || 'Intermediate')}</span>
          ${wod.bodyFocus ? `<span class="badge badge-orange">${cap(wod.bodyFocus)}</span>` : ''}
          ${wod.isBodyweightOnly ? '<span class="badge badge-orange">Bodyweight</span>' : ''}
        </div>
        <div style="display:flex;gap:1rem;">
          <button class="btn btn-primary" onclick="openResultModal()">Log Your Result</button>
          <a href="/workouts.html" class="btn btn-secondary">Browse Workouts</a>
          <button class="btn btn-secondary" onclick="printWod()">🖨️ Print WOD</button>
        </div>
      </div>`;
  }


  function printWod() {
    const w = currentWod;
    if (!w) return;
    const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const fmtLabel = ({'amrap':'AMRAP','emom':'EMOM','fortime':'For Time','circuit':'Circuit'})[w.format] || (w.format||'').toUpperCase();
    const rows = (w.rows||[]).map(r => `<tr><td><strong>${escH(r.movement||r.name||'')}</strong></td><td>${escH(r.reps||r.time||'')}</td><td style="color:#555">${escH(r.tip||'')}</td></tr>`).join('');
    const chips = [
      fmtLabel && `<span>${fmtLabel}</span>`,
      w.duration && `<span>${w.duration} min</span>`,
      w.difficulty && `<span>${cap(w.difficulty)}</span>`,
      w.bodyFocus && `<span>${cap(w.bodyFocus)}</span>`,
    ].filter(Boolean).join('');
    const scoring = w.scoring ? `<div class="pscore"><h4>📊 Scoring</h4><p>${escH(w.scoring)}</p></div>` : '';
    const dateStr = new URLSearchParams(window.location.search).get('date') || new Date().toISOString().split('T')[0];

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function cap(s) {
    return String(s||'').replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  function slugify(name) {
    return String(name||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function renderDetails(wod) {
    // Description / scoring
    const scoringNote = wod.scoring ? `<div style="margin-top:1rem;"><h4>Scoring</h4><p>${escHtml(wod.scoring)}</p></div>` : '';
    const timerNote = wod.format === 'amrap'
      ? `<p>Complete as many rounds and reps as possible of the movements below in <strong>${wod.duration} minutes</strong>.</p>`
      : wod.format === 'emom'
      ? `<p>Every minute on the minute for <strong>${wod.duration} minutes</strong>, complete the prescribed movements.</p>`
      : wod.format === 'fortime'
      ? `<p>Complete all rounds and reps for time.</p>`
      : `<p>Complete <strong>${wod.duration} minutes</strong> of structured intervals.</p>`;

    document.getElementById('description-section').innerHTML = timerNote + scoringNote;

    // Movements table
    const rows = wod.rows || [];
    if (rows.length > 0) {
      document.getElementById('movements-table').innerHTML = `
        <table>
          <thead><tr><th>Movement</th><th>Reps / Duration</th></tr></thead>
          <tbody>
            ${rows.map(r => { const mn = r.movement || r.name || ''; return `<tr>
              <td><a href="/movement.html?slug=${slugify(mn)}" class="movement-link">${escHtml(mn)}</a></td>
              <td>${escHtml(String(r.reps || r.duration || '-'))}</td>
            </tr>`; }).join('')}
          </tbody>
        </table>`;
    }

    // Equipment / Essentials — Amazon affiliate chips
    const eqContainer = document.getElementById('movements-table');
    if (wod.equipment && wod.equipment.length > 0) {
      // Equipment-based WOD: show required gear as affiliate links
      eqContainer.innerHTML += `
        <div class="equipment-section">
          <h4 style="margin-bottom:0.75rem;">Gear for This Workout</h4>
          <p class="text-muted" style="font-size:0.85rem;margin-bottom:0.75rem;">Links are Amazon affiliate links &#8212; helps support HomeWODrx at no cost to you.</p>
          ${wod.equipment.map(e => `<a href="${getEquipmentLink(e)}" class="equipment-chip" target="_blank" rel="noopener">${escHtml(e)}</a>`).join('')}
        </div>`;
    }
    if (wod.isBodyweightOnly) {
      // Bodyweight-only WOD: show bodyweight essentials
      eqContainer.innerHTML += `
        <div class="equipment-section">
          <h4 style="margin-bottom:0.75rem;">Bodyweight Essentials</h4>
          <p class="text-muted" style="font-size:0.85rem;margin-bottom:0.75rem;">No equipment required &#8212; but these can level up your home workouts. Affiliate links help support HomeWODrx at no cost to you.</p>
          ${BODYWEIGHT_ESSENTIALS.map(p => `<a href="${p.url}" class="equipment-chip" target="_blank" rel="noopener">${escHtml(p.label)}</a>`).join('')}
        </div>`;
    }

    // Log result section
    document.getElementById('log-result-section').innerHTML =
      `<p class="text-muted" style="margin-bottom:1rem;">Record your score for today's workout.</p>
       <button class="btn btn-primary" onclick="openResultModal()">Log Your Result</button>`;
  }

  async function loadLeaderboard(period, dateStr) {
    dateStr = dateStr || new Date().toISOString().split('T')[0];
    leaderboardPeriod = period;
    const container = document.getElementById('leaderboard-table');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      let results = await db.getResults({ dailyWodDate: dateStr, limit: 100 });
      if (!results || results.length === 0) {
        // Fallback: try fetching by a daily-wod slug pattern
        results = [];
      }
      const now = new Date();
      if (period === 'week') {
        const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7);
        results = results.filter(r => new Date(r.date) >= weekAgo);
      } else if (period === 'day') {
        results = results.filter(r => (r.date || '').startsWith(dateStr));
      }
      if (results.length === 0) {
        container.innerHTML = '<p class="text-muted">No results yet — be the first to log one!</p>';
        return;
      }
      results.sort((a, b) => (a.score_seconds || 999999) - (b.score_seconds || 999999));
      container.innerHTML = `<table><thead><tr><th>Rank</th><th>Athlete</th><th>Score</th><th>Rx</th><th>Date</th></tr></thead><tbody>
        ${results.slice(0, 20).map((r, i) => `<tr>
          <td class="leaderboard-rank rank-${i+1<=3?i+1:''}">${i+1}</td>
          <td>${escHtml(r.username || 'Athlete')}</td>
          <td><strong>${escHtml(r.score_display || '-')}</strong></td>
          <td>${r.is_rx ? 'RX' : 'Scaled'}</td>
          <td class="text-muted">${new Date(r.date).toLocaleDateString()}</td>
        </tr>`).join('')}
      </tbody></table>`;
    } catch (e) {
      container.innerHTML = '<p class="text-muted">Leaderboard unavailable.</p>';
    }
  }

  async function openResultModal() {
    const user = await db.getUser();
    if (!user) { openWorkoutAuthModal(); return; }
    document.getElementById('result-modal').classList.add('active');
  }

  function closeResultModal() {
    document.getElementById('result-modal').classList.remove('active');
  }

  async function submitResult() {
    const user = await db.getUser();
    if (!user) { openWorkoutAuthModal(); return; }
    const score = document.getElementById('result-score').value;
    const notes = document.getElementById('result-notes').value;
    const isRx  = document.getElementById('result-rx').checked;
    const dateStr = new URLSearchParams(window.location.search).get('date') || new Date().toISOString().split('T')[0];
    if (!score) {
      const errEl = document.getElementById('result-error');
      errEl.textContent = 'Please enter your score.';
      errEl.style.display = 'block';
      return;
    }
    try {
      const result = {
        user_id: user.id,
        username: user.email?.split('@')[0] || 'unknown',
        benchmark_slug: null,
        workout_id: null,
        daily_wod_date: dateStr,
        score_display: score,
        score_seconds: null,
        is_rx: isRx,
        notes: notes,
        date: new Date().toISOString().split('T')[0]
      };
      const { error } = await db.saveResult(result);
      if (error) throw error;
      closeResultModal();
      document.getElementById('result-score').value = '';
      document.getElementById('result-notes').value = '';
      document.getElementById('result-rx').checked = false;
      document.getElementById('result-error').style.display = 'none';
      showToast('Result logged! 🏋️', 'success');
      loadLeaderboard(leaderboardPeriod, dateStr);
    } catch (e) {
      const errEl = document.getElementById('result-error');
      errEl.textContent = 'Error logging result. Please try again.';
      errEl.style.display = 'block';
    }
  }

  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.textContent = message;
    toast.style.cssText = `position:fixed;bottom:24px;right:24px;background:${type==='success'?'#22C55E':'#C41212'};color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideInToast .3s ease-out`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadDailyWod();
    document.querySelectorAll('#leaderboard-filters .chip').forEach(chip => {
      chip.addEventListener('click', e => {
        document.querySelectorAll('#leaderboard-filters .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        const dateStr = new URLSearchParams(window.location.search).get('date') || new Date().toISOString().split('T')[0];
        loadLeaderboard(e.target.dataset.period, dateStr);
      });
    });
    document.querySelector('.modal-close').addEventListener('click', closeResultModal);
    document.getElementById('result-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('result-modal')) closeResultModal();
    });
  });
</script>

</style>
<div id="workout-auth-modal">
  <div class="wam">
    <button class="wam-close" onclick="closeWorkoutAuthModal()">&#x2715;</button>
    <h2 id="workout-auth-title">Sign In to Log Result</h2>
    <p class="wamsub" id="workout-auth-sub">Sign in to record your results and appear on the leaderboard.</p>
    <div id="workout-auth-error" class="wamerr"></div>
    <div id="workout-login-form">
      <div class="wamfield"><label>Email</label><input type="email" id="workout-li-email" placeholder="you@email.com"></div>
      <div class="wamfield"><label>Password</label><input type="password" id="workout-li-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')submitWorkoutLogin()"></div>
      <button class="wambtn" onclick="submitWorkoutLogin()">Sign In &#x2192;</button>
      <p class="wamlink">No account? <a onclick="switchWorkoutAuthTab('signup')">Sign up free</a></p>
      <div class="wam-recovery">
        <a href="/login.html">Forgot password?</a>
        <a href="/login.html">Forgot email?</a>
      </div>
    </div>
    <div id="workout-signup-form" style="display:none">
      <div class="wamfield"><label>Username</label><input type="text" id="workout-su-user" placeholder="e.g. firebreather_rob" maxlength="20"></div>
      <div class="wamfield"><label>Email</label><input type="email" id="workout-su-email" placeholder="you@email.com"></div>
      <div class="wamfield"><label>Password</label><input type="password" id="workout-su-pass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')submitWorkoutSignup()"></div>
      <button class="wambtn" onclick="submitWorkoutSignup()">Create Account &#x2192;</button>
      <p class="wamlink">Already have one? <a onclick="switchWorkoutAuthTab('login')">Log in</a></p>
    </div>
  </div>
</div>
<script>
  function openWorkoutAuthModal(mode = 'login') {
    switchWorkoutAuthTab(mode);
    document.getElementById('workout-auth-modal').classList.add('active');
  }
  function closeWorkoutAuthModal() {
    document.getElementById('workout-auth-modal').classList.remove('active');
    const errEl = document.getElementById('workout-auth-error');
    errEl.textContent = ''; errEl.style.display = 'none';
  }
  function switchWorkoutAuthTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('workout-auth-title').textContent = isLogin ? 'Sign In to Log Result' : 'Create Account';
    document.getElementById('workout-auth-sub').textContent = isLogin ? 'Sign in to record your results and appear on the leaderboard.' : 'Join HomeWODrx free — track results and compete.';
    document.getElementById('workout-login-form').style.display = isLogin ? 'block' : 'none';
    document.getElementById('workout-signup-form').style.display = isLogin ? 'none' : 'block';
  }
  async function submitWorkoutLogin() {
    const email = document.getElementById('workout-li-email').value.trim();
    const pass  = document.getElementById('workout-li-pass').value;
    const errEl = document.getElementById('workout-auth-error');
    errEl.style.display = 'none';
    if (!email || !pass) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }
    const { user, error } = await db.signIn(email, pass);
    if (error) { errEl.textContent = error.message || 'Sign in failed.'; errEl.style.display = 'block'; return; }
    closeWorkoutAuthModal();
    document.getElementById('result-modal').classList.add('active');
  }
  async function submitWorkoutSignup() {
    const username = document.getElementById('workout-su-user').value.trim();
    const email    = document.getElementById('workout-su-email').value.trim();
    const pass     = document.getElementById('workout-su-pass').value;
    const errEl    = document.getElementById('workout-auth-error');
    errEl.style.display = 'none';
    if (!username || !email || !pass) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
    const { user, error } = await db.signUp(email, pass, username);
    if (error) { errEl.textContent = error.message || 'Sign up failed.'; errEl.style.display = 'block'; return; }
    closeWorkoutAuthModal();
    document.getElementById('result-modal').classList.add('active');
  }
</script>

<!-- Print-only area: hidden on screen, populated by print function -->
<div id="print-area" aria-hidden="true"></div>
</body>
