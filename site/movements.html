<body data-nav-init="true" data-active-page="movements">
<main class="container">
  <section style="margin-bottom: 2rem; padding: 2rem 0;">
    <h1>Movement Library</h1>

      <div class="filter-chips" id="category-chips">

        <button class="chip" data-cat="gymnastics">Gymnastics</button>
        <button class="chip" data-cat="push">Push</button>

        <button class="chip" data-cat="core">Core</button>
        <button class="chip" data-cat="fullbody">Full Body</button>
        <button class="chip" data-cat="barbell">Barbell</button>
        <button class="chip" data-cat="kettlebell">Kettlebell</button>
        <button class="chip" data-cat="dumbbell">Dumbbell</button>
        <button class="chip" data-cat="cardio">Cardio</button>
      </div>
    </div>
    <div class="filter-section">

      <input type="text" id="movement-search" placeholder="Search by name or muscle group...">
    </div>
  </div>

  <div id="movements-root">
    <div class="movements-loading"><div class="spinner"></div></div>
  </div>
  <p id="movements-no-results" style="display:none; text-align:center; color:var(--text-muted,#888); padding:2rem 0;">No movements match your search.</p>
</main>

<script src="/js/footer.js"></script>

<script>
// ─── Category display config ──────────────────────────────────────────────────
const CATEGORY_CONFIG = [
  { key: 'gymnastics', label: 'Gymnastics &amp; Pull-Up Bar',       gridId: 'gymnastics-grid' },
  { key: 'push',       label: 'Bodyweight — Push',                  gridId: 'push-grid' },
  { key: 'lower',      label: 'Bodyweight — Lower Body',            gridId: 'lower-grid' },
  { key: 'core',       label: 'Bodyweight — Core',                  gridId: 'core-grid' },
  { key: 'fullbody',   label: 'Bodyweight — Full Body &amp; Cardio', gridId: 'fullbody-grid' },
  { key: 'barbell',    label: 'Weightlifting &amp; Barbell',         gridId: 'barbell-grid' },
  { key: 'kettlebell', label: 'Kettlebell',                          gridId: 'kettlebell-grid' },
  { key: 'dumbbell',   label: 'Dumbbell',                           gridId: 'dumbbell-grid' },
  { key: 'cardio',     label: 'Monostructural / Cardio',            gridId: 'cardio-grid' },
];

// ─── Slugify helper (matches benchmark movement names to slugs) ───────────────
function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

// ─── Cache of Supabase benchmarks for workout count lookups ──────────────────
let _benchmarkCache = [];

// ─── Count how many benchmarks use this movement slug ────────────────────────
function getWorkoutCount(slug) {
  return _benchmarkCache.filter(b =>
    b.movements && b.movements.some(m => slugify(m.name || m.movement || '') === slug)
  ).length;
}

// ─── Render a grid of movement cards ─────────────────────────────────────────
function renderGrid(gridEl, movements) {
  if (!movements.length) {
    gridEl.innerHTML = '<p class="text-muted" style="font-size:0.85rem;">No movements in this category yet.</p>';
    return;
  }
  gridEl.innerHTML = movements.map(m => {
    const count = getWorkoutCount(m.slug);
    const countLabel = count > 0 ? `${count} benchmark${count === 1 ? '' : 's'}` : 'Movement guide';
    const videoBadge = m.youtube_url ? `<span class="video-badge">▶ Video</span>` : '';
    return `<a href="/movement.html?slug=${m.slug}" class="movement-card">
      <h3>${m.name}${videoBadge}</h3>
      <p class="muscles">${m.muscles || ''}</p>
      <span class="workout-count">${countLabel} →</span>
    </a>`;
  }).join('');
}

// ─── Build the full page scaffold then populate grids ─────────────────────────
function buildScaffold() {
  const root = document.getElementById('movements-root');
  root.innerHTML = CATEGORY_CONFIG.map(c => `
    <div class="category-section" data-key="${c.key}">
      <h2 class="category-heading">${c.label}</h2>
      <div class="grid grid-cols-3" id="${c.gridId}"></div>
    </div>
  `).join('') + `
    <div class="category-section" data-key="community" id="community-section" style="display:none;">
      <h2 class="category-heading">Community Movements</h2>
      <div class="grid grid-cols-3" id="community-grid"></div>
    </div>
  `;
}

// ─── Main: load from Supabase, fall back gracefully ──────────────────────────
async function loadMovements() {
  buildScaffold();

  try {
    // Fetch movements and benchmarks in parallel
    const [{ data: movements, error }, benchmarks] = await Promise.all([
      supabaseClient
        .from('movements')
        .select('slug, name, muscles, category, youtube_url')
        .order('category')
        .order('name'),
      db.getAllBenchmarks().catch(() => [])
    ]);

    if (error) throw error;
    _benchmarkCache = benchmarks || [];

    // Group by category
    const byCategory = {};
    for (const m of movements) {
      if (!byCategory[m.category]) byCategory[m.category] = [];
      byCategory[m.category].push(m);
    }

    // Render each configured category
    for (const cfg of CATEGORY_CONFIG) {
      const gridEl = document.getElementById(cfg.gridId);
      if (gridEl) renderGrid(gridEl, byCategory[cfg.key] || []);
    }

    // Update chip count badges now that we have data
    updateChipCounts(byCategory);

    // Build set of known slugs to detect community-only movements
    const knownSlugs = new Set(movements.map(m => m.slug));

    // Load community movements from user workouts
    await loadCommunityMovements(knownSlugs);

  } catch (err) {
    console.error('Failed to load movements from Supabase:', err);
    document.getElementById('movements-root').innerHTML = `
      <div class="empty-state">
        <p>Unable to load movements. Please try again shortly.</p>
      </div>`;
  }
}

// ─── Community movements from user workouts ───────────────────────────────────
async function loadCommunityMovements(knownSlugs) {
  try {
    const userWorkouts = await db.getWorkouts({ isPublic: true, limit: 1000 });
    const communityMap = {};
    for (const w of userWorkouts) {
      if (!w.movements) continue;
      for (const m of w.movements) {
        const rawName = m.movement || m.name || '';
        if (!rawName) continue;
        const slug = slugify(rawName);
        if (knownSlugs && knownSlugs.has(slug)) continue;
        if (!communityMap[slug]) communityMap[slug] = { name: rawName, count: 0 };
        communityMap[slug].count++;
      }
    }

    const communityMovements = Object.entries(communityMap)
      .sort((a, b) => b[1].count - a[1].count);

    if (!communityMovements.length) return;

    _communityHasContent = true;
    document.getElementById('community-section').style.display = '';
    document.getElementById('community-grid').innerHTML = communityMovements.map(([slug, info]) => {
      const label = `${info.count} community WOD${info.count === 1 ? '' : 's'}`;
      return `<a href="/movement.html?slug=${slug}" class="movement-card">
        <h3 style="text-transform:capitalize">${info.name}</h3>
        <p class="muscles">Community-submitted movement</p>
        <span class="workout-count">${label} →</span>
      </a>`;
    }).join('');
  } catch (e) {
    // Community section is bonus — silent fail is fine
  }
}

// ─── Filter state ─────────────────────────────────────────────────────────────
let _currentCat    = 'all';
let _currentSearch = '';
let _communityHasContent = false;

function applyFilters() {
  const cat  = _currentCat;
  const term = _currentSearch.toLowerCase().trim();
  let totalVisible = 0;

  // Process configured category sections
  document.querySelectorAll('.category-section[data-key]').forEach(section => {
    const key = section.dataset.key;
    if (key === 'community') return; // handled below

    const catMatch = cat === 'all' || cat === key;
    if (!catMatch) {
      section.style.display = 'none';
      return;
    }

    if (term) {
      let sectionVisible = 0;
      section.querySelectorAll('.movement-card').forEach(card => {
        const name    = (card.querySelector('h3')?.textContent  || '').toLowerCase();
        const muscles = (card.querySelector('.muscles')?.textContent || '').toLowerCase();
        const show    = name.includes(term) || muscles.includes(term);
        card.style.display = show ? '' : 'none';
        if (show) sectionVisible++;
      });
      section.style.display = sectionVisible > 0 ? '' : 'none';
      totalVisible += sectionVisible;
    } else {
      section.style.display = '';
      section.querySelectorAll('.movement-card').forEach(c => c.style.display = '');
      totalVisible += section.querySelectorAll('.movement-card').length;
    }
  });

  // Community section: only visible when showing "all" categories
  const communitySection = document.getElementById('community-section');
  if (communitySection && _communityHasContent) {
    if (cat !== 'all') {
      communitySection.style.display = 'none';
    } else if (term) {
      let comVisible = 0;
      communitySection.querySelectorAll('.movement-card').forEach(card => {
        const name    = (card.querySelector('h3')?.textContent  || '').toLowerCase();
        const muscles = (card.querySelector('.muscles')?.textContent || '').toLowerCase();
        const show    = name.includes(term) || muscles.includes(term);
        card.style.display = show ? '' : 'none';
        if (show) comVisible++;
      });
      communitySection.style.display = comVisible > 0 ? '' : 'none';
      totalVisible += comVisible;
    } else {
      communitySection.style.display = '';
      totalVisible += communitySection.querySelectorAll('.movement-card').length;
    }
  }

  document.getElementById('movements-no-results').style.display = totalVisible === 0 ? '' : 'none';
}

// ─── Update chip count badges after data loads ────────────────────────────────
function updateChipCounts(byCategory) {
  document.querySelectorAll('#category-chips .chip[data-cat]').forEach(chip => {
    const key = chip.dataset.cat;
    if (key === 'all') return;
    const count = (byCategory[key] || []).length;
    if (count) chip.textContent = `${chip.textContent} (${count})`;
  });
}

// ─── Wire up filter bar interactions ─────────────────────────────────────────
function setupFilters() {
  document.querySelectorAll('#category-chips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      _currentCat = chip.dataset.cat;
      applyFilters();
    });
  });

  const searchInput = document.getElementById('movement-search');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      _currentSearch = searchInput.value;
      applyFilters();
    });
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  setupFilters();
  await initSupabase();
  loadMovements();
});
</script>
