  <style>
    /* ── Page-specific vars ── */
    :root {
      --gr:        #1a472a;
      --gr-mid:    #2d6a4f;
      --gr-dark:   #153a22;
      --gr-light:  #f0f7f3;
      --gr-border: #c8e0d4;
      --gr-xlight: #e8f5ef;
    }

    /* Fix ham-panel positioning */
    .ham-panel { position: fixed !important; top: var(--nav-h); }

    /* page-header manages its own inner padding */
    .page-header { padding: 0; background: var(--white); border-bottom: 1px solid var(--border); }
    .page-header-inner { max-width: 1248px; margin: 0 auto; padding: 32px 24px 0; }

    /* ── Page title ── */
    .page-title-row { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 20px; }
    .page-title { font-family: var(--font-head); font-size: 3rem; letter-spacing: .04em; line-height: 1; }
    .page-subtitle { font-size: .9rem; color: var(--muted); }
    .page-subtitle strong { color: var(--text); font-weight: 700; }

    /* ── Chips — green active state ── */
    .chip {
      cursor: pointer;
      display: inline-block;
      font-family: var(--font-body);
      font-size: .875rem;
      font-weight: 500;
      padding: .28rem .7rem;
      border-radius: 20px;
      line-height: 1.4;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      transition: all 150ms;
      white-space: nowrap;
    }
    .chip:hover  { border-color: var(--gr-mid); color: var(--gr); }
    .chip.active { background: var(--gr); border-color: var(--gr); color: #fff; }

    /* ── Search row ── */
    .search-row { display: flex; gap: 10px; align-items: center; padding-bottom: 14px; }
    .more-filters-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 15px; border: 1.5px solid var(--border); border-radius: 9px;
      font-family: var(--font-body); font-size: .88rem; font-weight: 600;
      color: var(--text); background: var(--white); cursor: pointer;
      white-space: nowrap; transition: all .15s; flex-shrink: 0;
    }
    .more-filters-btn:hover { border-color: var(--gr-mid); color: var(--gr); }
    .more-filters-btn.has-filters { border-color: var(--gr); color: var(--gr); background: var(--gr-xlight); }
    .filter-count-badge {
      display: inline-block; background: var(--gr); color: #fff;
      border-radius: 20px; padding: 1px 7px; font-size: .7rem; font-weight: 800; line-height: 1.4;
    }

    /* ── More Filters collapsible panel ── */
    .filters-panel {
      display: none; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 16px 18px; margin-bottom: 14px;
    }
    .filters-panel.open { display: block; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-group + .filter-group { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .filter-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted);
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }

    /* ── Active filter pills ── */
    .active-filters {
      display: none; align-items: center; gap: 7px; flex-wrap: wrap;
      padding: 0 0 12px;
    }
    .active-filters.visible { display: flex; }
    .af-label { font-size: .78rem; color: var(--muted); font-weight: 600; flex-shrink: 0; }
    .active-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--gr-xlight); color: var(--gr);
      border: 1px solid var(--gr-border); border-radius: 20px;
      padding: 3px 10px; font-size: .78rem; font-weight: 600;
    }
    .pill-x {
      cursor: pointer; font-size: .8rem; line-height: 1; margin-left: 2px;
      opacity: .7; transition: opacity .1s;
    }
    .pill-x:hover { opacity: 1; }
    .af-clear {
      font-size: .78rem; color: var(--gr); font-weight: 700; cursor: pointer;
      background: none; border: none; font-family: var(--font-body); padding: 0 4px;
      transition: opacity .15s;
    }
    .af-clear:hover { opacity: .75; }

    /* ── Search input ── */
    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 11px 14px 11px 42px; border: 1.5px solid var(--border); border-radius: 9px;
      font-family: var(--font-body); font-size: .92rem; color: var(--text); background: var(--bg);
      outline: none; transition: border-color .15s, background .15s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--gr-mid); background: var(--white); }

    /* ── Main content area ── */
    .page-wrap { max-width: 1248px; margin: 0 auto; padding: 28px 24px 100px; }

    /* ── Results meta ── */
    .results-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .results-count { font-size: .88rem; color: var(--muted); }
    .results-count strong { color: var(--text); font-weight: 700; }

    /* ── Modality section headings ── */
    .cat-section { margin-bottom: 40px; }
    .cat-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .cat-heading-bar { width: 4px; height: 28px; background: var(--gr); border-radius: 2px; flex-shrink: 0; }
    .cat-heading-text {
      font-family: var(--font-head); font-size: 1.55rem; letter-spacing: .04em;
      color: var(--text); line-height: 1;
    }
    .cat-heading-count { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-left: 2px; }

    /* ── Stretch cards ── */
    .mv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .mv-card {
      display: flex; flex-direction: column;
      background: var(--card, #fff); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg, 14px); box-shadow: var(--shadow, 0 2px 12px rgba(0,0,0,.07));
      transition: transform .15s, box-shadow .15s, border-color .15s;
      overflow: hidden; cursor: pointer; text-decoration: none; color: inherit;
    }
    .mv-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md, 0 4px 20px rgba(0,0,0,.11)); border-color: var(--gr-border); }
    .mv-card-head { padding: 16px 18px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .mv-name {
      font-family: var(--font-head); font-size: 1.5rem; letter-spacing: .04em;
      line-height: 1.1; color: var(--text); flex: 1;
    }
    .mv-badge-wrap { flex-shrink: 0; }

    /* Modality badges */
    .mod-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: .66rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .07em; border: 1.5px solid; white-space: nowrap;
    }
    .mod-badge.static  { background: rgba(59,130,246,.1);  border-color: rgba(59,130,246,.35); color: #2563eb; }
    .mod-badge.dynamic { background: rgba(34,197,94,.1);   border-color: rgba(34,197,94,.35);  color: #16a34a; }
    .mod-badge.pnf     { background: rgba(168,85,247,.1);  border-color: rgba(168,85,247,.35); color: #7c3aed; }
    .mod-badge.yoga    { background: rgba(20,184,166,.1);  border-color: rgba(20,184,166,.35); color: #0d9488; }

    .mv-card-body { padding: 8px 18px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .mv-focus { font-size: .82rem; color: var(--muted); line-height: 1.5; }
    .sides-pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .72rem; font-weight: 700; color: var(--gr-mid);
      background: var(--gr-light); border: 1px solid var(--gr-border);
      padding: 2px 8px; border-radius: 20px; width: fit-content;
    }
    .mv-card-footer {
      padding: 10px 18px 14px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .mv-hold { font-size: .78rem; font-weight: 700; color: var(--gr); }
    .mv-arrow { color: var(--muted); transition: color .15s, transform .15s; font-size: .9rem; }
    .mv-card:hover .mv-arrow { color: var(--gr); transform: translateX(3px); }

    /* ── Empty state ── */
    .no-results { text-align: center; padding: 80px 24px; display: none; }
    .no-results.visible { display: block; }
    .no-results-icon { margin-bottom: 16px; opacity: .4; display: flex; justify-content: center; }
    .no-results-icon svg { width: 48px; height: 48px; }
    .no-results-title { font-family: var(--font-head); font-size: 1.8rem; letter-spacing: .04em; margin-bottom: 8px; }
    .no-results-sub { font-size: .9rem; color: var(--muted); }
    .no-results-clear {
      margin-top: 20px; padding: 10px 24px; border-radius: 8px;
      background: var(--gr); color: #fff; font-weight: 700; font-size: .88rem;
      cursor: pointer; border: none; font-family: var(--font-body); transition: background .15s;
    }
    .no-results-clear:hover { background: var(--gr-dark); }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .page-header-inner { padding: 20px 16px 0; }
      .page-wrap   { padding: 20px 16px 60px; }
      .page-title  { font-size: 2.2rem; }
      .mv-grid     { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const MODALITY_CONFIG = [
  { key: 'static',  label: 'Static Stretches',     desc: 'Hold-based stretches for flexibility and cool-down' },
  { key: 'dynamic', label: 'Dynamic Stretches',     desc: 'Movement-based prep for warm-ups and activation' },
  { key: 'pnf',     label: 'PNF / Contract-Relax',  desc: 'Advanced technique for maximum range of motion gains' },
  { key: 'yoga',    label: 'Yoga Flows',            desc: 'Pose-based holds for mobility, balance, and recovery' },
];

const FOCUS_LABELS = {
  hips: 'Hips', hamstrings: 'Hamstrings', shoulders: 'Shoulders',
  back: 'Back', chest: 'Chest', calves: 'Calves', wrists: 'Wrists', full: 'Full Body',
};

const MOD_LABELS = { static: 'Static', dynamic: 'Dynamic', pnf: 'PNF', yoga: 'Yoga' };

let STRETCHES = [];

// ─────────────────────────────────────────
// FILTER STATE
// ─────────────────────────────────────────
let currentMod    = 'all';
let currentFocus  = 'all';
let currentSearch = '';

// ─────────────────────────────────────────
// MORE FILTERS — toggle, button state, pills
// ─────────────────────────────────────────
function toggleFiltersPanel() {
  const panel = document.getElementById('filters-panel');
  const btn   = document.getElementById('more-filters-btn');
  const open  = panel.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
}

function updateMoreFiltersBtn() {
  const btn   = document.getElementById('more-filters-btn');
  const count = (currentMod !== 'all' ? 1 : 0) + (currentFocus !== 'all' ? 1 : 0);
  const icon  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>`;
  if (count > 0) {
    btn.classList.add('has-filters');
    btn.innerHTML = `${icon} More filters <span class="filter-count-badge">${count}</span>`;
  } else {
    btn.classList.remove('has-filters');
    btn.innerHTML = `${icon} More filters`;
  }
}

function updateActivePills() {
  const container = document.getElementById('active-filters');
  const pills = [];
  if (currentMod !== 'all') {
    const label = MOD_LABELS[currentMod] || currentMod;
    pills.push(`<span class="active-pill">${label} <span class="pill-x" data-clear="mod" role="button" aria-label="Remove ${label} filter">✕</span></span>`);
  }
  if (currentFocus !== 'all') {
    const label = FOCUS_LABELS[currentFocus] || currentFocus;
    pills.push(`<span class="active-pill">${label} <span class="pill-x" data-clear="focus" role="button" aria-label="Remove ${label} filter">✕</span></span>`);
  }
  if (currentSearch) {
    const raw = document.getElementById('search').value;
    pills.push(`<span class="active-pill">"${raw}" <span class="pill-x" data-clear="search" role="button" aria-label="Clear search">✕</span></span>`);
  }
  if (pills.length > 0) {
    container.innerHTML = `<span class="af-label">Active:</span>${pills.join('')}<button class="af-clear" onclick="clearFilters()">Clear all</button>`;
    container.classList.add('visible');
  } else {
    container.innerHTML = '';
    container.classList.remove('visible');
  }
  // pill-x click handlers
  container.querySelectorAll('.pill-x').forEach(x => {
    x.addEventListener('click', () => {
      const t = x.dataset.clear;
      if (t === 'mod') {
        currentMod = 'all';
        document.querySelectorAll('[data-mod]').forEach(p => p.classList.toggle('active', p.dataset.mod === 'all'));
      } else if (t === 'focus') {
        currentFocus = 'all';
        document.querySelectorAll('[data-focus]').forEach(p => p.classList.toggle('active', p.dataset.focus === 'all'));
      } else if (t === 'search') {
        currentSearch = '';
        document.getElementById('search').value = '';
      }
      updateMoreFiltersBtn();
      updateActivePills();
      render();
    });
  });
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render() {
  const term      = currentSearch.toLowerCase().trim();
  const root      = document.getElementById('sections-root');
  const noResults = document.getElementById('no-results');

  const byMod = {};
  let totalShown = 0;

  STRETCHES.forEach(s => {
    const modMatch    = currentMod   === 'all' || s.mod === currentMod;
    const focusMatch  = currentFocus === 'all' || s.focus.includes(currentFocus);
    const searchMatch = !term || s.name.toLowerCase().includes(term);
    if (!modMatch || !focusMatch || !searchMatch) return;
    if (!byMod[s.mod]) byMod[s.mod] = [];
    byMod[s.mod].push(s);
    totalShown++;
  });

  document.getElementById('total-count').textContent = totalShown;
  document.getElementById('shown-count').textContent = totalShown;

  if (totalShown === 0) {
    root.innerHTML = '';
    noResults.classList.add('visible');
    return;
  }
  noResults.classList.remove('visible');

  const modsToShow = currentMod === 'all'
    ? MODALITY_CONFIG.filter(m => byMod[m.key])
    : MODALITY_CONFIG.filter(m => m.key === currentMod && byMod[m.key]);

  root.innerHTML = modsToShow.map(cfg => {
    const stretches  = byMod[cfg.key] || [];
    const badgeLabel = cfg.key === 'pnf' ? 'PNF' : cfg.key.charAt(0).toUpperCase() + cfg.key.slice(1);

    const cards = stretches.map(s => {
      const focusText = s.focus.map(f => FOCUS_LABELS[f] || f).join(' · ');
      const sidesPill = s.sides ? `<span class="sides-pill">↔ Both sides</span>` : '';
      return `
        <a class="mv-card" href="/stretches/${s.slug}">
          <div class="mv-card-head">
            <h3 class="mv-name">${s.name}</h3>
            <div class="mv-badge-wrap">
              <span class="mod-badge ${s.mod}">${badgeLabel}</span>
            </div>
          </div>
          <div class="mv-card-body">
            <p class="mv-focus">${focusText}</p>
            ${sidesPill}
          </div>
          <div class="mv-card-footer">
            <span class="mv-hold">${s.meta}</span>
            <span class="mv-arrow">→</span>
          </div>
        </a>`;
    }).join('');

    return `
      <section class="cat-section">
        <div class="cat-heading">
          <div class="cat-heading-bar"></div>
          <span class="cat-heading-text">${cfg.label}</span>
          <span class="cat-heading-count">(${stretches.length})</span>
        </div>
        <div class="mv-grid">${cards}</div>
      </section>`;
  }).join('');
}

// ─────────────────────────────────────────
// CLEAR ALL
// ─────────────────────────────────────────
function clearFilters() {
  currentMod = 'all'; currentFocus = 'all'; currentSearch = '';
  document.getElementById('search').value = '';
  document.querySelectorAll('[data-mod]').forEach(c =>
    c.classList.toggle('active', c.dataset.mod === 'all'));
  document.querySelectorAll('[data-focus]').forEach(c =>
    c.classList.toggle('active', c.dataset.focus === 'all'));
  updateMoreFiltersBtn();
  updateActivePills();
  render();
}

// ─────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // More Filters toggle
  document.getElementById('more-filters-btn').addEventListener('click', toggleFiltersPanel);

  // Modality chips
  document.getElementById('mod-chips').addEventListener('click', e => {
    const chip = e.target.closest('[data-mod]');
    if (!chip) return;
    currentMod = chip.dataset.mod;
    document.querySelectorAll('[data-mod]').forEach(p => p.classList.remove('active'));
    chip.classList.add('active');
    updateMoreFiltersBtn();
    updateActivePills();
    render();
  });

  // Focus chips
  document.getElementById('focus-chips').addEventListener('click', e => {
    const chip = e.target.closest('[data-focus]');
    if (!chip) return;
    currentFocus = chip.dataset.focus;
    document.querySelectorAll('[data-focus]').forEach(p => p.classList.remove('active'));
    chip.classList.add('active');
    updateMoreFiltersBtn();
    updateActivePills();
    render();
  });

  // Search
  let searchTimer;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = e.target.value;
      updateActivePills();
      render();
    }, 180);
  });
});

// ─────────────────────────────────────────
// INIT — load from Supabase
// ─────────────────────────────────────────
async function init() {
  try {
    if (!supabaseClient) await initSupabase();
    const { data, error } = await supabaseClient
      .from('stretches')
      .select('name, slug, modality, focus, sides, hold_beginner, hold_advanced')
      .order('name');
    if (error) throw error;
    if (data) {
      STRETCHES = data.map(s => ({
        name:  s.name,
        slug:  s.slug,
        mod:   s.modality,
        focus: s.focus || [],
        sides: !!s.sides,
        meta:  s.hold_beginner != null
                 ? `Hold: ${s.hold_beginner}–${s.hold_advanced} sec`
                 : 'Dynamic',
      }));
    }
  } catch(e) {
    console.warn('Supabase fetch failed:', e);
  }
  render();
}
init();
</script>
<script src="/js/footer.js"></script>
</body>
</html>
